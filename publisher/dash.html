<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Publisher Dashboard — KotWeb</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,'Helvetica Neue',Arial,sans-serif;--bg-main:#f4f2ee;--bg-surface:#ffffff;--bg-hover:#f9fafb;--bg-input:#eef3f8;--border:#e5e7eb;--text-primary:#191919;--text-secondary:#595856;--text-tertiary:#868482;--primary:#6c47ff;--primary-hover:#5835e8;--primary-light:#f0ebff;--success:#057642;--success-bg:#e9f7ef;--danger:#d11124;--danger-bg:#fdecea;--warning:#b85c00;--warning-bg:#fff8f0;--radius-xl:1rem;--radius-full:9999px;--transition-fast:150ms cubic-bezier(0.4,0,0.2,1)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px}body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);min-height:100vh}
        button{cursor:pointer;font-family:inherit;border:none;background:transparent}input,textarea{font-family:inherit;font-size:inherit}
        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1rem;height:50px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
        .topbar-inner{max-width:960px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
        .logo{font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:6px;color:var(--text-primary);text-decoration:none}
        .logo span{width:30px;height:30px;clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%);background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.7rem}
        .container{max-width:960px;margin:0 auto;padding:1.25rem .85rem 4rem}
        .auth-card{max-width:420px;margin:3rem auto;background:var(--bg-surface);border-radius:var(--radius-xl);padding:2rem 1.5rem;border:1px solid var(--border);text-align:center}
        .auth-card .icon-circle{width:52px;height:52px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
        .auth-card .icon-circle i{font-size:24px;color:var(--primary)}
        .auth-card h2{font-size:1.15rem;font-weight:700;margin-bottom:4px}
        .auth-card .sub{font-size:.74rem;color:var(--text-secondary);margin-bottom:1.25rem}
        .field{margin-bottom:11px;text-align:left}
        .field label{display:block;font-size:.7rem;font-weight:600;color:var(--text-secondary);margin-bottom:3px}
        .field input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-full);font-size:.82rem;outline:none;background:var(--bg-input);transition:all var(--transition-fast)}
        .field input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,71,255,.1);background:var(--bg-surface)}
        .field .err{font-size:.64rem;color:var(--danger);margin-top:2px;display:none}.field .err.show{display:block}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:var(--radius-full);font-weight:600;font-size:.82rem;transition:all var(--transition-fast);width:100%}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-primary);width:auto}.btn-outline:hover{background:var(--bg-hover)}
        .btn-sm{padding:6px 12px;font-size:.7rem;width:auto}.btn-danger{background:var(--danger);color:#fff;width:auto}.btn-danger:hover{background:#b91c1c}
        .btn-xs{padding:4px 8px;font-size:.65rem;width:auto;border-radius:20px}
        .link-text{font-size:.7rem;color:var(--text-secondary);margin-top:10px}.link-text a{color:var(--primary);font-weight:600;cursor:pointer;text-decoration:none}.link-text a:hover{text-decoration:underline}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.25rem}
        .stat-card{background:var(--bg-surface);border-radius:var(--radius-xl);padding:1.1rem;border:1px solid var(--border)}
        .stat-val{font-size:1.3rem;font-weight:700}.stat-label{font-size:.68rem;color:var(--text-secondary)}
        .pub-link-box{background:var(--bg-surface);border:1px solid var(--primary);border-radius:var(--radius-xl);padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .pub-link-box .link-text{font-size:.75rem;color:var(--primary);word-break:break-all;flex:1;min-width:150px}
        .pub-link-box .btn{margin-top:0;width:auto}
        .section-title{font-size:.9rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .tab-nav{display:flex;gap:3px;background:#e5e7eb;border-radius:30px;padding:3px;margin-bottom:1rem;overflow-x:auto}
        .tab-btn{padding:8px 16px;border-radius:28px;font-size:.74rem;font-weight:500;color:var(--text-secondary);white-space:nowrap;transition:all var(--transition-fast)}.tab-btn.active{background:#fff;color:var(--text-primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .tab-content{display:none}.tab-content.active{display:block;animation:fadeIn .25s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .doc-list{display:grid;gap:8px}
        .doc-row{background:var(--bg-surface);border-radius:var(--radius-xl);padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .doc-row img{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}
        .doc-thumb{width:40px;height:40px;border-radius:6px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#d1d5db;font-size:1.1rem}
        .doc-info{flex:1;min-width:120px}.doc-info h4{font-size:.8rem;font-weight:600}.doc-info span{font-size:.68rem;color:var(--text-secondary)}
        .doc-actions{display:flex;gap:4px}
        .badge{font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}.badge i{font-size:10px}.badge-active{background:var(--success-bg);color:var(--success)}.badge-hidden{background:var(--danger-bg);color:var(--danger)}
        .txn-list{display:grid;gap:6px}
        .txn-row{background:var(--bg-surface);border-radius:var(--radius-xl);padding:10px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:.75rem}
        .txn-row .txn-info{flex:1}.txn-row .txn-amount{font-weight:700;color:var(--success)}.txn-row .txn-fee{color:var(--text-tertiary);font-size:.68rem}
        .empty{text-align:center;padding:2rem;color:var(--text-tertiary);font-size:.8rem}
        .file-upload-area{width:100%;padding:14px;border:2px dashed var(--border);border-radius:12px;text-align:center;cursor:pointer;background:var(--bg-input);transition:all var(--transition-fast);margin-bottom:8px}
        .file-upload-area:hover{border-color:var(--primary)}.file-upload-area i{font-size:22px;color:#d1d5db}.file-upload-area .up-text{font-size:.7rem;color:var(--text-tertiary)}
        .file-upload-area input{position:absolute;opacity:0;width:0;height:0}
        .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:10px 20px;border-radius:30px;font-size:.74rem;z-index:300;animation:slideUp .3s ease;display:none}@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @media(max-width:500px){.stats{grid-template-columns:1fr 1fr}.doc-row{flex-direction:column;align-items:flex-start}.doc-actions{width:100%;justify-content:flex-end}}
    </style>
</head>
<body>
    <header class="topbar"><div class="topbar-inner"><a href="index.html" class="logo"><span>K</span> KotWeb Publisher</a><button class="btn btn-outline btn-sm" id="logoutBtn" style="display:none">Logout</button></div></header>
    <div class="container" id="content"><div style="text-align:center;padding:3rem;color:var(--text-tertiary)">Loading...</div></div>
    <div class="toast" id="toast"></div>
    <script>
(function(){'use strict';
var API='/api/pub';var token=null;var publisher=null;
function $(id){return document.getElementById(id)}
function toast(m){var t=$('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2500)}
async function api(path,body,method){var opts={method:method||(body?'POST':'GET'),headers:{'Content-Type':'application/json'}};if(token)opts.headers['Authorization']='Bearer '+token;if(body)opts.body=JSON.stringify(body);var r=await fetch(path,opts);var d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d}
function saveAuth(t,p){token=t;publisher=p;localStorage.setItem('pub_auth',JSON.stringify({token:t,publisher:p}))}
function loadAuth(){try{var d=JSON.parse(localStorage.getItem('pub_auth'));if(d){token=d.token;publisher=d.publisher;return true}}catch(e){}return false}
function clearAuth(){token=null;publisher=null;localStorage.removeItem('pub_auth');$('logoutBtn').style.display='none'}
function fmtPrice(n,c){return parseInt(n).toLocaleString()+' '+(c||'RWF')}

function showLogin(){
    var c=$('content');c.innerHTML='<div class="auth-card"><div class="icon-circle"><i class="bx bx-log-in"></i></div><h2>Sign In</h2><p class="sub">Login to your publisher account</p><div class="field"><label>Username or Email</label><input type="text" id="loginUser" placeholder="username or email" autocomplete="off"></div><div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="password"></div><button class="btn btn-primary" id="loginBtn">Sign In</button><p class="link-text">Don\'t have an account? <a id="showRegister">Register here</a></p></div>';
    $('loginBtn').addEventListener('click',async function(){try{var u=$('loginUser').value.trim(),p=$('loginPass').value;if(!u||!p){toast('Fill all fields');return}var r=await api(API+'/login',{login:u,password:p});saveAuth(r.token,r.publisher);showDash()}catch(e){toast(e.message)}});
    $('showRegister').addEventListener('click',function(e){e.preventDefault();showRegister()});
    $('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')$('loginBtn').click()});
}

function showRegister(){
    var c=$('content');c.innerHTML='<div class="auth-card"><div class="icon-circle"><i class="bx bx-user-plus"></i></div><h2>Register</h2><p class="sub">Create your publisher account</p><div class="field"><label>Username</label><input type="text" id="regUser" placeholder="choose a username" autocomplete="off"><span class="err" id="regUserErr">Username already taken</span></div><div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com" autocomplete="off"><span class="err" id="regEmailErr">Email already registered</span></div><div class="field"><label>Password</label><input type="password" id="regPass" placeholder="min 6 characters"></div><button class="btn btn-primary" id="regBtn">Create Account</button><p class="link-text">Already have an account? <a id="showLoginLink">Sign In</a></p></div>';
    $('regBtn').addEventListener('click',async function(){try{var u=$('regUser').value.trim(),e=$('regEmail').value.trim(),p=$('regPass').value;$('regUserErr').classList.remove('show');$('regEmailErr').classList.remove('show');if(!u||!e||!p){toast('Fill all fields');return}if(u.length<3){toast('Username: min 3 characters');return}if(p.length<6){toast('Password: min 6 characters');return}var r=await api(API+'/register',{username:u,email:e,name:u,password:p});saveAuth(r.token,r.publisher);showDash()}catch(err){var msg=err.message||'';if(msg.toLowerCase().includes('username'))$('regUserErr').classList.add('show');if(msg.toLowerCase().includes('email'))$('regEmailErr').classList.add('show');toast(msg)}});
    $('showLoginLink').addEventListener('click',function(e){e.preventDefault();showLogin()});
}

async function showDash(){if(!publisher)return;var c=$('content');$('logoutBtn').style.display='inline-flex';
    try{var earnings=await api(API+'/earnings');var docs=await api(API+'/documents');}catch(e){toast('Session expired. Please login again.');clearAuth();showLogin();return}
    var pubUrl=window.location.origin+'/page.html?p='+publisher.slug;
    c.innerHTML=
    '<div class="pub-link-box"><div class="link-text">'+pubUrl+'</div><button class="btn btn-primary btn-sm" onclick="copyLink(\''+pubUrl+'\')"><i class="bx bx-copy"></i> Copy</button></div>'+
    '<div class="stats"><div class="stat-card"><div class="stat-val">'+fmtPrice(earnings.your_earnings,'RWF')+'</div><div class="stat-label">Your Earnings (93%)</div></div><div class="stat-card"><div class="stat-val">'+fmtPrice(earnings.platform_fees,'RWF')+'</div><div class="stat-label">Platform Fee (7%)</div></div><div class="stat-card"><div class="stat-val">'+fmtPrice(earnings.total_sales,'RWF')+'</div><div class="stat-label">Total Sales</div></div><div class="stat-card"><div class="stat-val">'+earnings.total_transactions+'</div><div class="stat-label">Transactions</div></div></div>'+
    '<div class="tab-nav"><button class="tab-btn active" data-tab="docs"><i class="bx bx-file"></i> Documents</button><button class="tab-btn" data-tab="add"><i class="bx bx-plus-circle"></i> Add New</button><button class="tab-btn" data-tab="txns"><i class="bx bx-receipt"></i> Transactions</button></div>'+
    '<div class="tab-content active" id="tab-docs"><div class="section-title"><i class="bx bx-library"></i> My Documents ('+(docs||[]).length+')</div><div class="doc-list" id="docList"></div></div>'+
    '<div class="tab-content" id="tab-add"><div class="auth-card" style="text-align:left;max-width:100%"><h2>Add New Document</h2><div class="field"><label>Title *</label><input type="text" id="dTitle" placeholder="Document title"></div><div class="field"><label>Description</label><textarea id="dDesc" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;resize:vertical;min-height:60px;background:var(--bg-input);font-family:var(--font-family)" placeholder="Brief description..."></textarea></div><div class="field"><label>Price (RWF) *</label><input type="number" id="dPrice" min="100" value="500"></div><div class="field"><label>Preview Image</label><div class="file-upload-area" id="imgArea"><i class="bx bx-image-add"></i><div class="up-text">Click to upload image</div><input type="file" id="dImage" accept="image/*"></div><img id="imgPreview" style="width:100%;max-height:100px;object-fit:cover;border-radius:8px;margin-top:4px;display:none"></div><div class="field"><label>Document File *</label><div class="file-upload-area" id="fileArea"><i class="bx bx-upload"></i><div class="up-text" id="fileText">Click to upload file</div><input type="file" id="dFile"></div></div><button class="btn btn-primary" id="saveDoc"><i class="bx bx-save"></i> Save Document</button></div></div>'+
    '<div class="tab-content" id="tab-txns"><div class="section-title"><i class="bx bx-history"></i> Recent Transactions</div><div class="txn-list" id="txnList"></div></div>';

    renderDocList(docs||[]);renderTxns(earnings.recent||[]);

    document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});$('tab-'+b.dataset.tab).classList.add('active')})});

    // Image upload
    $('imgArea').addEventListener('click',function(e){if(e.target!==$('dImage'))$('dImage').click()});
    $('dImage').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){$('imgPreview').src=ev.target.result;$('imgPreview').style.display='block';$('imgArea').querySelector('.up-text').textContent=f.name};r.readAsDataURL(f)});

    // File area
    $('fileArea').addEventListener('click',function(e){if(e.target!==$('dFile'))$('dFile').click()});
    $('dFile').addEventListener('change',function(e){var f=e.target.files[0];if(f)$('fileText').textContent=f.name});

    $('saveDoc').addEventListener('click',async function(){
        try{var t=$('dTitle').value.trim(),d=$('dDesc').value.trim(),p=$('dPrice').value,im=$('dImage').files[0],fl=$('dFile').files[0];
            if(!t||!p||!fl){toast('Title, price, and file required');return}if(parseInt(p)<100){toast('Min price: 100 RWF');return}
            $('saveDoc').disabled=true;$('saveDoc').innerHTML='<i class="bx bx-loader bx-spin"></i> Uploading...';
            var fd=new FormData();fd.append('file',fl);
            var up=await fetch(API+'/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});var ud=await up.json();
            if(!ud.file_path){toast('File upload failed');$('saveDoc').disabled=false;$('saveDoc').innerHTML='<i class="bx bx-save"></i> Save Document';return}
            var imgUrl='';
            if(im){var ifd=new FormData();ifd.append('image',im);
                var iu=await fetch('https://api.imgbb.com/1/upload?key=2077df548acf5a4f53658b930c7fe87a',{method:'POST',body:ifd});var id=await iu.json();if(id.success)imgUrl=id.data.url}
            await api(API+'/documents',{title:t,description:d,price:parseInt(p),image_url:imgUrl,file_path:ud.file_path});
            toast('Document added!');showDash()}catch(e){toast(e.message);$('saveDoc').disabled=false;$('saveDoc').innerHTML='<i class="bx bx-save"></i> Save Document'}
    });
}

function renderDocList(docs){var l=$('docList');if(!l)return;if(!docs.length){l.innerHTML='<div class="empty"><i class="bx bx-file" style="font-size:32px;display:block;margin-bottom:6px;color:#d1d5db"></i>No documents yet</div>';return}
    l.innerHTML=docs.map(function(d){return'<div class="doc-row">'+(d.image_url?'<img src="'+d.image_url+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">':'')+'<div class="doc-thumb" style="'+(d.image_url?'display:none':'')+'"><i class="bx bx-file"></i></div><div class="doc-info"><h4>'+d.title+' <span class="badge '+(d.active?'badge-active':'badge-hidden')+'"><i class="bx '+(d.active?'bx-check':'bx-hide')+'"></i> '+(d.active?'Active':'Hidden')+'</span></h4><span>'+fmtPrice(d.price,d.currency)+' · '+(d.clicks||0)+' views · '+d.file_path.split('/').pop()+'</span></div><div class="doc-actions"><button class="btn btn-outline btn-xs" onclick="toggleDoc(\''+d.id+'\')"><i class="bx '+(d.active?'bx-hide':'bx-show')+'"></i> '+(d.active?'Hide':'Show')+'</button><button class="btn btn-danger btn-xs" onclick="deleteDoc(\''+d.id+'\',\''+d.title.replace(/'/g,"\\'")+'\')"><i class="bx bx-trash"></i></button></div></div>'}).join('')}

function renderTxns(txns){var l=$('txnList');if(!l)return;if(!txns.length){l.innerHTML='<div class="empty"><i class="bx bx-receipt" style="font-size:32px;display:block;margin-bottom:6px;color:#d1d5db"></i>No transactions yet</div>';return}
    l.innerHTML=txns.map(function(t){return'<div class="txn-row"><div class="txn-info"><strong>'+fmtPrice(t.amount,t.currency)+'</strong> · '+(t.customer_name||'Customer')+' · '+(t.customer_phone||'')+'</div><div class="txn-amount">+'+fmtPrice(t.publisher_earnings,t.currency)+'</div><div class="txn-fee">Fee: '+fmtPrice(t.platform_fee,t.currency)+' (7%)</div></div>'}).join('')}

window.copyLink=function(url){navigator.clipboard.writeText(url).then(function(){toast('Link copied!')}).catch(function(){toast('Copy failed')})};
window.toggleDoc=async function(id){try{await api(API+'/documents/'+id+'/toggle',{},'PUT');showDash()}catch(e){toast(e.message)}};
window.deleteDoc=async function(id,title){if(!confirm('Delete "'+title+'" permanently?'))return;try{await api(API+'/documents/'+id,{},'DELETE');toast('Deleted!');showDash()}catch(e){toast(e.message)}};

$('logoutBtn').addEventListener('click',function(){clearAuth();showLogin()});

// Auto-login check
if(loadAuth()){showDash()}else{showLogin()}
})();
</script>
</body>
</html>
