<!DOCTYPE html>
<html lang="rw" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>Kwemeza Ubwishyu — DocStore</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        :root {
            --bg:#f8f9fb; --surface:#fff; --text:#0a0a0a; --sub:#6b7280;
            --border:#eef0f2; --accent:#0a0a0a; --red:#dc2626; --red-bg:#fef2f2;
            --red-text:#991b1b; --green:#059669; --green-bg:#ecfdf5;
            --green-text:#065f46; --amber:#d97706; --amber-bg:#fffbeb;
            --amber-text:#92400e; --blue:#2563eb; --blue-bg:#eff6ff;
            --radius:18px; --radius-sm:12px; --tr:0.25s cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);
            min-height:100vh;-webkit-font-smoothing:antialiased;
        }
        .topbar{
            background:rgba(255,255,255,.94);backdrop-filter:blur(14px);
            border-bottom:1px solid var(--border);padding:12px 18px;
            position:sticky;top:0;z-index:50;
        }
        .topbar-inner{
            max-width:700px;margin:0 auto;display:flex;
            align-items:center;justify-content:space-between;gap:12px;
        }
        .logo{
            font-size:1.05rem;font-weight:700;display:flex;align-items:center;
            gap:6px;letter-spacing:-.3px;text-decoration:none;color:var(--text);
        }
        .logo .material-icons{font-size:20px}
        .nav-links{display:flex;gap:4px}
        .nav-link{
            padding:6px 12px;border-radius:18px;font-size:.74rem;
            font-weight:500;text-decoration:none;color:var(--sub);transition:all var(--tr);
        }
        .nav-link:hover{background:#f3f4f6;color:var(--text)}
        .nav-link.active{background:var(--accent);color:#fff}
        .container{max-width:600px;margin:0 auto;padding:20px 14px 70px}
        .back-link{
            display:inline-flex;align-items:center;gap:5px;font-size:.8rem;
            font-weight:500;color:var(--text);text-decoration:none;padding:8px 12px;
            margin-bottom:16px;border-radius:25px;transition:background var(--tr);
            -webkit-tap-highlight-color:transparent;
        }
        .back-link:hover{background:#f3f4f6}

        .doc-mini{
            background:var(--surface);border-radius:var(--radius);
            border:1px solid var(--border);padding:14px 16px;
            display:flex;align-items:center;gap:12px;margin-bottom:18px;
        }
        .doc-mini img{
            width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;
        }
        .doc-mini .doc-icon{
            width:52px;height:52px;border-radius:10px;background:#f3f4f6;
            display:flex;align-items:center;justify-content:center;flex-shrink:0;
        }
        .doc-mini .doc-icon .material-icons{color:#d1d5db}
        .doc-mini .doc-info{flex:1;min-width:0}
        .doc-mini .doc-info h4{font-size:.88rem;font-weight:600;letter-spacing:-.2px;word-break:break-word}
        .doc-mini .doc-info span{font-size:.74rem;color:var(--sub)}

        .verify-card{
            background:var(--surface);border-radius:var(--radius);
            border:1px solid var(--border);padding:26px 18px 22px;
            box-shadow:0 2px 12px rgba(0,0,0,.04);
        }
        .verify-card .shield-icon{
            width:50px;height:50px;border-radius:50%;background:#fef3c7;
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 10px;
        }
        .verify-card .shield-icon .material-icons{font-size:26px;color:#d97706}
        .verify-card h2{
            font-size:1.15rem;font-weight:700;text-align:center;
            letter-spacing:-.3px;margin-bottom:2px;
        }
        .verify-card .subtitle{
            text-align:center;color:var(--sub);font-size:.78rem;margin-bottom:20px;
        }

        .warn-box{
            background:var(--red-bg);border:1px solid #fecaca;
            border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:18px;
        }
        .warn-box .warn-head{
            display:flex;align-items:center;gap:6px;
            font-size:.76rem;font-weight:600;color:var(--red-text);margin-bottom:4px;
        }
        .warn-box .warn-body{font-size:.72rem;color:var(--red-text);line-height:1.5}
        .warn-box .warn-price{font-weight:700;font-size:.82rem;color:var(--red);margin-top:4px}

        .field-group{margin-bottom:14px}
        .field-group label{
            display:block;font-size:.76rem;font-weight:600;color:var(--text);margin-bottom:4px;
        }
        .field-group input[type="text"],
        .field-group input[type="tel"]{
            width:100%;padding:11px 14px;border:1px solid var(--border);
            border-radius:10px;font-size:.84rem;font-family:'Poppins',sans-serif;
            outline:none;transition:all var(--tr);-webkit-appearance:none;background:#fafbfc;
        }
        .field-group input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
        .field-group input.error{border-color:var(--red);background:var(--red-bg)}
        .field-group input.valid{border-color:var(--green);background:var(--green-bg)}
        .field-group .err-msg{
            font-size:.68rem;color:var(--red);margin-top:3px;display:none;
        }
        .field-group .err-msg.show{display:block}
        .field-group .helper{font-size:.68rem;color:var(--sub);margin-top:3px}

        .file-upload-area{
            width:100%;padding:18px 14px;border:2px dashed var(--border);
            border-radius:10px;text-align:center;cursor:pointer;
            transition:all var(--tr);background:#fafbfc;
        }
        .file-upload-area:hover{border-color:#c4c8cf;background:#f9fafb}
        .file-upload-area.has-file{border-color:var(--green);background:var(--green-bg)}
        .file-upload-area .material-icons{font-size:28px;color:#d1d5db;display:block;margin:0 auto 4px}
        .file-upload-area .upload-text{font-size:.78rem;color:var(--sub)}
        .file-upload-area input[type="file"]{
            position:absolute;opacity:0;width:0;height:0;
        }

        .preview-thumb{
            width:100%;max-height:140px;object-fit:contain;
            border-radius:8px;margin-top:8px;border:1px solid var(--border);display:none;
        }

        .btn{
            display:inline-flex;align-items:center;justify-content:center;
            gap:7px;padding:12px 26px;border-radius:30px;font-weight:600;
            font-size:.84rem;cursor:pointer;border:none;
            font-family:'Poppins',sans-serif;transition:all var(--tr);
            -webkit-tap-highlight-color:transparent;width:100%;
        }
        .btn .material-icons{font-size:18px}
        .btn-dark{background:var(--accent);color:#fff}
        .btn-dark:hover{background:#1a1a1a}
        .btn-dark:disabled{opacity:.45;pointer-events:none}
        .btn-red{background:var(--red);color:#fff;width:100%}

        .status-msg{
            text-align:center;padding:16px;border-radius:var(--radius-sm);
            margin-top:14px;display:none;font-size:.8rem;font-weight:500;
            animation:fadeIn .3s ease;
        }
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .status-msg.success{background:var(--green-bg);color:var(--green-text);display:block}
        .status-msg.fail{background:var(--red-bg);color:var(--red-text);display:block}
        .status-msg.checking{background:var(--blue-bg);color:#1e40af;display:block}

        .scan-bar-wrap{display:none;margin-top:14px}
        .scan-bar-wrap.active{display:block}
        .scan-label{font-size:.72rem;color:var(--sub);text-align:center;margin-bottom:6px}
        .scan-bar{height:6px;background:#e5e7eb;border-radius:10px;overflow:hidden}
        .scan-bar .fill{height:100%;background:var(--red);border-radius:10px;width:0%;transition:width .15s linear}

        .history-section{margin-top:28px}
        .section-title{
            font-size:.95rem;font-weight:600;margin-bottom:10px;
            display:flex;align-items:center;gap:6px;
        }
        .list{display:grid;gap:8px}
        .card{
            background:var(--surface);border-radius:var(--radius-sm);
            border:1px solid var(--border);padding:12px 14px;
            display:flex;align-items:center;gap:10px;flex-wrap:wrap;
        }
        .card-img{width:42px;height:42px;border-radius:8px;object-fit:cover;flex-shrink:0}
        .card-img-placeholder{
            width:42px;height:42px;border-radius:8px;background:#f3f4f6;
            display:flex;align-items:center;justify-content:center;flex-shrink:0;
        }
        .card-img-placeholder .material-icons{color:#d1d5db;font-size:20px}
        .card-info{flex:1;min-width:120px}
        .card-info h4{font-size:.82rem;font-weight:600}
        .card-info .meta{font-size:.68rem;color:var(--sub)}
        .card-actions{flex-shrink:0}
        .badge{
            font-size:.66rem;font-weight:600;padding:3px 9px;
            border-radius:16px;display:inline-flex;align-items:center;gap:3px;
        }
        .badge .material-icons{font-size:12px}
        .badge-done{background:var(--green-bg);color:var(--green-text)}
        .badge-wait{background:var(--amber-bg);color:var(--amber-text)}
        .badge-fail{background:var(--red-bg);color:var(--red-text)}

        .empty-state{text-align:center;padding:30px 16px;color:#9ca3af}
        .empty-state .material-icons{font-size:40px;margin-bottom:8px}

        .toast{
            position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);
            background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:40px;
            font-size:.76rem;font-weight:500;font-family:'Poppins',sans-serif;z-index:200;
            transition:transform .3s;pointer-events:none;white-space:nowrap;
        }
        .toast.show{transform:translateX(-50%) translateY(0)}

        .spinner-inline{
            width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);
            border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
            display:inline-block;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        @media(max-width:480px){
            .verify-card{padding:20px 14px 18px}
            .card{flex-direction:column;align-items:flex-start}
            .card-actions{width:100%;text-align:right}
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html" class="logo"><span class="material-icons">description</span> DocStore</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Store</a>
                <a href="cart.html" class="nav-link active">Kwemeza</a>
            </div>
        </div>
    </header>

    <div class="container" id="content">
        <div style="text-align:center;padding:50px 16px;">
            <div class="spinner-inline" style="width:28px;height:28px;border-color:#e5e7eb;border-top-color:#888;margin:0 auto 12px;"></div>
            <p style="color:var(--sub);font-size:.82rem;">Tegereza gato...</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            var SUPABASE_URL = 'https://wuswjdmshzzxnlsugukm.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1c3dqZG1zaHp6eG5sc3VndWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjM3NDcsImV4cCI6MjA5NzAzOTc0N30.p92FyfHtBiEC0CEeFEjcV5kz0ZJiSLFtIWUg0EhEO10';

            var fingerprint = null;
            var payments = [];
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token') || params.get('client_token') || null;
            var currentPayment = null;
            var phoneValid = false;
            var nameValid = false;
            var fileChosen = false;
            var verificationDone = false;

            function $(id) { return document.getElementById(id); }

            function toast(msg) {
                var t = $('toast');
                if (!t) return;
                t.textContent = msg;
                t.classList.add('show');
                clearTimeout(t._tid);
                t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2600);
            }

            async function apiCall(path, body) {
                var opts = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                var res = await fetch(path, opts);
                var txt = await res.text();
                try { return JSON.parse(txt); } catch(e) { return { error: 'Invalid response' }; }
            }

            async function getFingerprint() {
                try {
                    var fp = await FingerprintJS.load();
                    return (await fp.get()).visitorId;
                } catch(e) {
                    return 'fb_' + btoa(navigator.userAgent + screen.width + navigator.language).replace(/[=+/]/g, '').slice(0, 48);
                }
            }

            function formatPrice(n, c) { return parseInt(n).toLocaleString() + ' ' + (c || 'RWF'); }

            function statusBadge(s) {
                var m = {
                    completed: { c: 'badge-done', i: 'check_circle', l: 'Yemejwe' },
                    pending: { c: 'badge-wait', i: 'hourglass_empty', l: 'Itegerejwe' },
                    failed: { c: 'badge-fail', i: 'cancel', l: 'Byanze' }
                };
                var b = m[s] || m.pending;
                return '<span class="badge ' + b.c + '"><span class="material-icons">' + b.i + '</span> ' + b.l + '</span>';
            }

            function timeAgo(d) {
                if (!d) return '';
                var diff = (Date.now() - new Date(d).getTime()) / 60000;
                if (diff < 1) return 'Ubu gato';
                if (diff < 60) return Math.floor(diff) + ' min ishize';
                if (diff < 1440) return Math.floor(diff / 60) + ' h ishize';
                return new Date(d).toLocaleDateString();
            }

            function validatePhone(num) {
                var clean = num.replace(/\s/g, '');
                return /^07[89]\d{7}$/.test(clean);
            }

            function validateName(name) {
                var trimmed = name.trim();
                var parts = trimmed.split(/\s+/);
                return parts.length >= 2 && parts[0].length >= 2 && parts[1].length >= 2;
            }

            async function loadPaymentInfo() {
                if (!token) return null;
                try { return await apiCall('/api/check-payment', { client_token: token }); }
                catch(e) { return null; }
            }

            async function loadPayments() {
                try { payments = await apiCall('/api/user-payments', { device_fingerprint: fingerprint }); }
                catch(e) { payments = []; }
            }

            function simulateScan(callback) {
                var barWrap = $('scanBarWrap');
                var fill = $('scanFill');
                var label = $('scanLabel');
                if (!barWrap || !fill || !label) { callback(); return; }

                barWrap.classList.add('active');
                fill.style.width = '0%';
                var steps = [
                    { to: 12, ms: 400, text: 'Gusoma screenshot...' },
                    { to: 28, ms: 500, text: 'Kugenzura amagambo...' },
                    { to: 45, ms: 600, text: 'Kureba numero...' },
                    { to: 62, ms: 550, text: 'Kugereranya amakuru...' },
                    { to: 78, ms: 650, text: 'Gushakisha ibimenyetso...' },
                    { to: 92, ms: 500, text: 'Gusoza igenzura...' },
                    { to: 100, ms: 350, text: 'Birangiye.' }
                ];
                var i = 0;
                function next() {
                    if (i >= steps.length) { setTimeout(callback, 400); return; }
                    var s = steps[i];
                    label.textContent = s.text;
                    fill.style.width = s.to + '%';
                    i++;
                    setTimeout(next, s.ms);
                }
                next();
            }

            function renderVerifyPage(paymentInfo) {
                if (!paymentInfo || paymentInfo.error || !paymentInfo.document_id) {
                    $('content').innerHTML =
                        '<a href="index.html" class="back-link"><span class="material-icons">arrow_back</span> Subira inyuma</a>' +
                        '<div class="empty-state"><span class="material-icons">error_outline</span><p>Ntabwo twabonye amakuru y\'ubwishyu.</p><a href="index.html" class="btn btn-dark" style="width:auto;margin-top:10px;">Subira ku Store</a></div>';
                    return;
                }

                currentPayment = paymentInfo;
                var doublePrice = (paymentInfo.amount || 500) * 2;
                var currency = paymentInfo.currency || 'RWF';
                var docTitle = paymentInfo.document_title || paymentInfo.title || 'iyi document';
                var docImage = paymentInfo.document_image || paymentInfo.image_url || '';

                $('content').innerHTML =
                    '<a href="index.html" class="back-link"><span class="material-icons">arrow_back</span> Subira inyuma</a>' +
                    '<div class="doc-mini">' +
                        (docImage ? '<img src="' + docImage + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' : '') +
                        '<div class="doc-icon" style="' + (docImage ? 'display:none' : '') + '"><span class="material-icons">description</span></div>' +
                        '<div class="doc-info"><h4>' + docTitle + '</h4><span>Igiciro: ' + formatPrice(paymentInfo.amount, currency) + '</span></div>' +
                    '</div>' +
                    '<div class="verify-card">' +
                        '<div class="shield-icon"><span class="material-icons">verified_user</span></div>' +
                        '<h2>Kwemeza Ubwishyu</h2>' +
                        '<p class="subtitle">Uzuza amakuru yawe neza kugirango twemeze ko ubwishyu bwakozwe</p>' +
                        '<div class="warn-box">' +
                            '<div class="warn-head"><span class="material-icons" style="font-size:18px;">gpp_maybe</span> IBUKA</div>' +
                            '<div class="warn-body">Niba amakuru utanga asa nk\'ay\'impimbano cyangwa atari yo, <strong>igiciro kizakuba kabiri</strong> kuri wowe gusa.<br>Uzishyura: <span class="warn-price">' + formatPrice(doublePrice, currency) + '</span> kuri <strong>' + docTitle + '</strong>.</div>' +
                        '</div>' +
                        '<div class="field-group">' +
                            '<label>Shyiramo amazina yawe yombi</label>' +
                            '<input type="text" class="input" id="buyerName" placeholder="Urugero: Niyonzima Patrick" autocomplete="off">' +
                            '<span class="err-msg" id="nameErr">Amazina abiri akenewe (urugero: Niyonzima Patrick)</span>' +
                        '</div>' +
                        '<div class="field-group">' +
                            '<label>Shyiramo numero yohereje amafaranga</label>' +
                            '<input type="tel" class="input" id="phoneNumber" placeholder="0788123456" maxlength="10" autocomplete="off">' +
                            '<span class="err-msg" id="phoneErr">Numero igomba kuba ifite imibare 10, itangirira kuri 078 cyangwa 079</span>' +
                            '<span class="helper">Numero ya MTN cyangwa Airtel wakoresheje</span>' +
                        '</div>' +
                        '<div class="field-group">' +
                            '<label>Shyiramo screenshot ya message wakiriye</label>' +
                            '<div class="file-upload-area" id="fileUploadArea">' +
                                '<span class="material-icons">add_photo_alternate</span>' +
                                '<span class="upload-text">Kanda hano ushyiremo screenshot</span>' +
                                '<input type="file" id="screenshotInput" accept="image/*">' +
                            '</div>' +
                            '<img class="preview-thumb" id="previewImg">' +
                        '</div>' +
                        '<div class="scan-bar-wrap" id="scanBarWrap">' +
                            '<div class="scan-label" id="scanLabel">Itegereze...</div>' +
                            '<div class="scan-bar"><div class="fill" id="scanFill"></div></div>' +
                        '</div>' +
                        '<div class="status-msg" id="statusMsg"></div>' +
                        '<button class="btn btn-dark" id="submitBtn" disabled>Ohereza</button>' +
                    '</div>' +
                    '<div class="history-section">' +
                        '<div class="section-title"><span class="material-icons">receipt_long</span> Amateka y\'Ubwishyu</div>' +
                        '<div class="list" id="historyList"></div>' +
                    '</div>';

                // ── FILE UPLOAD (FIXED - click area works) ──
                var fileArea = $('fileUploadArea');
                var fileInput = $('screenshotInput');

                fileArea.addEventListener('click', function(e) {
                    if (e.target !== fileInput) {
                        fileInput.click();
                    }
                });

                fileInput.addEventListener('change', function(e) {
                    e.stopPropagation();
                    var file = this.files[0];
                    if (!file) {
                        fileChosen = false;
                        fileArea.classList.remove('has-file');
                        $('previewImg').style.display = 'none';
                        updateSubmit();
                        return;
                    }

                    fileChosen = true;
                    fileArea.classList.add('has-file');
                    fileArea.querySelector('.upload-text').textContent = '✓ ' + file.name;

                    var reader = new FileReader();
                    reader.onload = function(ev) {
                        $('previewImg').src = ev.target.result;
                        $('previewImg').style.display = 'block';
                    };
                    reader.readAsDataURL(file);

                    updateSubmit();
                });

                // ── PHONE VALIDATION (instant, shows error right there) ──
                var phoneInput = $('phoneNumber');
                phoneInput.addEventListener('input', function() {
                    var val = this.value.replace(/\s/g, '');
                    if (val.length > 10) {
                        this.value = val.substring(0, 10);
                        return;
                    }
                    if (val.length === 10) {
                        if (validatePhone(val)) {
                            this.classList.remove('error');
                            this.classList.add('valid');
                            $('phoneErr').classList.remove('show');
                            phoneValid = true;
                        } else {
                            this.classList.add('error');
                            this.classList.remove('valid');
                            $('phoneErr').classList.add('show');
                            phoneValid = false;
                        }
                    } else {
                        this.classList.remove('error', 'valid');
                        $('phoneErr').classList.remove('show');
                        phoneValid = false;
                    }
                    updateSubmit();
                });

                // ── NAME VALIDATION (on blur) ──
                var nameInput = $('buyerName');
                nameInput.addEventListener('blur', function() {
                    var val = this.value.trim();
                    if (val.length > 0) {
                        if (validateName(val)) {
                            this.classList.remove('error');
                            this.classList.add('valid');
                            $('nameErr').classList.remove('show');
                            nameValid = true;
                        } else {
                            this.classList.add('error');
                            this.classList.remove('valid');
                            $('nameErr').classList.add('show');
                            nameValid = false;
                        }
                    } else {
                        this.classList.remove('error', 'valid');
                        $('nameErr').classList.remove('show');
                        nameValid = false;
                    }
                    updateSubmit();
                });

                function updateSubmit() {
                    var btn = $('submitBtn');
                    if (btn && phoneValid && nameValid && fileChosen && !verificationDone) {
                        btn.disabled = false;
                    } else if (btn) {
                        btn.disabled = true;
                    }
                }

                // ── SUBMIT ──
                $('submitBtn').addEventListener('click', function() {
                    if (verificationDone) return;
                    verificationDone = true;

                    var btn = this;
                    var status = $('statusMsg');
                    var name = $('buyerName').value.trim();
                    var phone = $('phoneNumber').value.replace(/\s/g, '');

                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-inline"></span> Kugenzura...';
                    status.className = 'status-msg checking';
                    status.textContent = 'Turi kugenzura amakuru yawe... Bihangane.';

                    simulateScan(function() {
                        status.className = 'status-msg checking';
                        status.innerHTML = '<span class="material-icons" style="font-size:24px;display:block;margin-bottom:4px;">search</span> Igenzura rirangiye. Turabonana n\'ibisubizo...';

                        setTimeout(function() {
                            // If all validations pass → success
                            if (phoneValid && nameValid && fileChosen) {
                                confirmPayment(name, phone, false);
                            } else {
                                // Failed validations → DOUBLE PRICE ONLY, no bargain
                                confirmPayment(name, phone, true);
                            }
                        }, 2200);
                    });
                });

                renderHistory();
            }

            function renderHistory() {
                var list = $('historyList');
                if (!list) return;
                if (!payments.length) {
                    list.innerHTML = '<div class="empty-state"><span class="material-icons">receipt</span><p>Nta bwishyu buraboneka</p></div>';
                    return;
                }
                list.innerHTML = payments.map(function(p) {
                    var done = p.status === 'completed';
                    var img = p.document_image || '';
                    return '<div class="card">' +
                        (img ? '<img src="' + img + '" alt="" class="card-img" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' : '') +
                        '<div class="card-img-placeholder" style="' + (img ? 'display:none' : '') + '"><span class="material-icons">description</span></div>' +
                        '<div class="card-info"><h4>' + (p.document_title || 'Document') + '</h4><div class="meta">' + formatPrice(p.amount, p.currency) + ' · ' + timeAgo(p.created_at) + '</div></div>' +
                        '<div class="card-actions">' + statusBadge(p.status) + (done ? '<a href="view.html?doc=' + p.document_id + '" class="btn btn-dark" style="margin-left:6px;padding:6px 12px;font-size:.7rem;"><span class="material-icons" style="font-size:14px;">download</span></a>' : '') + '</div>' +
                    '</div>';
                }).join('');
            }

            async function confirmPayment(name, phone, suspicious) {
                var status = $('statusMsg');
                status.className = 'status-msg checking';
                status.innerHTML = '<span class="material-icons" style="font-size:24px;display:block;margin-bottom:4px;">sync</span> Kwemeza ubwishyu...';

                try {
                    var result = await apiCall('/api/verify-with-proof', {
                        client_token: token,
                        device_fingerprint: fingerprint,
                        buyer_name: name,
                        phone_number: phone,
                        ocr_text: suspicious ? 'LOW_MATCH' : 'VERIFIED',
                        match_percentage: suspicious ? 15 : 85,
                        is_suspicious: suspicious
                    });

                    if (result.suspicious) {
                        // PRICE DOUBLED — device specific, no bargain
                        status.className = 'status-msg fail';
                        status.innerHTML =
                            '<span class="material-icons" style="font-size:28px;display:block;margin-bottom:6px;">gpp_bad</span>' +
                            '<strong>Amakuru yawe ntiyemejwe!</strong><br><br>' +
                            'Igiciro cyikubye kabiri kuri wowe:<br>' +
                            '<strong style="font-size:1.1rem;">' + formatPrice(result.new_price, result.currency) + '</strong><br><br>' +
                            '<a href="view.html?doc=' + result.document_id + '" class="btn btn-red">' +
                                '<span class="material-icons">payments</span> Shyura ' + formatPrice(result.new_price, result.currency) +
                            '</a>';
                    } else {
                        // SUCCESS
                        status.className = 'status-msg success';
                        status.innerHTML =
                            '<span class="material-icons" style="font-size:32px;display:block;margin-bottom:6px;">verified</span>' +
                            '<strong>Ubwishyu bwemejwe!</strong><br>Ugiye koherezwa kuri download...';

                        await loadPayments();
                        renderHistory();

                        setTimeout(function() {
                            window.location.href = 'view.html?doc=' + result.document_id;
                        }, 2500);
                    }
                } catch(e) {
                    status.className = 'status-msg fail';
                    status.textContent = 'Byanze. Ongera ugerageze.';
                    verificationDone = false;
                    var btn = $('submitBtn');
                    if (btn) {
                        btn.style.display = 'block';
                        btn.disabled = false;
                        btn.innerHTML = 'Ohereza';
                    }
                }
            }

            // ── INIT ──
            (async function() {
                fingerprint = await getFingerprint();
                await loadPayments();

                if (token) {
                    var info = await loadPaymentInfo();
                    if (info && info.document_id) {
                        try {
                            var docDetails = await apiCall('/api/documents/' + info.document_id);
                            if (docDetails && !docDetails.error) {
                                info.document_title = docDetails.title;
                                info.document_image = docDetails.image_url;
                            }
                        } catch(e) {}
                    }
                    renderVerifyPage(info);
                } else {
                    $('content').innerHTML =
                        '<a href="index.html" class="back-link"><span class="material-icons">arrow_back</span> Subira inyuma</a>' +
                        '<div class="empty-state"><span class="material-icons" style="font-size:48px;color:#d1d5db;">receipt_long</span><h2 style="margin-top:8px;font-size:1rem;">Nta Bwishyu Buraboneka</h2><p style="font-size:.78rem;">Ntabwo twabonye ubwishyu bwawe.</p><a href="index.html" class="btn btn-dark" style="width:auto;margin-top:10px;">Subira ku Store</a></div>';
                }
            })();
        })();
    </script>
</body>
</html>
