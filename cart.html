<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Purchases — DocStore</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        :root {
            --bg:#f8f9fb; --surface:#fff; --text:#111; --sub:#6b7280;
            --border:#eef0f2; --accent:#111; --green:#059669;
            --green-bg:#ecfdf5; --green-text:#065f46;
            --orange:#ea580c; --orange-bg:#fff7ed; --orange-text:#9a3412;
            --red:#dc2626; --red-bg:#fef2f2; --red-text:#991b1b;
            --blue:#2563eb; --blue-bg:#eff6ff; --blue-text:#1e40af;
            --yellow:#ca8a04; --yellow-bg:#fefce8; --yellow-text:#854d0e;
            --radius:16px; --radius-sm:10px; --tr:0.2s cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:50}
        .topbar-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px}
        .logo{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:7px;letter-spacing:-.3px;text-decoration:none;color:var(--text)}
        .logo .material-icons{font-size:22px}
        .nav-links{display:flex;gap:6px}
        .nav-link{padding:7px 14px;border-radius:20px;font-size:.78rem;font-weight:500;text-decoration:none;color:var(--sub);transition:all var(--tr)}
        .nav-link:hover{background:#f3f4f6;color:var(--text)}
        .nav-link.active{background:var(--accent);color:#fff}
        .container{max-width:900px;margin:0 auto;padding:24px 16px 60px}
        .banner{background:var(--green-bg);border:1px solid #a7f3d0;border-radius:var(--radius);padding:20px 18px;display:flex;align-items:center;gap:14px;margin-bottom:24px;animation:fadeSlide .4s ease}
        @keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .banner .banner-icon{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .banner .banner-icon .material-icons{color:var(--green);font-size:24px}
        .banner h2{font-size:1rem;font-weight:600}
        .banner p{font-size:.78rem;color:var(--green-text)}
        .banner.pending{background:var(--yellow-bg);border-color:#fde68a}
        .banner.pending .banner-icon .material-icons{color:var(--yellow)}
        .banner.pending h2,.banner.pending p{color:var(--yellow-text)}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
        .stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--border);display:flex;align-items:center;gap:10px}
        .stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .stat-dot.green{background:var(--green)}
        .stat-dot.orange{background:var(--orange)}
        .stat-dot.red{background:var(--red)}
        .stat-dot.yellow{background:var(--yellow)}
        .stat-dot.blue{background:var(--blue)}
        .stat-val{font-size:1.2rem;font-weight:700}
        .stat-label{font-size:.7rem;color:var(--sub)}
        .section-title{font-size:1rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
        .list{display:grid;gap:10px}
        .card{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:box-shadow var(--tr)}
        .card:hover{box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .card-img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0}
        .card-img-placeholder{width:52px;height:52px;border-radius:10px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .card-img-placeholder .material-icons{color:#d1d5db;font-size:24px}
        .card-info{flex:1;min-width:160px}
        .card-info h4{font-size:.9rem;font-weight:600;margin-bottom:2px}
        .card-info .meta{font-size:.72rem;color:var(--sub);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .card-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .badge{font-size:.7rem;font-weight:600;padding:5px 12px;border-radius:20px;white-space:nowrap;display:flex;align-items:center;gap:4px}
        .badge .material-icons{font-size:14px}
        .badge-completed{background:var(--green-bg);color:var(--green-text)}
        .badge-pending{background:var(--yellow-bg);color:var(--yellow-text)}
        .badge-failed{background:var(--red-bg);color:var(--red-text)}
        .badge-expired{background:#f3f4f6;color:#6b7280}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:25px;font-weight:600;font-size:.8rem;cursor:pointer;border:none;font-family:'Poppins',sans-serif;text-decoration:none;transition:all var(--tr);-webkit-tap-highlight-color:transparent}
        .btn .material-icons{font-size:16px}
        .btn-dark{background:var(--accent);color:#fff}
        .btn-dark:hover{background:#333}
        .btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}
        .btn-outline:hover{background:#f9fafb}
        .empty-state{text-align:center;padding:50px 20px;color:#9ca3af}
        .empty-state .material-icons{font-size:52px;margin-bottom:12px}
        .empty-state h2{font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:6px}
        .empty-state p{font-size:.85rem;margin-bottom:16px}
        .loader-wrap{text-align:center;padding:60px 20px;color:#9ca3af}
        .spinner{width:30px;height:30px;border:3px solid #e5e7eb;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:50px;font-size:.8rem;font-weight:500;font-family:'Poppins',sans-serif;z-index:300;transition:transform .3s;pointer-events:none;white-space:nowrap}
        .toast.show{transform:translateX(-50%) translateY(0)}
        @media(max-width:500px){.card{flex-direction:column;align-items:flex-start}.card-actions{width:100%;justify-content:space-between}.stats-row{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html" class="logo"><span class="material-icons">description</span> DocStore</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Store</a>
                <a href="cart.html" class="nav-link active">My Purchases</a>
            </div>
        </div>
    </header>

    <div class="container" id="content">
        <div class="loader-wrap"><div class="spinner"></div><p>Loading purchases…</p></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            var SUPABASE_URL = 'https://wuswjdmshzzxnlsugukm.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1c3dqZG1zaHp6eG5sc3VndWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjM3NDcsImV4cCI6MjA5NzAzOTc0N30.p92FyfHtBiEC0CEeFEjcV5kz0ZJiSLFtIWUg0EhEO10';

            var fingerprint = null;
            var payments = [];
            var params = new URLSearchParams(window.location.search);
            var justPaid = params.get('status') === 'success';
            var returnToken = params.get('token') || params.get('client_token');

            function $(id) { return document.getElementById(id); }

            function toast(msg) {
                var t = $('toast');
                t.textContent = msg;
                t.classList.add('show');
                clearTimeout(t._tid);
                t._tid = setTimeout(function(){ t.classList.remove('show'); }, 3000);
            }

            async function apiCall(path, body) {
                var ctrl = new AbortController();
                var t = setTimeout(function(){ ctrl.abort(); }, 12000);
                try {
                    var opts = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' }, signal: ctrl.signal };
                    if (body) opts.body = JSON.stringify(body);
                    var r = await fetch(path, opts);
                    clearTimeout(t);
                    var txt = await r.text();
                    if (!r.ok) throw new Error('Request failed');
                    try { return JSON.parse(txt); } catch(e) { throw new Error('Invalid response'); }
                } catch(err) {
                    clearTimeout(t);
                    throw err;
                }
            }

            async function getFingerprint() {
                try {
                    var fp = await FingerprintJS.load();
                    return (await fp.get()).visitorId;
                } catch(e) {
                    return 'fb_'+btoa(navigator.userAgent+screen.width+navigator.language).replace(/[=+/]/g,'').slice(0,48);
                }
            }

            function formatPrice(n, c) { return parseInt(n).toLocaleString() + ' ' + (c || 'RWF'); }

            function statusBadge(s) {
                var map = {
                    completed: { c:'badge-completed', i:'check_circle', l:'Completed' },
                    pending: { c:'badge-pending', i:'hourglass_empty', l:'Pending' },
                    failed: { c:'badge-failed', i:'cancel', l:'Failed' },
                    expired: { c:'badge-expired', i:'timer_off', l:'Expired' }
                };
                var m = map[s] || map.pending;
                return '<span class="badge '+m.c+'"><span class="material-icons">'+m.i+'</span> '+m.l+'</span>';
            }

            function timeAgo(d) {
                if (!d) return '';
                var diff = (new Date() - new Date(d)) / 60000;
                if (diff < 1) return 'Just now';
                if (diff < 60) return Math.floor(diff)+'m ago';
                if (diff < 1440) return Math.floor(diff/60)+'h ago';
                if (diff < 10080) return Math.floor(diff/1440)+'d ago';
                return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
            }

            async function loadPayments() {
                fingerprint = await getFingerprint();
                try {
                    payments = await apiCall('/api/user-payments', { device_fingerprint: fingerprint });
                } catch(e) {
                    payments = [];
                }
            }

            function render() {
                var completed = payments.filter(function(p){ return p.status === 'completed'; });
                var pending = payments.filter(function(p){ return p.status === 'pending'; });
                var failed = payments.filter(function(p){ return p.status === 'failed'; });
                var total = completed.reduce(function(s,p){ return s + (p.amount||0); }, 0);
                var content = $('content');
                var html = '';

                // Banner
                if (justPaid) {
                    html += '<div class="banner"><div class="banner-icon"><span class="material-icons">check_circle</span></div><div><h2>Payment Successful!</h2><p>Your document is ready. Redirecting to download...</p></div></div>';
                } else if (pending.length > 0) {
                    html += '<div class="banner pending"><div class="banner-icon"><span class="material-icons">hourglass_empty</span></div><div><h2>Payment in Progress</h2><p>We\'re waiting for confirmation from AfriPay. This may take a moment.</p></div></div>';
                }

                // Stats
                html += '<div class="stats-row">' +
                    '<div class="stat-card"><div class="stat-dot green"></div><div><div class="stat-val">'+completed.length+'</div><div class="stat-label">Completed</div></div></div>' +
                    '<div class="stat-card"><div class="stat-dot orange"></div><div><div class="stat-val">'+pending.length+'</div><div class="stat-label">In Progress</div></div></div>' +
                    '<div class="stat-card"><div class="stat-dot red"></div><div><div class="stat-val">'+failed.length+'</div><div class="stat-label">Failed</div></div></div>' +
                    '<div class="stat-card"><div class="stat-dot yellow"></div><div><div class="stat-val">'+formatPrice(total,'RWF')+'</div><div class="stat-label">Total Spent</div></div></div>' +
                '</div>';

                // List
                html += '<div class="section-title"><span class="material-icons">receipt_long</span> Purchase History</div>';

                if (!payments.length) {
                    html += '<div class="empty-state"><span class="material-icons">shopping_bag</span><h2>No purchases yet</h2><p>Browse our store to find documents.</p><a href="index.html" class="btn btn-dark"><span class="material-icons">store</span> Browse Store</a></div>';
                } else {
                    html += '<div class="list">';
                    payments.forEach(function(p) {
                        var isDone = p.status === 'completed';
                        var img = p.document_image;
                        html += '<div class="card">' +
                            (img ? '<img src="'+img+'" alt="" class="card-img" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' : '') +
                            '<div class="card-img-placeholder" style="'+(img?'display:none':'')+'"><span class="material-icons">description</span></div>' +
                            '<div class="card-info"><h4>'+(p.document_title||'Unknown')+'</h4><div class="meta"><span>'+formatPrice(p.amount,p.currency)+'</span><span>·</span><span>'+timeAgo(p.created_at)+'</span></div></div>' +
                            '<div class="card-actions">' +
                                statusBadge(p.status) +
                                (isDone
                                    ? '<a href="view.html?doc='+p.document_id+'" class="btn btn-dark"><span class="material-icons">download</span> Download</a>'
                                    : '<a href="view.html?doc='+p.document_id+'" class="btn btn-outline"><span class="material-icons">refresh</span> Retry</a>'
                                ) +
                            '</div>' +
                        '</div>';
                    });
                    html += '</div>';
                    html += '<div style="text-align:center;margin-top:20px;"><a href="index.html" class="btn btn-dark"><span class="material-icons">store</span> Browse More</a></div>';
                }

                content.innerHTML = html;

                // Auto-redirect if just paid
                if (justPaid && returnToken) {
                    // Poll for payment confirmation then redirect to view
                    var attempts = 0;
                    var poll = setInterval(async function() {
                        attempts++;
                        try {
                            var r = await apiCall('/api/check-payment', { client_token: returnToken });
                            if (r.paid && r.status === 'completed') {
                                clearInterval(poll);
                                window.location.href = 'view.html?doc=' + r.document_id;
                            }
                        } catch(e) {}
                        if (attempts > 30) clearInterval(poll);
                    }, 3000);
                }
            }

            (async function() {
                try {
                    await loadPayments();
                    render();
                } catch(e) {
                    $('content').innerHTML = '<div class="empty-state"><span class="material-icons">error_outline</span><h2>Error</h2><p>'+e.message+'</p><a href="index.html" class="btn btn-dark">Back to Store</a></div>';
                }
            })();
        })();
    </script>
</body>
</html>
