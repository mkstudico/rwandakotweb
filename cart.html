<!DOCTYPE html>
<html lang="rw" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <title>Kwemeza Ubwishyu — KotWeb</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --bg-main: #f4f2ee;
            --bg-surface: #ffffff;
            --bg-hover: #f9fafb;
            --bg-input: #eef3f8;
            --border: #e5e7eb;
            --text-primary: #191919;
            --text-secondary: #595856;
            --text-tertiary: #868482;
            --primary: #6c47ff;
            --primary-hover: #5835e8;
            --primary-light: #f0ebff;
            --success: #057642;
            --success-bg: #e9f7ef;
            --danger: #d11124;
            --danger-bg: #fdecea;
            --warning: #b85c00;
            --warning-bg: #fff8f0;
            --card-shadow: 0 0 0 1px rgba(0,0,0,0.05);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{-webkit-font-smoothing:antialiased;font-size:16px;scroll-behavior:smooth}
        body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);line-height:1.5;min-height:100vh}
        a{color:inherit;text-decoration:none}
        button{cursor:pointer;font-family:inherit;border:none;background:transparent}
        input{font-family:inherit;font-size:inherit}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        @keyframes spin{to{transform:rotate(360deg)}}

        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1rem;height:50px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
        .topbar-inner{max-width:640px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
        .logo{font-size:.95rem;font-weight:800;display:flex;align-items:center;gap:6px;letter-spacing:-.3px;color:var(--text-primary);text-decoration:none}
        .logo span{width:30px;height:30px;clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%);background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.7rem;flex-shrink:0}
        .nav-link{padding:6px 12px;border-radius:var(--radius-full);font-size:.7rem;font-weight:500;text-decoration:none;color:var(--text-secondary);transition:all var(--transition-fast)}
        .nav-link:hover{background:var(--bg-hover)}
        .nav-link.active{background:var(--primary-light);color:var(--primary);font-weight:600}

        .container{max-width:600px;margin:0 auto;padding:1rem .85rem 4rem}

        .back-link{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:500;color:var(--text-secondary);padding:7px 12px;margin-bottom:.85rem;border-radius:var(--radius-full);transition:all var(--transition-fast);-webkit-tap-highlight-color:transparent;background:var(--bg-surface);border:1px solid var(--border);text-decoration:none}
        .back-link:hover{background:var(--bg-hover);color:var(--text-primary)}

        .doc-mini{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%);padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:1rem}
        .doc-mini img{width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0}
        .doc-mini .doc-icon-placeholder{width:44px;height:44px;border-radius:6px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#d1d5db;font-size:1.2rem}
        .doc-mini .doc-info{flex:1;min-width:0}
        .doc-mini .doc-info h4{font-size:.8rem;font-weight:600;word-break:break-word}
        .doc-mini .doc-info span{font-size:.68rem;color:var(--text-tertiary)}

        .verify-card{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%);padding:1.25rem 1rem 1.1rem;box-shadow:var(--card-shadow)}
        .verify-card .shield-icon{width:46px;height:46px;border-radius:50%;background:var(--warning-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
        .verify-card .shield-icon i{font-size:22px;color:var(--warning)}
        .verify-card h2{font-size:1.05rem;font-weight:700;text-align:center;letter-spacing:-.3px;margin-bottom:2px}
        .verify-card .subtitle{text-align:center;color:var(--text-secondary);font-size:.72rem;margin-bottom:1rem}

        .warn-box{background:var(--danger-bg);border:1px solid #fecaca;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);padding:10px 12px;margin-bottom:1rem}
        .warn-box .warn-head{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;color:var(--danger);margin-bottom:3px}
        .warn-box .warn-body{font-size:.66rem;color:var(--danger);line-height:1.4}
        .warn-box .warn-price{font-weight:700;font-size:.76rem;color:var(--danger);margin-top:3px}

        .field-group{margin-bottom:12px}
        .field-group label{display:block;font-size:.72rem;font-weight:600;color:var(--text-primary);margin-bottom:3px}
        .field-group input[type="text"],.field-group input[type="tel"]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:.8rem;font-family:var(--font-family);outline:none;transition:all var(--transition-fast);background:var(--bg-input);-webkit-appearance:none}
        .field-group input:focus{border-color:var(--primary);background:var(--bg-surface);box-shadow:0 0 0 3px rgba(108,71,255,.08)}
        .field-group input.error{border-color:var(--danger);background:var(--danger-bg)}
        .field-group input.valid{border-color:var(--success);background:var(--success-bg)}
        .field-group .err-msg{font-size:.64rem;color:var(--danger);margin-top:2px;display:none}
        .field-group .err-msg.show{display:block}
        .field-group .helper{font-size:.64rem;color:var(--text-tertiary);margin-top:2px}

        .file-upload-area{width:100%;padding:16px 12px;border:2px dashed var(--border);border-radius:var(--radius-md);text-align:center;cursor:pointer;transition:all var(--transition-fast);background:var(--bg-input);position:relative}
        .file-upload-area:hover{border-color:var(--primary);background:var(--bg-surface)}
        .file-upload-area.has-file{border-color:var(--success);background:var(--success-bg)}
        .file-upload-area i{font-size:24px;color:#d1d5db;display:block;margin:0 auto 3px}
        .file-upload-area .upload-text{font-size:.7rem;color:var(--text-tertiary)}
        .file-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
        .preview-thumb{width:100%;max-height:120px;object-fit:contain;border-radius:var(--radius-sm);margin-top:6px;border:1px solid var(--border);display:none}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border-radius:var(--radius-full);font-weight:600;font-size:.82rem;cursor:pointer;border:none;font-family:var(--font-family);transition:all var(--transition-fast);-webkit-tap-highlight-color:transparent;width:100%;box-shadow:0 2px 8px rgba(0,0,0,.06)}
        .btn i{font-size:17px}
        .btn:active{transform:scale(.97)}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover{background:var(--primary-hover);box-shadow:0 4px 16px rgba(108,71,255,.3)}
        .btn-primary:disabled{opacity:.45;pointer-events:none}
        .btn-danger{background:var(--danger);color:#fff;width:auto;display:inline-flex}
        .btn-danger:hover{background:#b91c1c}

        .big-loader-wrap{display:none;text-align:center;padding:1.5rem 1rem;animation:fadeIn .3s ease}
        .big-loader-wrap.active{display:block}
        .big-spinner{width:52px;height:52px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
        .scan-progress{width:100%;height:5px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:10px}
        .scan-progress .fill{height:100%;background:var(--primary);border-radius:10px;width:0%;transition:width .2s linear}
        .scan-status{font-size:.7rem;color:var(--text-secondary);margin-top:6px;text-align:center}

        .status-msg{text-align:center;padding:14px;border-radius:var(--radius-md);margin-top:12px;display:none;font-size:.78rem;font-weight:500;animation:fadeIn .3s ease}
        .status-msg.success{background:var(--success-bg);color:var(--success);display:block}
        .status-msg.fail{background:var(--danger-bg);color:var(--danger);display:block}
        .status-msg.checking{background:var(--primary-light);color:var(--primary);display:block}

        .history-section{margin-top:1.5rem}
        .section-title{font-size:.9rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}
        .section-title i{color:var(--primary)}
        .list{display:grid;gap:6px}
        .card{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);padding:11px 12px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
        .card img{width:38px;height:38px;border-radius:6px;object-fit:cover;flex-shrink:0}
        .card .card-icon-placeholder{width:38px;height:38px;border-radius:6px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#d1d5db;font-size:1rem}
        .card .card-info{flex:1;min-width:100px}
        .card .card-info h4{font-size:.76rem;font-weight:600}
        .card .card-info .meta{font-size:.64rem;color:var(--text-tertiary)}
        .card .card-actions{flex-shrink:0}
        .badge{font-size:.62rem;font-weight:600;padding:3px 8px;border-radius:var(--radius-full);display:inline-flex;align-items:center;gap:3px}
        .badge i{font-size:11px}
        .badge-done{background:var(--success-bg);color:var(--success)}
        .badge-wait{background:var(--warning-bg);color:var(--warning)}
        .badge-fail{background:var(--danger-bg);color:var(--danger)}
        .btn-sm{padding:5px 11px;font-size:.66rem;border-radius:var(--radius-full);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;background:var(--primary);color:#fff;width:auto}

        .empty-state{text-align:center;padding:2rem 1rem;color:var(--text-tertiary)}
        .empty-state i{font-size:40px;display:block;margin-bottom:6px;color:#d1d5db}

        .pc-block-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:all var(--transition-base)}
        .pc-block-overlay.active{opacity:1;visibility:visible}
        .pc-block-card{background:var(--bg-surface);border-radius:var(--radius-xl);max-width:380px;width:100%;padding:2rem 1.5rem;text-align:center;animation:modalIn .25s ease;box-shadow:0 12px 40px rgba(0,0,0,.2)}
        .pc-block-card i{font-size:44px;color:var(--warning);display:block;margin-bottom:10px}
        .pc-block-card h3{font-size:1rem;font-weight:700;margin-bottom:6px}
        .pc-block-card p{font-size:.76rem;color:var(--text-secondary);margin-bottom:1rem;line-height:1.5}

        .toast-container{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:400;pointer-events:none}
        .toast{padding:.55rem .9rem;border-radius:var(--radius-full);font-size:.72rem;font-weight:500;background:var(--text-primary);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideUp .3s ease-out;pointer-events:auto;white-space:nowrap}
        .toast.err{background:var(--danger)}

        @media(max-width:480px){
            .verify-card{padding:1rem .8rem .9rem}
            .card{flex-direction:column;align-items:flex-start}
            .card-actions{width:100%;text-align:right}
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-inner">
            <a href="index.html" class="logo"><span>K</span> KotWeb</a>
            <a href="cart.html" class="nav-link active">Kwemeza</a>
        </div>
    </header>

    <div class="container" id="content">
        <div style="text-align:center;padding:3rem 1rem;">
            <div style="width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;"></div>
            <p style="color:var(--text-secondary);font-size:.8rem;">Tegereza gato...</p>
        </div>
    </div>

    <div class="pc-block-overlay" id="pcBlockOverlay">
        <div class="pc-block-card">
            <i class="bx bx-desktop"></i>
            <h3>Ntabwo Bishoboka Kuri PC</h3>
            <p>Iyi page ikora gusa kuri telefone. Fungura kuri telefone kugirango ukomeze.</p>
            <div style="background:var(--warning-bg);border-radius:var(--radius-md);padding:10px 14px;font-size:.7rem;color:var(--warning);font-weight:600;">
                <i class="bx bx-smartphone"></i> Fungura kuri telefone
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            'use strict';

            var SUPABASE_URL = 'https://wuswjdmshzzxnlsugukm.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1c3dqZG1zaHp6eG5sc3VndWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjM3NDcsImV4cCI6MjA5NzAzOTc0N30.p92FyfHtBiEC0CEeFEjcV5kz0ZJiSLFtIWUg0EhEO10';

            var fingerprint = null;
            var payments = [];
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token') || params.get('client_token') || null;
            var currentPayment = null;
            var phoneValid = false;
            var nameValid = false;
            var fileChosen = false;
            var verificationDone = false;
            var keywords = [];
            var ocrText = '';
            var ocrDone = false;
            var uploadedFile = null;

            function $(id) { return document.getElementById(id); }
            function toast(msg, isErr) { var t = document.createElement('div'); t.className = 'toast' + (isErr ? ' err' : ''); t.textContent = msg; $('toastContainer').appendChild(t); setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .25s'; setTimeout(function(){ t.remove(); },250); },2600); }

            function isMobile() { return /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 0 && window.innerWidth < 768); }

            if (!isMobile()) {
                $('content').innerHTML = '<div class="empty-state"><i class="bx bx-desktop"></i><h2 style="font-size:1rem;">Ntabwo Bishoboka Kuri PC</h2><p style="font-size:.76rem;">Iyi page ikora gusa kuri telefone.</p></div>';
                $('pcBlockOverlay').classList.add('active');
            }

            async function apiCall(path, body) {
                var opts = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                var res = await fetch(path, opts);
                var txt = await res.text();
                try { return JSON.parse(txt); } catch(e) { return { error: 'Invalid response' }; }
            }

            async function getFingerprint() {
                try { var fp = await FingerprintJS.load(); return (await fp.get()).visitorId; }
                catch(e) { return 'fb_' + btoa(navigator.userAgent + screen.width + navigator.language).replace(/[=+/]/g, '').slice(0, 48); }
            }

            function formatPrice(n, c) { return parseInt(n).toLocaleString() + ' ' + (c || 'RWF'); }

            function statusBadge(s) {
                var m = { completed: { c: 'badge-done', i: 'bx-check-circle', l: 'Yemejwe' }, pending: { c: 'badge-wait', i: 'bx-time-five', l: 'Itegerejwe' }, failed: { c: 'badge-fail', i: 'bx-x-circle', l: 'Byanze' } };
                var b = m[s] || m.pending;
                return '<span class="badge ' + b.c + '"><i class="' + b.i + '"></i> ' + b.l + '</span>';
            }

            function timeAgo(d) { if (!d) return ''; var diff = (Date.now() - new Date(d).getTime()) / 60000; if (diff < 1) return 'Ubu gato'; if (diff < 60) return Math.floor(diff) + ' min ishize'; if (diff < 1440) return Math.floor(diff / 60) + ' h ishize'; return new Date(d).toLocaleDateString(); }

            function validatePhone(num) { return /^07[89]\d{7}$/.test(num.replace(/\s/g, '')); }
            function validateName(name) { var parts = name.trim().split(/\s+/); return parts.length >= 2 && parts[0].length >= 2 && parts[1].length >= 2; }

            async function loadKeywords() {
                try { var r = await fetch('/words.json'); var d = await r.json(); keywords = d.keywords || []; }
                catch(e) { keywords = ['mbere','amafaranga','yakiriwe','konti','transaction','completed','successful','payment','mtn','airtel','mobile','money','momo','kwishyura','ishyuwe','rwf','frw','ubwishyu','bwakiriwe','neza','twakiriye','kohereza','yoherejwe']; }
            }

            // ── REAL OCR — ENGLISH ONLY (kin data doesn't exist on CDN) ──
            async function performOCR(file) {
                return new Promise(function(resolve) {
                    try {
                        Tesseract.recognize(file, 'eng', {
                            logger: function(info) {
                                if (info.status === 'recognizing text') {
                                    var pct = Math.round(info.progress * 100);
                                    var fill = $('scanFill');
                                    var label = $('scanLabel');
                                    if (fill) fill.style.width = Math.min(pct, 90) + '%';
                                    if (label) label.textContent = 'Gusoma amagambo... ' + pct + '%';
                                }
                            }
                        }).then(function(result) {
                            resolve(result.data.text || '');
                        }).catch(function() {
                            resolve('');
                        });
                    } catch(e) { resolve(''); }
                });
            }

            function analyzeOCR(text) {
                if (!text || !keywords.length) return { percentage: 0, matches: [], total: keywords.length, passed: false };
                var lower = text.toLowerCase();
                var matches = [];
                keywords.forEach(function(kw) {
                    if (lower.indexOf(kw.toLowerCase()) !== -1) matches.push(kw);
                });
                var pct = Math.round((matches.length / keywords.length) * 100);
                var passed = pct >= 30;
                return { percentage: pct, matches: matches, total: keywords.length, passed: passed };
            }

            function runScanAnimation(callback) {
                var barWrap = $('bigLoaderWrap');
                var fill = $('scanFill');
                var label = $('scanLabel');
                if (!barWrap || !fill) { callback(); return; }
                barWrap.classList.add('active');
                fill.style.width = '0%';
                if (label) label.textContent = 'Itegereze...';
                var steps = [
                    { to: 15, ms: 400, text: 'Gutangira igenzura...' },
                    { to: 35, ms: 500, text: 'Gusoma amagambo...' },
                    { to: 55, ms: 550, text: 'Kugereranya amakuru...' },
                    { to: 72, ms: 500, text: 'Gushakisha ibimenyetso...' },
                    { to: 88, ms: 600, text: 'Kureba numero...' },
                    { to: 100, ms: 400, text: 'Birangiye.' }
                ];
                var i = 0;
                function next() { if (i >= steps.length) { setTimeout(callback, 350); return; } var s = steps[i]; fill.style.width = s.to + '%'; if (label) label.textContent = s.text; i++; setTimeout(next, s.ms); }
                next();
            }

            async function loadPaymentInfo() { if (!token) return null; try { return await apiCall('/api/check-payment', { client_token: token }); } catch(e) { return null; } }
            async function loadPayments() { try { payments = await apiCall('/api/user-payments', { device_fingerprint: fingerprint }); } catch(e) { payments = []; } }

            function renderVerifyPage(paymentInfo) {
                if (!paymentInfo || paymentInfo.error || !paymentInfo.document_id) {
                    $('content').innerHTML = '<a href="index.html" class="back-link"><i class="bx bx-arrow-back"></i> Subira inyuma</a><div class="empty-state"><i class="bx bx-error-circle"></i><p>Ntabwo twabonye amakuru.</p><a href="index.html" class="btn btn-primary" style="width:auto;">Subira ku Store</a></div>';
                    return;
                }
                currentPayment = paymentInfo;
                var doublePrice = (paymentInfo.amount || 500) * 2;
                var currency = paymentInfo.currency || 'RWF';
                var docTitle = paymentInfo.document_title || paymentInfo.title || 'iyi document';
                var docImage = paymentInfo.document_image || paymentInfo.image_url || '';

                $('content').innerHTML =
                    '<a href="index.html" class="back-link"><i class="bx bx-arrow-back"></i> Subira inyuma</a>' +
                    '<div class="doc-mini">' +
                        (docImage ? '<img src="' + docImage + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' : '') +
                        '<div class="doc-icon-placeholder" style="' + (docImage ? 'display:none' : '') + '"><i class="bx bx-file"></i></div>' +
                        '<div class="doc-info"><h4>' + docTitle + '</h4><span>Igiciro: ' + formatPrice(paymentInfo.amount, currency) + '</span></div>' +
                    '</div>' +
                    '<div class="verify-card">' +
                        '<div class="shield-icon"><i class="bx bx-shield-alt"></i></div>' +
                        '<h2>Kwemeza Ubwishyu</h2>' +
                        '<p class="subtitle">Uzuza amakuru yawe neza kugirango twemeze ko ubwishyu bwakozwe</p>' +
                        '<div class="warn-box">' +
                            '<div class="warn-head"><i class="bx bx-error"></i> IBUKA</div>' +
                            '<div class="warn-body">Niba amakuru utanga asa nk\'ay\'impimbano, <strong>igiciro kizakuba kabiri</strong> kuri wowe gusa.<br>Uzishyura: <span class="warn-price">' + formatPrice(doublePrice, currency) + '</span></div>' +
                        '</div>' +
                        '<div class="field-group"><label>Shyiramo amazina yawe yombi</label><input type="text" class="input" id="buyerName" placeholder="Urugero: Niyonzima Patrick" autocomplete="off"><span class="err-msg" id="nameErr">Amazina abiri akenewe</span></div>' +
                        '<div class="field-group"><label>Shyiramo numero yohereje amafaranga</label><input type="tel" class="input" id="phoneNumber" placeholder="0788123456" maxlength="10" autocomplete="off"><span class="err-msg" id="phoneErr">Numero igomba kuba 10, itangirira kuri 078 cyangwa 079</span><span class="helper">Numero ya MTN cyangwa Airtel wakoresheje</span></div>' +
                        '<div class="field-group">' +
                            '<label>Shyiramo screenshot ya message wakiriye</label>' +
                            '<div class="file-upload-area" id="fileArea">' +
                                '<i class="bx bx-image-add"></i>' +
                                '<span class="upload-text">Kanda hano ushyiremo screenshot</span>' +
                                '<input type="file" id="screenshotInput" accept="image/*">' +
                            '</div>' +
                            '<img class="preview-thumb" id="previewImg">' +
                        '</div>' +
                        '<div class="big-loader-wrap" id="bigLoaderWrap">' +
                            '<div class="big-spinner"></div>' +
                            '<p style="font-size:.78rem;font-weight:600;color:var(--text-primary);">Turi kugenzura amakuru...</p>' +
                            '<div class="scan-progress"><div class="fill" id="scanFill"></div></div>' +
                            '<div class="scan-status" id="scanLabel">Itegereze...</div>' +
                        '</div>' +
                        '<div class="status-msg" id="statusMsg"></div>' +
                        '<button class="btn btn-primary" id="submitBtn" disabled>Ohereza</button>' +
                    '</div>' +
                    '<div class="history-section">' +
                        '<div class="section-title"><i class="bx bx-receipt"></i> Amateka y\'Ubwishyu</div>' +
                        '<div class="list" id="historyList"></div>' +
                    '</div>';

                var fileArea = $('fileArea');
                var fileInput = $('screenshotInput');
                fileArea.addEventListener('click', function(e) { if (e.target !== fileInput) fileInput.click(); });
                fileInput.addEventListener('change', function(e) {
                    e.stopPropagation();
                    var file = this.files[0];
                    if (!file) { fileChosen = false; fileArea.classList.remove('has-file'); $('previewImg').style.display = 'none'; uploadedFile = null; ocrDone = false; updateSubmit(); return; }
                    fileChosen = true; uploadedFile = file;
                    fileArea.classList.add('has-file');
                    fileArea.querySelector('.upload-text').textContent = '✓ ' + file.name;
                    var reader = new FileReader();
                    reader.onload = function(ev) { $('previewImg').src = ev.target.result; $('previewImg').style.display = 'block'; };
                    reader.readAsDataURL(file);
                    ocrDone = false;
                    performOCR(file).then(function(text) { ocrText = text; ocrDone = true; });
                    updateSubmit();
                });

                var phoneInput = $('phoneNumber');
                phoneInput.addEventListener('input', function() {
                    var val = this.value.replace(/\s/g, '');
                    if (val.length > 10) { this.value = val.substring(0, 10); return; }
                    if (val.length === 10) {
                        if (validatePhone(val)) { this.classList.remove('error'); this.classList.add('valid'); $('phoneErr').classList.remove('show'); phoneValid = true; }
                        else { this.classList.add('error'); this.classList.remove('valid'); $('phoneErr').classList.add('show'); phoneValid = false; }
                    } else { this.classList.remove('error', 'valid'); $('phoneErr').classList.remove('show'); phoneValid = false; }
                    updateSubmit();
                });

                var nameInput = $('buyerName');
                nameInput.addEventListener('blur', function() {
                    var val = this.value.trim();
                    if (val.length > 0) {
                        if (validateName(val)) { this.classList.remove('error'); this.classList.add('valid'); $('nameErr').classList.remove('show'); nameValid = true; }
                        else { this.classList.add('error'); this.classList.remove('valid'); $('nameErr').classList.add('show'); nameValid = false; }
                    } else { this.classList.remove('error', 'valid'); $('nameErr').classList.remove('show'); nameValid = false; }
                    updateSubmit();
                });

                function updateSubmit() { var btn = $('submitBtn'); if (btn && phoneValid && nameValid && fileChosen && !verificationDone) btn.disabled = false; else if (btn) btn.disabled = true; }

                $('submitBtn').addEventListener('click', function() {
                    if (verificationDone) return;
                    verificationDone = true;
                    var btn = this, status = $('statusMsg'), name = $('buyerName').value.trim(), phone = $('phoneNumber').value.replace(/\s/g, '');
                    btn.disabled = true; btn.style.display = 'none';
                    status.className = 'status-msg checking'; status.textContent = 'Turi kugenzura amakuru yawe...';

                    runScanAnimation(function() {
                        function finishCheck() {
                            var analysis = analyzeOCR(ocrText);
                            var suspicious = !analysis.passed;
                            if (suspicious) { var sp = JSON.parse(localStorage.getItem('kw_suspicious') || '{}'); sp[token] = { amount: currentPayment.amount * 2, date: Date.now() }; localStorage.setItem('kw_suspicious', JSON.stringify(sp)); }
                            confirmPayment(name, phone, suspicious, analysis.percentage);
                        }
                        if (!ocrDone && uploadedFile) { performOCR(uploadedFile).then(function(text) { ocrText = text; finishCheck(); }); }
                        else { finishCheck(); }
                    });
                });

                renderHistory();
            }

            function renderHistory() {
                var list = $('historyList');
                if (!list) return;
                if (!payments.length) { list.innerHTML = '<div class="empty-state"><i class="bx bx-receipt"></i><p>Nta bwishyu buraboneka</p></div>'; return; }
                list.innerHTML = payments.map(function(p) {
                    var done = p.status === 'completed', img = p.document_image || '';
                    return '<div class="card">' + (img ? '<img src="' + img + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' : '') + '<div class="card-icon-placeholder" style="' + (img ? 'display:none' : '') + '"><i class="bx bx-file"></i></div>' + '<div class="card-info"><h4>' + (p.document_title || 'Document') + '</h4><div class="meta">' + formatPrice(p.amount, p.currency) + ' · ' + timeAgo(p.created_at) + '</div></div>' + '<div class="card-actions">' + statusBadge(p.status) + (done ? '<a href="view.html?doc=' + p.document_id + '" class="btn-sm"><i class="bx bx-download"></i></a>' : '') + '</div></div>';
                }).join('');
            }

            async function confirmPayment(name, phone, suspicious, matchPct) {
                var status = $('statusMsg');
                status.className = 'status-msg checking';
                status.innerHTML = '<i class="bx bx-loader bx-spin" style="font-size:22px;display:block;margin-bottom:6px;"></i> Kwemeza ubwishyu...';
                try {
                    var result = await apiCall('/api/verify-with-proof', { client_token: token, device_fingerprint: fingerprint, buyer_name: name, phone_number: phone, ocr_text: ocrText.substring(0, 1000), match_percentage: matchPct, is_suspicious: suspicious });
                    if (result.suspicious) {
                        status.className = 'status-msg fail';
                        status.innerHTML = '<i class="bx bx-shield-x" style="font-size:28px;display:block;margin-bottom:6px;"></i><strong>Amakuru yawe ntiyemejwe!</strong><br>Igiciro cyikubye kabiri kuri wowe:<br><strong style="font-size:1rem;">' + formatPrice(result.new_price, result.currency) + '</strong><br><br><a href="view.html?doc=' + result.document_id + '" class="btn btn-danger">Shyura ' + formatPrice(result.new_price, result.currency) + '</a>';
                    } else {
                        status.className = 'status-msg success';
                        status.innerHTML = '<i class="bx bx-check-shield" style="font-size:32px;display:block;margin-bottom:6px;"></i><strong>Ubwishyu bwemejwe!</strong><br>Ugiye koherezwa kuri download...';
                        await loadPayments(); renderHistory();
                        setTimeout(function() { window.location.href = 'view.html?doc=' + result.document_id; }, 2500);
                    }
                } catch(e) { status.className = 'status-msg fail'; status.textContent = 'Byanze. Ongera ugerageze.'; verificationDone = false; var btn = $('submitBtn'); if (btn) { btn.style.display = 'block'; btn.disabled = false; btn.innerHTML = 'Ohereza'; } }
            }

            (async function() {
                if (!isMobile()) return;
                fingerprint = await getFingerprint();
                await loadKeywords();
                await loadPayments();
                if (token) { var info = await loadPaymentInfo(); if (info && info.document_id) { try { var dd = await apiCall('/api/documents/' + info.document_id); if (dd && !dd.error) { info.document_title = dd.title; info.document_image = dd.image_url; } } catch(e) {} } renderVerifyPage(info); }
                else { $('content').innerHTML = '<a href="index.html" class="back-link"><i class="bx bx-arrow-back"></i> Subira inyuma</a><div class="empty-state"><i class="bx bx-receipt"></i><h2 style="font-size:.95rem;">Nta Bwishyu Buraboneka</h2><p style="font-size:.74rem;">Ntabwo twabonye ubwishyu bwawe.</p><a href="index.html" class="btn btn-primary" style="width:auto;">Subira ku Store</a></div>'; }
            })();
        })();
    </script>
</body>
</html>
