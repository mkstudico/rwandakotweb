<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fb;
            --card-bg: #fff;
            --text: #1a1a2e;
            --sub: #6b7280;
            --border: #e5e7eb;
            --accent: #1a1a2e;
            --green: #059669;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        header {
            text-align: center;
            padding: 52px 20px 36px;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.4px; }
        header p { color: var(--sub); margin-top: 6px; font-size: 0.9rem; }

        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 22px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            box-shadow: 0 6px 28px rgba(0,0,0,0.07);
            transform: translateY(-2px);
        }

        .card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d1d5db;
            font-size: 48px;
        }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }

        .card-body {
            padding: 20px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .card-body p {
            color: var(--sub);
            font-size: 0.83rem;
            flex: 1;
            margin-bottom: 14px;
        }
        .price {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .price small {
            font-size: 0.7rem;
            color: #9ca3af;
            font-weight: 400;
        }
        .methods {
            display: flex; gap: 6px;
            margin-bottom: 14px;
        }
        .methods span {
            font-size: 0.68rem;
            font-weight: 600;
            color: #6b7280;
            background: #f3f4f6;
            border-radius: 20px;
            padding: 4px 10px;
        }

        .btn {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.15s;
        }
        .btn-pay {
            background: var(--accent);
            color: #fff;
        }
        .btn-pay:hover { background: #2d2d44; }
        .btn-paid {
            background: #d1fae5;
            color: #065f46;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loader-wrap {
            text-align: center; padding: 60px 20px; color: #9ca3af;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e5e7eb;
            border-top-color: #6b7280;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; color: #9ca3af; padding: 40px; grid-column: 1/-1; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 18px;
            padding: 30px 26px;
            max-width: 420px;
            width: 92%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .modal h2 { font-size: 1.2rem; margin-bottom: 4px; }
        .modal .price-big { font-size: 1.5rem; font-weight: 700; margin: 10px 0; }
        .modal .muted { color: #888; font-size: 0.83rem; margin-bottom: 16px; }
        .modal .btn-close {
            margin-top: 12px; background: none; border: none;
            color: #9ca3af; cursor: pointer; font-size: 0.83rem; font-family: inherit;
        }
        .modal iframe {
            width: 100%; height: 420px; border: 1px solid #e5e7eb;
            border-radius: 10px; margin-top: 10px; display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 Document Store</h1>
        <p>Pay securely with MTN or Airtel Money</p>
    </header>

    <div class="container">
        <div class="grid" id="docGrid">
            <div class="loader-wrap">
                <div class="spinner"></div>
                <p>Loading documents...</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="payModal">
        <div class="modal" id="modalBody"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wuswjdmshzzxnlsugukm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1c3dqZG1zaHp6eG5sc3VndWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjM3NDcsImV4cCI6MjA5NzAzOTc0N30.p92FyfHtBiEC0CEeFEjcV5kz0ZJiSLFtIWUg0EhEO10';
        const AFRIPAY_APP_ID = '20a9a129bb48f058ed39e1c999aa44e8';
        const AFRIPAY_SECRET = 'JDJ5JDEwJHZmYXJ2';

        let deviceFingerprint = null;
        let currentPayment = { docId: null, token: null };
        let pollInterval = null;
        const paidDocs = new Set();

        function genToken() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let tok = 'tok_';
            for (let i = 0; i < 28; i++) tok += chars[Math.floor(Math.random() * chars.length)];
            return tok + '_' + Date.now().toString(36);
        }

        async function api(path, body = null) {
            const opts = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(path, opts);
            return res.json();
        }

        async function initFingerprint() {
            try {
                const fp = await FingerprintJS.load();
                deviceFingerprint = (await fp.get()).visitorId;
            } catch {
                deviceFingerprint = 'fb_' + btoa(navigator.userAgent + screen.width + navigator.language).replace(/=/g, '').slice(0, 50);
            }
        }

        async function loadDocuments() {
            const docs = await api('/api/documents');
            const grid = document.getElementById('docGrid');

            if (!docs || docs.length === 0) {
                grid.innerHTML = '<p class="empty">No documents available yet.</p>';
                return;
            }

            // Check which docs are already paid
            for (const doc of docs) {
                const res = await api('/api/check-payment', {
                    device_fingerprint: deviceFingerprint,
                    document_id: doc.id
                });
                if (res.already_paid) paidDocs.add(doc.id);
            }

            grid.innerHTML = docs.map(doc => {
                const paid = paidDocs.has(doc.id);
                return `
                    <div class="card">
                        <div class="card-image">
                            ${doc.image_url 
                                ? `<img src="${doc.image_url}" alt="${doc.title}" onerror="this.parentElement.textContent='📄'">`
                                : '📄'}
                        </div>
                        <div class="card-body">
                            <h3>${doc.title}</h3>
                            <p>${doc.description || ''}</p>
                            <div class="price">${doc.price.toLocaleString()} <small>${doc.currency}</small></div>
                            <div class="methods">
                                <span>📱 MTN MoMo</span>
                                <span>📱 Airtel Money</span>
                            </div>
                            ${paid
                                ? `<button class="btn btn-paid" onclick="downloadDocument('${doc.id}')">📥 Download Again</button>`
                                : `<button class="btn btn-pay" onclick="startPayment('${doc.id}', ${doc.price}, '${doc.currency}')">Pay & Download</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function startPayment(docId, amount, currency) {
            const token = genToken();
            currentPayment = { docId, token };

            const res = await api('/api/init-payment', {
                document_id: docId,
                device_fingerprint: deviceFingerprint,
                client_token: token
            });

            if (res.already_paid) {
                paidDocs.add(docId);
                loadDocuments();
                return;
            }

            if (res.error) {
                alert('Error: ' + res.error);
                return;
            }

            // Show modal with AfriPay form
            document.getElementById('modalBody').innerHTML = `
                <h2>Complete Payment</h2>
                <p class="muted">${res.document_title || 'Document'}</p>
                <div class="price-big">${res.amount.toLocaleString()} ${res.currency}</div>
                <p class="muted">Enter your phone number on the next screen</p>
                <form action="https://www.afripay.africa/checkout/index.php" method="post" target="afripayIframe" id="payForm">
                    <input type="hidden" name="amount" value="${res.amount}">
                    <input type="hidden" name="currency" value="${res.currency}">
                    <input type="hidden" name="comment" value="Document: ${res.document_title || 'Purchase'}">
                    <input type="hidden" name="client_token" value="${token}">
                    <input type="hidden" name="return_url" value="${window.location.href}">
                    <input type="hidden" name="app_id" value="${AFRIPAY_APP_ID}">
                    <input type="hidden" name="app_secret" value="${AFRIPAY_SECRET}">
                    <button type="submit" class="btn btn-pay">Proceed to Pay</button>
                </form>
                <iframe name="afripayIframe" id="afripayIframe"></iframe>
                <button class="btn-close" onclick="closePayment()">Cancel</button>
            `;

            document.getElementById('payModal').classList.add('active');

            // Submit form after short delay to show UI
            setTimeout(() => {
                document.getElementById('payForm').submit();
                document.getElementById('afripayIframe').style.display = 'block';
                startPolling();
            }, 400);
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            let attempts = 0;

            pollInterval = setInterval(async () => {
                attempts++;
                
                const res = await api('/api/check-payment', {
                    client_token: currentPayment.token
                });

                if (res.paid && res.status === 'completed') {
                    clearInterval(pollInterval);
                    paidDocs.add(currentPayment.docId);
                    closePayment();
                    loadDocuments();
                    // Auto download
                    setTimeout(() => downloadDocument(currentPayment.docId), 600);
                    return;
                }

                if (attempts > 72) { // 6 minutes (5s intervals)
                    clearInterval(pollInterval);
                    document.getElementById('modalBody').innerHTML = `
                        <h2>⏰ Timeout</h2>
                        <p class="muted">Payment is taking longer than expected.</p>
                        <p class="muted">If you completed payment, refresh this page.</p>
                        <button class="btn btn-pay" onclick="closePayment();loadDocuments();">Close</button>
                    `;
                }
            }, 5000);
        }

        function closePayment() {
            if (pollInterval) clearInterval(pollInterval);
            document.getElementById('payModal').classList.remove('active');
            currentPayment = { docId: null, token: null };
        }

        async function downloadDocument(docId) {
            const token = currentPayment.token || (await findExistingToken(docId));
            
            if (!token) {
                alert('Payment record not found. Please contact support.');
                return;
            }

            const res = await api('/api/download', {
                client_token: token,
                device_fingerprint: deviceFingerprint,
                document_id: docId
            });

            if (res.url) {
                window.open(res.url, '_blank');
            } else {
                alert(res.error || 'Download failed. Please try again.');
            }
        }

        async function findExistingToken(docId) {
            // For already-paid documents, we need a valid token
            // Generate a new token and check if already paid
            const token = genToken();
            const res = await api('/api/check-payment', {
                device_fingerprint: deviceFingerprint,
                document_id: docId
            });
            if (res.already_paid) {
                // Init a dummy payment to get a valid token for download
                const initRes = await api('/api/init-payment', {
                    document_id: docId,
                    device_fingerprint: deviceFingerprint,
                    client_token: token
                });
                if (initRes.already_paid) return token;
            }
            return null;
        }

        async function init() {
            await initFingerprint();
            await loadDocuments();

            document.getElementById('payModal').addEventListener('click', function(e) {
                if (e.target === this) closePayment();
            });
        }

        init();
    </script>
</body>
</html>
