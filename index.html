<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>KotWeb — Smart Document Hub</title>
    <meta name="description" content="KotWeb is the smart platform to discover and download premium documents.">
    <meta name="theme-color" content="#6c47ff">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --bg-main: #f4f2ee;
            --bg-surface: #ffffff;
            --bg-hover: #f9fafb;
            --bg-input: #eef3f8;
            --border: #e5e7eb;
            --text-primary: #191919;
            --text-secondary: #595856;
            --text-tertiary: #868482;
            --primary: #6c47ff;
            --primary-hover: #5835e8;
            --primary-light: #f0ebff;
            --success: #057642;
            --success-bg: #e9f7ef;
            --danger: #d11124;
            --danger-bg: #fdecea;
            --card-shadow: 0 0 0 1px rgba(0,0,0,0.05);
            --card-hover-shadow: 0 8px 24px rgba(0,0,0,0.08);
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{-webkit-font-smoothing:antialiased;font-size:16px;scroll-behavior:smooth}
        body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);line-height:1.5;min-height:100vh}
        a{color:inherit;text-decoration:none}
        button{cursor:pointer;font-family:inherit;border:none;background:transparent}
        input{font-family:inherit;font-size:inherit}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastUp{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
        .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}

        .navbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center}
        .navbar-inner{max-width:1128px;margin:0 auto;width:100%;display:flex;align-items:center;gap:.75rem}
        .navbar-brand{display:flex;align-items:center;gap:.5rem;flex-shrink:0;cursor:pointer}
        .navbar-logo{width:34px;height:34px;clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%);background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.85rem;flex-shrink:0}
        .navbar-title{font-size:1rem;font-weight:800;letter-spacing:-.4px;color:var(--text-primary)}
        .navbar-search{flex:1;max-width:340px}
        .search-wrap{display:flex;align-items:center;background:var(--bg-input);border-radius:var(--radius-full);padding:0 .7rem;height:34px;gap:.4rem;transition:all var(--transition-fast);border:1.5px solid transparent}
        .search-wrap:focus-within{background:var(--bg-surface);border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,71,255,.1)}
        .search-wrap input{flex:1;border:none;background:transparent;outline:none;font-size:.82rem;color:var(--text-primary)}
        .search-wrap input::placeholder{color:var(--text-tertiary)}
        .search-wrap i{color:var(--text-tertiary);font-size:15px;flex-shrink:0}
        #docCount{font-size:.7rem;font-weight:600;color:var(--text-tertiary);flex-shrink:0}

        .main-layout{max-width:1128px;margin:0 auto;padding:.85rem;padding-bottom:3rem}
        .section{margin-bottom:1.8rem}
        .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;gap:.5rem}
        .section-title{font-size:.92rem;font-weight:700;display:flex;align-items:center;gap:.4rem;color:var(--text-primary)}
        .section-title i{color:var(--primary);font-size:1.15rem}
        .section-badge{font-size:.65rem;font-weight:600;color:var(--text-tertiary);background:var(--bg-input);padding:3px 10px;border-radius:var(--radius-full)}

        /* Bigger cards */
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem}
        .card{
            background:var(--bg-surface);
            border:1px solid var(--border);
            clip-path:polygon(0 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%);
            padding:1.1rem 1rem 1rem;
            cursor:pointer;
            transition:all var(--transition-base);
            display:flex;flex-direction:column;gap:.5rem;
            position:relative;
            animation:fadeIn .3s ease-out;
            text-decoration:none;
            color:inherit;
            -webkit-tap-highlight-color:transparent;
        }
        .card:hover{border-color:var(--primary);transform:translateY(-3px);box-shadow:var(--card-hover-shadow)}
        .card:active{transform:scale(.97)}
        .card-img-wrap{width:100%;height:130px;background:var(--bg-input);border-radius:6px 2px 6px 2px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
        .card-img-wrap img{width:100%;height:100%;object-fit:cover}
        .card-img-wrap .card-icon-big{font-size:3rem;color:#d1d5db}
        .card-tag{position:absolute;top:10px;right:10px;font-size:.6rem;font-weight:700;padding:3px 9px;border-radius:var(--radius-full);background:var(--primary-light);color:var(--primary);text-transform:uppercase;z-index:2}
        .card-body{flex:1;min-width:0}
        .card-body h4{font-size:.88rem;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;margin-bottom:3px}
        .card-body .card-desc{font-size:.7rem;color:var(--text-tertiary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
        .card-footer{display:flex;align-items:center;justify-content:space-between;gap:.4rem;margin-top:auto}
        .card-footer .price{font-size:.9rem;font-weight:700;color:var(--primary)}
        .card-footer .meta-row{display:flex;align-items:center;gap:.5rem;font-size:.65rem;color:var(--text-tertiary)}
        .card-footer .meta-row span{display:flex;align-items:center;gap:3px}

        /* Table */
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%)}
        .table-wrap table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:550px}
        .table-wrap th{text-align:left;padding:10px 12px;font-weight:600;font-size:.68rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.3px;background:var(--bg-hover);border-bottom:1px solid var(--border);white-space:nowrap}
        .table-wrap td{padding:9px 12px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
        .table-wrap tbody tr{cursor:pointer;transition:background var(--transition-fast)}
        .table-wrap tbody tr:hover{background:var(--bg-hover)}
        .td-title{display:flex;align-items:center;gap:8px;font-weight:500}
        .td-title img{width:30px;height:30px;border-radius:4px;object-fit:cover}
        .td-status{font-size:.7rem;font-weight:500}
        .td-status.paid{color:var(--success)}
        .td-status.unpaid{color:var(--text-tertiary)}

        /* Price filter */
        .filter-row{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.75rem}
        .filter-row .filter-label{font-size:.7rem;font-weight:600;color:var(--text-secondary);white-space:nowrap}
        .filter-row input{width:80px;padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--radius-full);font-size:.72rem;background:var(--bg-surface);color:var(--text-primary);outline:none;font-family:var(--font-family)}
        .filter-row input:focus{border-color:var(--primary)}
        .filter-row .filter-sep{color:var(--text-tertiary);font-size:.7rem}

        .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-tertiary)}
        .empty-state i{font-size:48px;display:block;margin-bottom:.5rem;color:#d1d5db}
        .loading-wrap{text-align:center;padding:3rem 1rem;color:var(--text-tertiary)}

        /* Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:all var(--transition-base)}
        .modal-overlay.active{opacity:1;visibility:visible}
        .modal{background:var(--bg-surface);border-radius:var(--radius-xl);width:100%;max-width:440px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.15);animation:fadeIn .25s ease-out;padding:1.5rem}
        .modal h3{font-size:1rem;font-weight:700;margin-bottom:4px}
        .modal .modal-sub{font-size:.76rem;color:var(--text-secondary);margin-bottom:1rem}
        .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
        .chip{padding:7px 14px;border-radius:var(--radius-full);font-size:.74rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);transition:all var(--transition-fast);font-family:var(--font-family)}
        .chip:hover{border-color:var(--primary);color:var(--text-primary)}
        .chip.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
        .chip-sm{padding:5px 10px;font-size:.68rem}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:.3rem;padding:.55rem 1.1rem;border-radius:var(--radius-full);font-weight:600;font-size:.82rem;transition:all var(--transition-fast);font-family:var(--font-family);width:100%}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}

        /* Popup */
        .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all var(--transition-base)}
        .popup-overlay.active{opacity:1;visibility:visible}
        .popup{background:var(--bg-surface);border-radius:1.2rem 1.2rem 0 0;max-width:480px;width:100%;padding:1.25rem 1rem 1.5rem;animation:slideUp .3s ease;max-height:60vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
        @media(min-width:500px){.popup-overlay{align-items:center}.popup{border-radius:var(--radius-xl);animation:fadeIn .25s ease}}
        .popup h4{font-size:.9rem;font-weight:700;margin-bottom:3px}
        .popup-sub{font-size:.72rem;color:var(--text-secondary);margin-bottom:12px}
        .mini-list{display:grid;gap:7px}
        .mini-card{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg-hover);border-radius:var(--radius-lg);cursor:pointer;transition:all var(--transition-fast);text-decoration:none;color:inherit}
        .mini-card:hover{background:var(--primary-light)}
        .mini-card img{width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0}
        .mini-card .mc-icon{width:34px;height:34px;border-radius:6px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-tertiary)}
        .mini-card .mc-info h5{font-size:.76rem;font-weight:600}
        .mini-card .mc-info span{font-size:.65rem;color:var(--text-tertiary)}
        .btn-close-popup{width:100%;padding:8px;border-radius:var(--radius-full);font-size:.75rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-secondary);margin-top:10px;font-family:var(--font-family)}

        .toast-container{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);z-index:400;pointer-events:none}
        .toast{padding:.6rem 1rem;border-radius:var(--radius-full);font-size:.75rem;font-weight:500;background:var(--text-primary);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastUp .3s ease-out;pointer-events:auto;white-space:nowrap}

        @media(max-width:500px){
            .card-grid{grid-template-columns:repeat(2,1fr);gap:.55rem}
            .card{padding:.8rem .6rem .75rem}
            .card-img-wrap{height:100px}
            .card-body h4{font-size:.76rem}
            .card-footer .price{font-size:.78rem}
            .navbar-title{display:none}
            .navbar-search{max-width:200px}
            .section-title{font-size:.82rem}
        }
        @media(max-width:360px){
            .card-grid{grid-template-columns:1fr 1fr;gap:.4rem}
            .card{padding:.6rem .45rem .55rem}
            .card-img-wrap{height:85px}
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-inner">
            <div class="navbar-brand" onclick="location.reload()">
                <div class="navbar-logo">K</div>
                <span class="navbar-title">KotWeb</span>
            </div>
            <div class="navbar-search">
                <div class="search-wrap">
                    <i class="bx bx-search"></i>
                    <input type="text" id="searchInput" placeholder="Search documents..." autocomplete="off">
                </div>
            </div>
            <span id="docCount">0 docs</span>
        </div>
    </nav>

    <div class="main-layout" id="content">
        <div class="loading-wrap"><div class="spinner"></div><p style="font-size:.8rem;margin-top:.5rem;">Loading documents…</p></div>
    </div>

    <div class="modal-overlay" id="onboardModal">
        <div class="modal">
            <h3>🎯 Personalize Your Experience</h3>
            <p class="modal-sub">Help us find the best documents for you</p>
            <p style="font-size:.7rem;font-weight:600;color:var(--text-secondary);margin-bottom:4px;">Select your class</p>
            <div class="chip-row" id="classChips"></div>
            <p style="font-size:.7rem;font-weight:600;color:var(--text-secondary);margin-bottom:4px;">Select your subjects</p>
            <div class="chip-row" id="subjectChips"></div>
            <button class="btn btn-primary" onclick="savePreferences()">Continue</button>
        </div>
    </div>

    <div class="popup-overlay" id="unseenPopup">
        <div class="popup" id="unseenContent"></div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            var SUPABASE_URL = 'https://wuswjdmshzzxnlsugukm.supabase.co';
            var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1c3dqZG1zaHp6eG5sc3VndWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjM3NDcsImV4cCI6MjA5NzAzOTc0N30.p92FyfHtBiEC0CEeFEjcV5kz0ZJiSLFtIWUg0EhEO10';

            var CLASSES = ['S1','S2','S3','S4','S5','S6'];
            var SUBJECTS = ['Pure-Math','Sub-Math','Physics','Biology','English','French','Computer Science','Economics','Chemistry','Kinyarwanda','History','Geography','Entrepreneurship','GSCS'];
            var allDocs = [];
            var paidSet = new Set();
            var userPrefs = null;
            var searchTerm = '';
            var priceMin = '';
            var priceMax = '';
            var debounceTimer = null;
            var selectedClass = null;
            var selectedSubjects = [];

            function $(id) { return document.getElementById(id); }
            function toast(msg) { var t = document.createElement('div'); t.className='toast'; t.textContent=msg; $('toastContainer').appendChild(t); setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .25s'; setTimeout(function(){ t.remove(); },250); },2500); }

            async function apiCall(path, body) {
                var opts = { method: body?'POST':'GET', headers:{'Content-Type':'application/json'} };
                if (body) opts.body = JSON.stringify(body);
                var r = await fetch(path, opts);
                var txt = await r.text();
                try { return JSON.parse(txt); } catch(e) { return []; }
            }

            function formatPrice(n,c) { return parseInt(n).toLocaleString() + ' ' + (c||'RWF'); }
            function getPrefs() { try { return JSON.parse(localStorage.getItem('kw_prefs')); } catch(e) { return null; } }
            function setPrefs(p) { localStorage.setItem('kw_prefs', JSON.stringify(p)); }
            function getSeen() { try { return JSON.parse(localStorage.getItem('kw_seen')); } catch(e) { return []; } }
            function addSeen(id) { var s = getSeen(); s.push({id:id,ts:Date.now()}); if(s.length>200)s=s.slice(-200); localStorage.setItem('kw_seen',JSON.stringify(s)); }
            function isSeen(id) { return getSeen().some(function(d){ return d.id===id; }); }

            function getMatchScore(doc) {
                if (!userPrefs) return 0;
                var score = 0;
                var txt = (doc.title+' '+(doc.description||'')).toLowerCase();
                if (userPrefs.class && txt.indexOf(userPrefs.class.toLowerCase())!==-1) score += 3;
                if (userPrefs.subjects) {
                    userPrefs.subjects.forEach(function(s) {
                        if (txt.indexOf(s.toLowerCase())!==-1) score += 2;
                        s.toLowerCase().split(/[\s-]+/).forEach(function(p) { if(p.length>2&&txt.indexOf(p)!==-1)score+=1; });
                    });
                }
                return score;
            }

            function getPopularityScore(doc) {
                return (doc.clicks||0) + (getMatchScore(doc) * 2);
            }

            function filterDocs() {
                var docs = allDocs;
                if (searchTerm.trim()) {
                    var q = searchTerm.toLowerCase().trim();
                    docs = docs.filter(function(d) { return d.title.toLowerCase().indexOf(q)!==-1||(d.description||'').toLowerCase().indexOf(q)!==-1; });
                }
                if (priceMin !== '' && !isNaN(priceMin)) {
                    docs = docs.filter(function(d) { return d.price >= parseInt(priceMin); });
                }
                if (priceMax !== '' && !isNaN(priceMax)) {
                    docs = docs.filter(function(d) { return d.price <= parseInt(priceMax); });
                }
                return docs;
            }

            function getSuggested(docs) {
                return docs.slice().sort(function(a,b){ return getPopularityScore(b) - getPopularityScore(a); }).slice(0,5);
            }

            function getCategory(fn) { var e=(fn||'').split('.').pop().toLowerCase(); if(['pdf','doc','docx','xls','xlsx','ppt','pptx','txt'].includes(e)) return e; if(['jpg','jpeg','png','gif','svg','webp'].includes(e)) return 'image'; return 'other'; }
            function getIcon(fn) { var c=getCategory(fn); var m={pdf:'bxs-file-pdf',doc:'bxs-file-doc',docx:'bxs-file-doc',xls:'bx-spreadsheet',xlsx:'bx-spreadsheet',ppt:'bxs-slideshow',pptx:'bxs-slideshow',image:'bx-image-alt'}; return m[c]||'bx-file-blank'; }

            function cardHTML(d, tag) {
                var score = getMatchScore(d);
                return '<a href="view.html?doc='+d.id+'" class="card" onclick="trackClick(\''+d.id+'\')">' +
                    (tag && score>=3 ? '<span class="card-tag">For You</span>' : '') +
                    '<div class="card-img-wrap">' +
                        (d.image_url ? '<img src="'+d.image_url+'" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<i class=\\\'bx bx-file card-icon-big\\\'></i>\'">' : '<i class="bx bx-file card-icon-big"></i>') +
                    '</div>' +
                    '<div class="card-body"><h4>'+d.title+'</h4><p class="card-desc">'+(d.description||'')+'</p></div>' +
                    '<div class="card-footer">' +
                        '<span class="price">'+formatPrice(d.price,d.currency)+'</span>' +
                        '<div class="meta-row"><span><i class="bx bx-show" style="font-size:11px;"></i> '+(d.clicks||0)+'</span></div>' +
                    '</div>' +
                '</a>';
            }

            function tableRow(d) {
                return '<tr onclick="window.location.href=\'view.html?doc='+d.id+'\';trackClick(\''+d.id+'\');">' +
                    '<td><span class="td-title">'+(d.image_url?'<img src="'+d.image_url+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'')+' '+d.title+'</span></td>' +
                    '<td>'+(d.clicks||0)+'</td>' +
                    '<td>'+formatPrice(d.price,d.currency)+'</td>' +
                    '<td class="td-status '+(paidSet.has(d.id)?'paid':'unpaid')+'">'+(paidSet.has(d.id)?'Owned':'Available')+'</td>' +
                '</tr>';
            }

            function render() {
                var docs = filterDocs();
                var recent = docs.slice().sort(function(a,b){ return new Date(b.created_at)-new Date(a.created_at); }).slice(0,5);
                var suggested = getSuggested(docs);
                var content = $('content');
                $('docCount').textContent = docs.length + ' docs';

                if (!docs.length) {
                    content.innerHTML = '<div class="empty-state"><i class="bx bx-folder-open"></i><p>'+(searchTerm||priceMin||priceMax?'No matches found':'No documents yet')+'</p></div>';
                    return;
                }

                content.innerHTML =
                    '<div class="section">' +
                        '<div class="section-header"><div class="section-title"><i class="bx bx-time-five"></i> Recent</div><span class="section-badge">'+recent.length+' docs</span></div>' +
                        '<div class="card-grid">'+recent.map(function(d){ return cardHTML(d,false); }).join('')+'</div>' +
                    '</div>' +
                    '<div class="section">' +
                        '<div class="section-header"><div class="section-title"><i class="bx bx-bulb"></i> Suggested For You</div><span class="section-badge">'+suggested.length+' docs</span></div>' +
                        '<div class="card-grid">'+suggested.map(function(d){ return cardHTML(d,true); }).join('')+'</div>' +
                    '</div>' +
                    '<div class="section">' +
                        '<div class="section-header"><div class="section-title"><i class="bx bx-grid-alt"></i> All Documents</div><span class="section-badge">'+docs.length+' docs</span></div>' +
                        '<div class="card-grid">'+docs.map(function(d){ return cardHTML(d,false); }).join('')+'</div>' +
                    '</div>' +
                    '<div class="section">' +
                        '<div class="section-header"><div class="section-title"><i class="bx bx-list-ul"></i> Full List</div></div>' +
                        '<div class="filter-row">' +
                            '<span class="filter-label">Price:</span>' +
                            '<input type="number" id="priceMin" placeholder="Min" value="'+(priceMin||'')+'">' +
                            '<span class="filter-sep">–</span>' +
                            '<input type="number" id="priceMax" placeholder="Max" value="'+(priceMax||'')+'">' +
                        '</div>' +
                        '<div class="table-wrap"><table><thead><tr><th>Document</th><th>Views</th><th>Price</th><th>Status</th></tr></thead><tbody>'+docs.map(tableRow).join('')+'</tbody></table></div>' +
                    '</div>';

                // Attach price filter listeners
                var pmin = $('priceMin');
                var pmax = $('priceMax');
                if (pmin && pmax) {
                    pmin.addEventListener('input', function() {
                        clearTimeout(debounceTimer);
                        var self = this;
                        debounceTimer = setTimeout(function() { priceMin = self.value; render(); }, 400);
                    });
                    pmax.addEventListener('input', function() {
                        clearTimeout(debounceTimer);
                        var self = this;
                        debounceTimer = setTimeout(function() { priceMax = self.value; render(); }, 400);
                    });
                }
            }

            window.trackClick = function(id) { addSeen(id); fetch('/api/documents/'+id+'/click',{method:'POST'}).catch(function(){}); };

            $('searchInput').addEventListener('input', function() {
                clearTimeout(debounceTimer);
                var self = this;
                debounceTimer = setTimeout(function() { searchTerm = self.value; render(); }, 300);
            });

            function showOnboarding() {
                $('classChips').innerHTML = CLASSES.map(function(c) {
                    return '<button class="chip" data-class="'+c+'">'+c+'</button>';
                }).join('');
                $('subjectChips').innerHTML = SUBJECTS.map(function(s) {
                    return '<button class="chip chip-sm" data-subject="'+s+'">'+s+'</button>';
                }).join('');

                $('classChips').addEventListener('click', function(e) {
                    var b = e.target.closest('.chip'); if (!b||!b.dataset.class) return;
                    $('classChips').querySelectorAll('.chip').forEach(function(x){ x.classList.remove('selected'); });
                    b.classList.add('selected'); selectedClass = b.dataset.class;
                });
                $('subjectChips').addEventListener('click', function(e) {
                    var b = e.target.closest('.chip'); if (!b||!b.dataset.subject) return;
                    b.classList.toggle('selected');
                    var s = b.dataset.subject;
                    if (b.classList.contains('selected')) { if (selectedSubjects.indexOf(s)===-1) selectedSubjects.push(s); }
                    else { selectedSubjects = selectedSubjects.filter(function(x){ return x!==s; }); }
                });

                window.savePreferences = function() {
                    if (!selectedClass) { toast('Please select a class'); return; }
                    if (!selectedSubjects.length) { toast('Please select at least one subject'); return; }
                    userPrefs = { class: selectedClass, subjects: selectedSubjects };
                    setPrefs(userPrefs);
                    $('onboardModal').classList.remove('active');
                    render();
                    toast('Preferences saved!');
                };
                $('onboardModal').classList.add('active');
            }

            function showUnseenPopup() {
                var now = Date.now();
                var twentyHours = 20*60*60*1000;
                var unseen = allDocs.filter(function(d) {
                    if (isSeen(d.id)) return false;
                    return (now - new Date(d.created_at).getTime()) <= twentyHours;
                }).slice(0,3);
                if (!unseen.length) return;

                $('unseenContent').innerHTML =
                    '<h4><i class="bx bx-sparkles" style="color:var(--primary);"></i> New For You</h4>' +
                    '<p class="popup-sub">Fresh documents you haven\'t seen yet</p>' +
                    '<div class="mini-list">'+unseen.map(function(d) {
                        return '<a href="view.html?doc='+d.id+'" class="mini-card" onclick="trackClick(\''+d.id+'\')">' +
                            (d.image_url?'<img src="'+d.image_url+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">':'') +
                            '<div class="mc-icon" style="'+(d.image_url?'display:none':'')+'"><i class="bx bx-file"></i></div>' +
                            '<div class="mc-info"><h5>'+d.title+'</h5><span>'+formatPrice(d.price,d.currency)+' · New</span></div>' +
                        '</a>';
                    }).join('')+'</div>' +
                    '<button class="btn-close-popup" onclick="$(\'unseenPopup\').classList.remove(\'active\')">Close</button>';

                $('unseenPopup').classList.add('active');
            }

            (async function() {
                try { allDocs = await apiCall('/api/documents'); } catch(e) { allDocs = []; }
                userPrefs = getPrefs();
                if (!userPrefs) { showOnboarding(); }
                else { setTimeout(function(){ showUnseenPopup(); }, 1500); }
                render();
            })();
        })();
    </script>
</body>
</html>
