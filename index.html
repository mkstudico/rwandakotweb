<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DocStore</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fb;
            --surface: #fff;
            --text: #111;
            --sub: #6b7280;
            --border: #eef0f2;
            --accent: #111;
            --accent-light: #f3f4f6;
            --green: #059669;
            --green-bg: #ecfdf5;
            --green-text: #065f46;
            --orange: #ea580c;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(0,0,0,0.05);
            --tr: 0.2s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── TOP BAR ── */
        .topbar {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }
        .logo .material-icons { font-size: 24px; }

        .search-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-wrap .material-icons {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 20px;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 10px 14px 10px 42px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            background: #f9fafb;
            outline: none;
            transition: all var(--tr);
            -webkit-appearance: none;
        }
        .search-input:focus {
            border-color: #d1d5db;
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }
        .search-input::placeholder { color: #b0b7c3; }

        /* ── MAIN CONTAINER ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* ── SECTION ── */
        .section {
            margin-bottom: 36px;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.2px;
        }
        .section-title .material-icons { font-size: 20px; color: var(--accent); }
        .section-count {
            font-size: 0.72rem;
            color: var(--sub);
            font-weight: 400;
            background: var(--accent-light);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* ── GRID ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: box-shadow var(--tr), transform var(--tr);
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
            color: inherit;
        }
        .card:active { transform: scale(0.98); }
        @media (hover:hover) {
            .card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .card-img img { width:100%; height:100%; object-fit:cover; }
        .card-img .material-icons { font-size: 48px; color: #d1d5db; }
        .card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 0.64rem;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .card-badge .material-icons { font-size: 12px; color: #fff; }

        .card-body {
            padding: 14px 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 3px;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }
        .card-body .desc {
            font-size: 0.74rem;
            color: var(--sub);
            line-height: 1.4;
            flex: 1;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-body .price {
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            gap: 3px;
        }
        .card-body .price small {
            font-size: 0.64rem;
            color: #9ca3af;
            font-weight: 400;
        }

        /* ── TABLE ── */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
        }
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }
        .table-wrap th {
            text-align: left;
            padding: 12px 14px;
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            background: #fafbfc;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .table-wrap td {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .table-wrap tr:last-child td { border-bottom: none; }
        .table-wrap tbody tr {
            cursor: pointer;
            transition: background var(--tr);
        }
        .table-wrap tbody tr:active { background: #f9fafb; }
        @media (hover:hover) {
            .table-wrap tbody tr:hover { background: #fafbfc; }
        }
        .td-title {
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
        }
        .td-title img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
        }
        .td-status {
            font-size: 0.72rem;
            font-weight: 500;
        }
        .td-status.paid { color: var(--green); }
        .td-status.unpaid { color: var(--sub); }

        /* ── EMPTY ── */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #9ca3af;
        }
        .empty-state .material-icons {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* ── LOADER ── */
        .loader-wrap {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e5e7eb;
            border-top-color: #888;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 500px) {
            .topbar-inner { gap: 10px; }
            .search-wrap { order: 3; width: 100%; }
            .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
            .card-img { height: 130px; }
            .card-body { padding: 10px 12px; }
            .card-body h3 { font-size: 0.8rem; }
            .card-body .price { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-inner">
            <div class="logo">
                <span class="material-icons">description</span>
                DocStore
            </div>
            <div class="search-wrap">
                <span class="material-icons">search</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Search documents..." autocomplete="off">
            </div>
        </div>
    </header>

    <div class="container" id="content">
        <div class="loader-wrap">
            <div class="spinner"></div>
            <p>Loading documents…</p>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://wuswjdmshzzxnlsugukm.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1c3dqZG1zaHp6eG5sc3VndWttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjM3NDcsImV4cCI6MjA5NzAzOTc0N30.p92FyfHtBiEC0CEeFEjcV5kz0ZJiSLFtIWUg0EhEO10';

            let allDocs = [];
            let paidSet = new Set();
            let searchTerm = '';
            let debounceTimer = null;

            function $(id) { return document.getElementById(id); }

            async function api(path) {
                const r = await fetch(path);
                if (!r.ok) throw new Error('API error');
                return r.json();
            }

            function formatPrice(n, c) {
                return `${parseInt(n).toLocaleString()} <small>${c || 'RWF'}</small>`;
            }

            // ── BUILD CARD HTML ──
            function cardHTML(d) {
                return `
                <a href="view.html?doc=${d.id}" class="card" onclick="trackClick('${d.id}')">
                    <div class="card-img">
                        ${d.image_url
                            ? `<img src="${d.image_url}" alt="${d.title}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'material-icons\\'>description</span>'">`
                            : '<span class="material-icons">description</span>'}
                        ${(d.clicks || 0) > 0 ? `<span class="card-badge"><span class="material-icons">trending_up</span>${d.clicks}</span>` : ''}
                    </div>
                    <div class="card-body">
                        <h3>${d.title}</h3>
                        <p class="desc">${d.description || ''}</p>
                        <div class="price">${formatPrice(d.price, d.currency)}</div>
                    </div>
                </a>`;
            }

            // ── BUILD TABLE ROW ──
            function tableRow(d) {
                return `
                <tr onclick="window.location.href='view.html?doc=${d.id}';trackClick('${d.id}');">
                    <td>
                        <span class="td-title">
                            ${d.image_url ? `<img src="${d.image_url}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
                            ${d.title}
                        </span>
                    </td>
                    <td>${(d.clicks || 0).toLocaleString()}</td>
                    <td>${parseInt(d.price).toLocaleString()} ${d.currency}</td>
                    <td class="td-status ${paidSet.has(d.id) ? 'paid' : 'unpaid'}">${paidSet.has(d.id) ? 'Paid' : 'Available'}</td>
                </tr>`;
            }

            // ── FILTER DOCS ──
            function filterDocs() {
                if (!searchTerm.trim()) return allDocs;
                const q = searchTerm.toLowerCase().trim();
                return allDocs.filter(d =>
                    d.title.toLowerCase().includes(q) ||
                    (d.description || '').toLowerCase().includes(q)
                );
            }

            // ── RENDER ALL SECTIONS ──
            function render() {
                const docs = filterDocs();
                const content = $('content');

                if (!docs.length) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <span class="material-icons">search_off</span>
                            <p>${searchTerm ? 'No documents match your search' : 'No documents available yet'}</p>
                        </div>`;
                    return;
                }

                // Recent: newest 8
                const recent = [...docs].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 8);
                // Suggested: most clicked 8
                const suggested = [...docs].sort((a, b) => (b.clicks || 0) - (a.clicks || 0)).slice(0, 8);

                content.innerHTML = `
                    <!-- Suggested -->
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">
                                <span class="material-icons">auto_awesome</span> Suggested
                            </div>
                            <span class="section-count">${suggested.length} doc${suggested.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="grid">${suggested.map(cardHTML).join('')}</div>
                    </div>

                    <!-- Recent -->
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">
                                <span class="material-icons">schedule</span> Recent
                            </div>
                            <span class="section-count">${recent.length} doc${recent.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="grid">${recent.map(cardHTML).join('')}</div>
                    </div>

                    <!-- All Grid -->
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">
                                <span class="material-icons">apps</span> All Documents
                            </div>
                            <span class="section-count">${docs.length} doc${docs.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="grid">${docs.map(cardHTML).join('')}</div>
                    </div>

                    <!-- List / Table -->
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title">
                                <span class="material-icons">view_list</span> All Documents (List)
                            </div>
                            <span class="section-count">${docs.length} doc${docs.length !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Document</th>
                                        <th>Views</th>
                                        <th>Price</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${docs.map(tableRow).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            // ── TRACK CLICK ──
            window.trackClick = async function(docId) {
                try {
                    await fetch(`/api/documents/${docId}/click`, { method: 'POST' });
                } catch {}
            };

            // ── SEARCH WITH DEBOUNCE ──
            $('searchInput').addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchTerm = this.value;
                    render();
                }, 300);
            });

            // ── INIT ──
            (async () => {
                try {
                    allDocs = await api('/api/documents');
                } catch {
                    allDocs = [];
                }
                render();
            })();
        })();
    </script>
</body>
</html>
