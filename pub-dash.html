<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Publisher — KotWeb</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,'Helvetica Neue',Arial,sans-serif;--bg-main:#f4f2ee;--bg-surface:#ffffff;--bg-hover:#f9fafb;--bg-input:#eef3f8;--border:#e5e7eb;--text-primary:#191919;--text-secondary:#595856;--text-tertiary:#868482;--primary:#6c47ff;--primary-hover:#5835e8;--primary-light:#f0ebff;--success:#057642;--success-bg:#e9f7ef;--danger:#d11124;--danger-bg:#fdecea;--warning:#b85c00;--warning-bg:#fff8f0;--gold:#e8a838;--gold-bg:#fffdf5;--radius-xl:1rem;--radius-full:9999px;--transition-fast:150ms cubic-bezier(0.4,0,0.2,1)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px}body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);min-height:100vh}
        button{cursor:pointer;font-family:inherit;border:none;background:transparent}input,textarea{font-family:inherit;font-size:inherit}
        @keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
        .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
        .topbar{background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1rem;height:50px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
        .topbar-inner{max-width:960px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
        .logo{font-size:.9rem;font-weight:800;display:flex;align-items:center;gap:6px;color:var(--text-primary);text-decoration:none}
        .logo span{width:28px;height:28px;clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%);background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.65rem}
        .user-badge{font-size:.72rem;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:8px}.user-badge span{color:var(--primary)}
        .container{max-width:960px;margin:0 auto;padding:1rem .85rem 4rem}
        .auth-card{max-width:420px;margin:3rem auto;background:var(--bg-surface);border-radius:var(--radius-xl);padding:2rem 1.5rem;border:1px solid var(--border);text-align:center}
        .auth-card .icon-circle{width:52px;height:52px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}.auth-card .icon-circle i{font-size:24px;color:var(--primary)}
        .auth-card h2{font-size:1.1rem;font-weight:700;margin-bottom:4px}.auth-card .sub{font-size:.74rem;color:var(--text-secondary);margin-bottom:1.25rem}
        .field{margin-bottom:11px;text-align:left}.field label{display:block;font-size:.7rem;font-weight:600;color:var(--text-secondary);margin-bottom:3px}
        .field input,.field textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-full);font-size:.82rem;outline:none;background:var(--bg-input);transition:all var(--transition-fast)}
        .field textarea{border-radius:14px;resize:vertical;min-height:60px}.field input:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,71,255,.1);background:var(--bg-surface)}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:var(--radius-full);font-weight:600;font-size:.82rem;transition:all var(--transition-fast);width:100%}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}.btn-primary:disabled{opacity:.5}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-primary);width:auto}.btn-outline:hover{background:var(--bg-hover)}
        .btn-sm{padding:6px 12px;font-size:.7rem;width:auto}.btn-danger{background:var(--danger);color:#fff;width:auto}.btn-xs{padding:4px 8px;font-size:.65rem;width:auto;border-radius:20px}
        .btn-gold{background:var(--gold);color:#fff;width:auto}.link-text{font-size:.7rem;color:var(--text-secondary);margin-top:10px}.link-text a{color:var(--primary);font-weight:600;cursor:pointer}
        .revenue-card{background:linear-gradient(135deg,#6c47ff,#8b6cff);border-radius:var(--radius-xl);padding:1.5rem;color:#fff;margin-bottom:1rem;text-align:center}
        .revenue-card .rev-label{font-size:.72rem;opacity:.85;margin-bottom:4px}.revenue-card .rev-amount{font-size:2.2rem;font-weight:800;letter-spacing:-1px}.revenue-card .rev-sub{font-size:.68rem;opacity:.7;margin-top:4px}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
        .stat-card{background:var(--bg-surface);border-radius:var(--radius-xl);padding:.9rem;border:1px solid var(--border)}.stat-val{font-size:1.1rem;font-weight:700}.stat-label{font-size:.64rem;color:var(--text-secondary)}
        .pub-link-box{background:var(--bg-surface);border:1px solid var(--primary);border-radius:var(--radius-xl);padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .pub-link-box .pub-link{font-size:.72rem;color:var(--primary);word-break:break-all;flex:1;min-width:120px}
        .section-title{font-size:.88rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .tab-nav{display:flex;gap:3px;background:#e5e7eb;border-radius:30px;padding:3px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .tab-nav::-webkit-scrollbar{display:none}
        .tab-btn{padding:7px 14px;border-radius:28px;font-size:.72rem;font-weight:500;color:var(--text-secondary);white-space:nowrap;transition:all var(--transition-fast);display:flex;align-items:center;gap:4px;flex-shrink:0}.tab-btn i{font-size:14px}.tab-btn.active{background:#fff;color:var(--text-primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .tab-content{display:none}.tab-content.active{display:block;animation:fadeIn .25s ease}
        .doc-list{display:grid;gap:8px}
        .doc-row{background:var(--bg-surface);border-radius:var(--radius-xl);padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .doc-row img{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}.doc-thumb{width:40px;height:40px;border-radius:6px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#d1d5db;font-size:1.1rem}
        .doc-info{flex:1;min-width:120px}.doc-info h4{font-size:.78rem;font-weight:600}.doc-info span{font-size:.66rem;color:var(--text-secondary)}.doc-actions{display:flex;gap:4px;flex-wrap:wrap}
        .badge{font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:20px}.badge-active{background:var(--success-bg);color:var(--success)}.badge-hidden{background:var(--danger-bg);color:var(--danger)}
        .table-wrap{overflow-x:auto;background:var(--bg-surface);border-radius:var(--radius-xl);border:1px solid var(--border)}
        .table-wrap table{width:100%;border-collapse:collapse;font-size:.72rem;min-width:500px}
        .table-wrap th{text-align:left;padding:10px 12px;font-weight:600;font-size:.65rem;color:var(--text-secondary);text-transform:uppercase;background:var(--bg-hover);border-bottom:1px solid var(--border);white-space:nowrap}
        .table-wrap td{padding:9px 12px;border-bottom:1px solid #f5f5f5;white-space:nowrap}
        .earn-positive{color:var(--success);font-weight:600}
        .empty{text-align:center;padding:2rem;color:var(--text-tertiary);font-size:.78rem}
        .file-upload-area{width:100%;padding:16px;border:2px dashed var(--border);border-radius:14px;text-align:center;cursor:pointer;background:var(--bg-input);margin-bottom:8px;position:relative}
        .file-upload-area i{font-size:26px;color:#d1d5db;display:block;margin-bottom:4px}.file-upload-area .up-text{font-size:.7rem;color:var(--text-tertiary)}.file-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}.file-upload-area.has-file{border-color:var(--success);background:var(--success-bg)}
        .cashout-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:var(--radius-xl);padding:1rem 1.2rem;margin-bottom:1rem}
        .cashout-box h4{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:6px}.cashout-box p{font-size:.7rem;color:var(--text-secondary);margin-bottom:8px}
        .cashout-box .min-badge{display:inline-block;background:var(--gold);color:#fff;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:600;margin-bottom:8px}
        .step-nav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;gap:8px}
        .step-nav .btn{width:auto;padding:10px 20px;font-size:.78rem}
        .step-nav .btn-next{background:var(--primary);color:#fff}.step-nav .btn-prev{background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border)}
        .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:10px 20px;border-radius:30px;font-size:.74rem;z-index:400;animation:slideUp .3s ease;display:none;white-space:nowrap}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:all .3s}
        .overlay.active{opacity:1;visibility:visible}
        .overlay-card{background:var(--bg-surface);border-radius:var(--radius-xl);padding:2rem 1.5rem;text-align:center;max-width:400px;width:100%;animation:popIn .4s ease}
        .overlay-card .w-icon{font-size:52px;margin-bottom:10px}
        .overlay-card h2{font-size:1.2rem;font-weight:800;margin-bottom:4px}
        .overlay-card .w-amount{font-size:1.8rem;font-weight:800;color:var(--primary);margin:10px 0}
        .overlay-card .w-link{font-size:.72rem;color:var(--primary);word-break:break-all;margin:10px 0;background:var(--primary-light);padding:8px 14px;border-radius:var(--radius-full)}
        .overlay-card .w-desc{font-size:.7rem;color:var(--text-secondary);margin-bottom:6px}
        .overlay-card p{font-size:.76rem;color:var(--text-secondary);margin-bottom:6px}
        @media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr}.doc-row{flex-direction:column;align-items:flex-start}.doc-actions{width:100%;justify-content:flex-end}.revenue-card .rev-amount{font-size:1.7rem}.tab-btn{font-size:.68rem;padding:6px 10px}}
    </style>
</head>
<body>
    <header class="topbar"><div class="topbar-inner"><a href="index.html" class="logo"><span>K</span> KotWeb Publisher</a><div class="user-badge" id="userBadge" style="display:none"><i class="bx bx-user-circle"></i> <span id="pubEmail"></span></div><button class="btn btn-outline btn-sm" id="logoutBtn" style="display:none">Logout</button></div></header>
    <div class="container" id="content"><div style="text-align:center;padding:3rem;color:var(--text-tertiary)"><div class="spinner"></div><p style="font-size:.8rem">Loading…</p></div></div>
    <div class="toast" id="toast"></div>
    <div class="overlay" id="welcomeOverlay"><div class="overlay-card" id="welcomeCard"></div></div>
    <div class="overlay" id="editOverlay"><div class="overlay-card" id="editContent" style="text-align:left;max-width:440px"></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDANYS44qmTxUZb40SK50di8XHwaeOiPkM", authDomain: "sub-ed-62348.firebaseapp.com", projectId: "sub-ed-62348", storageBucket: "sub-ed-62348.firebasestorage.app", messagingSenderId: "133365566054", appId: "1:133365566054:web:966a40fe8443d29aabfba7" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        var API = '/api/pub';
        var idToken = null;
        var userEmail = '';
        var firebaseUID = '';
        var addStep = 1;
        var dashLoaded = false;

        function el(id) { return document.getElementById(id); }
        function toast(m) { var t = el('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(function() { t.style.display = 'none'; }, 2500); }
        function fmtPrice(n, c) { return parseInt(n).toLocaleString() + ' ' + (c || 'RWF'); }
        function showLoader(msg) { el('content').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-tertiary)"><div class="spinner"></div><p style="font-size:.8rem">' + msg + '</p></div>'; }

        async function apiCall(path, body, method) {
            var opts = { method: method || (body ? 'POST' : 'GET'), headers: { 'Content-Type': 'application/json' } };
            if (idToken) { opts.headers['Authorization'] = 'Bearer ' + idToken; }
            if (body) opts.body = JSON.stringify(body);
            var r = await fetch(path, opts);
            var txt = await r.text();
            try { var d = JSON.parse(txt); } catch (e) { throw new Error('Invalid server response'); }
            if (!r.ok) throw new Error(d.error || 'Request failed');
            return d;
        }

        async function registerWithServer(username) {
            if (!firebaseUID || !userEmail) return;
            try { await apiCall(API + '/firebase-register', { uid: firebaseUID, email: userEmail, username: username || userEmail.split('@')[0] }); } catch (e) {}
        }

        function showLogin() {
            dashLoaded = false;
            el('logoutBtn').style.display = 'none';
            el('userBadge').style.display = 'none';
            el('content').innerHTML = 
                '<div class="auth-card"><div class="icon-circle"><i class="bx bx-log-in"></i></div><h2>Publisher Sign In</h2><p class="sub">Login to your publisher account</p>' +
                '<div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="off"></div>' +
                '<div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="password" autocomplete="off"></div>' +
                '<button class="btn btn-primary" id="loginBtn">Sign In</button>' +
                '<p class="link-text">New publisher? <a id="showRegister">Create an account</a></p></div>';
            el('loginBtn').addEventListener('click', async function() {
                var btn = this; btn.disabled = true; btn.innerHTML = 'Signing in…';
                try {
                    var e = el('loginEmail').value.trim(), p = el('loginPass').value;
                    if (!e || !p) { toast('Fill all fields'); btn.disabled = false; btn.innerHTML = 'Sign In'; return; }
                    await signInWithEmailAndPassword(auth, e, p);
                } catch (err) { toast(err.message); btn.disabled = false; btn.innerHTML = 'Sign In'; }
            });
            el('showRegister').addEventListener('click', function(e) { e.preventDefault(); showRegister(); });
        }

        function showRegister() {
            dashLoaded = false;
            el('logoutBtn').style.display = 'none';
            el('userBadge').style.display = 'none';
            el('content').innerHTML = 
                '<div class="auth-card"><div class="icon-circle"><i class="bx bx-user-plus"></i></div><h2>Join KotWeb Publisher</h2><p class="sub">Get <strong>1,000 RWF bonus</strong> on signup!</p>' +
                '<div class="field"><label>Username</label><input type="text" id="regUser" placeholder="choose a username" autocomplete="off"></div>' +
                '<div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com" autocomplete="off"></div>' +
                '<div class="field"><label>Password</label><input type="password" id="regPass" placeholder="min 6 characters" autocomplete="off"></div>' +
                '<button class="btn btn-primary" id="regBtn">Create Account & Claim 1,000 RWF</button>' +
                '<p class="link-text">Already have an account? <a id="showLoginLink">Sign In</a></p></div>';
            el('regBtn').addEventListener('click', async function() {
                var btn = this; btn.disabled = true; btn.innerHTML = 'Creating…';
                try {
                    var user = el('regUser').value.trim(), e = el('regEmail').value.trim(), p = el('regPass').value;
                    if (!user || !e || !p) { toast('Fill all fields'); btn.disabled = false; btn.innerHTML = 'Create Account'; return; }
                    if (user.length < 3) { toast('Username: min 3 chars'); btn.disabled = false; btn.innerHTML = 'Create Account'; return; }
                    if (p.length < 6) { toast('Password: min 6 chars'); btn.disabled = false; btn.innerHTML = 'Create Account'; return; }
                    var cred = await createUserWithEmailAndPassword(auth, e, p);
                    await registerWithServer(user);
                } catch (err) { toast(err.message); btn.disabled = false; btn.innerHTML = 'Create Account'; }
            });
            el('showLoginLink').addEventListener('click', function(e) { e.preventDefault(); showLogin(); });
        }

        function showWelcomePopup() {
            var slug = userEmail.split('@')[0].replace(/[^a-z0-9]/g, '');
            var pubUrl = window.location.origin + '/pub-page.html?p=' + slug;
            el('welcomeCard').innerHTML = 
                '<div class="w-icon">🎉</div><h2>Congratulations!</h2><div class="w-amount">+1,000 RWF Bonus</div>' +
                '<p>Continuing to work hard by selling documents and earn money.</p>' +
                '<p style="font-size:.68rem;color:var(--text-secondary)">Your page link — share it anywhere:</p>' +
                '<div class="w-link"><i class="bx bx-link"></i> ' + pubUrl + '</div>' +
                '<p class="w-desc">Share this link on WhatsApp, Instagram, or with friends. Customers can view and buy your documents from this page.</p>' +
                '<button class="btn btn-primary" style="margin-top:8px" id="welcomeClose">Got It!</button>';
            el('welcomeOverlay').classList.add('active');
            el('welcomeClose').addEventListener('click', function() { el('welcomeOverlay').classList.remove('active'); });
            localStorage.setItem('pub_welcomed', '1');
        }

        async function showDash() {
            if (dashLoaded) return;
            dashLoaded = true;
            showLoader('Loading your dashboard…');
            el('logoutBtn').style.display = 'inline-flex';
            el('userBadge').style.display = 'flex';
            el('pubEmail').textContent = userEmail;

            await registerWithServer(userEmail.split('@')[0]);

            var earnings, docs;
            try { earnings = await apiCall(API + '/earnings'); docs = await apiCall(API + '/documents'); } catch (e) { toast('Error loading data.'); dashLoaded = false; return; }

            var slug = userEmail.split('@')[0].replace(/[^a-z0-9]/g, '');
            var pubUrl = window.location.origin + '/pub-page.html?p=' + slug;
            var totalRev = earnings.your_earnings || 0;

            el('content').innerHTML =
                '<div class="revenue-card"><div class="rev-label"><i class="bx bx-wallet"></i> Your Revenue</div><div class="rev-amount">' + fmtPrice(totalRev, 'RWF') + '</div><div class="rev-sub">' + earnings.total_transactions + ' sales · ' + earnings.total_documents + ' documents</div></div>' +
                '<div class="pub-link-box"><div class="pub-link"><i class="bx bx-link"></i> ' + pubUrl + '</div><button class="btn btn-primary btn-sm" id="copyLinkBtn"><i class="bx bx-copy"></i> Copy Link</button></div>' +
                '<div class="stats-row"><div class="stat-card"><div class="stat-val">' + earnings.total_documents + '</div><div class="stat-label"><i class="bx bx-file"></i> Documents</div></div><div class="stat-card"><div class="stat-val">' + earnings.total_transactions + '</div><div class="stat-label"><i class="bx bx-cart"></i> Sales</div></div></div>' +
                '<div class="tab-nav"><button class="tab-btn active" data-tab="docs"><i class="bx bx-file"></i> Documents</button><button class="tab-btn" data-tab="add"><i class="bx bx-plus-circle"></i> Add New</button><button class="tab-btn" data-tab="txns"><i class="bx bx-receipt"></i> Sales</button><button class="tab-btn" data-tab="cashout"><i class="bx bx-wallet"></i> Cash Out</button></div>' +
                '<div class="tab-content active" id="tab-docs"><div class="section-title"><i class="bx bx-library"></i> My Documents</div><div class="doc-list" id="docList"></div></div>' +
                '<div class="tab-content" id="tab-add">' + renderAddForm() + '</div>' +
                '<div class="tab-content" id="tab-txns"><div class="section-title"><i class="bx bx-history"></i> Sales History</div><div class="table-wrap"><table><thead><tr><th>Customer</th><th>Phone</th><th>Amount</th><th>Earnings</th></tr></thead><tbody id="txnBody"></tbody></table></div></div>' +
                '<div class="tab-content" id="tab-cashout"><div class="section-title"><i class="bx bx-wallet"></i> Cash Out</div><div class="cashout-box"><h4><i class="bx bx-money-withdraw"></i> Request Cash Out</h4><p>Available balance: <strong>' + fmtPrice(totalRev, 'RWF') + '</strong></p><div class="min-badge">Minimum: 15,000 RWF</div>' + (totalRev >= 15000 ? '<button class="btn btn-gold" id="cashoutBtn"><i class="bx bx-send"></i> Request Cash Out</button>' : '<p style="font-size:.7rem;color:var(--danger)">You need at least 15,000 RWF to cash out.</p>') + '</div></div>';

            renderDocList(docs || []);
            renderTxns(earnings.recent || []);
            initAddForm();
            initTabs();

            el('copyLinkBtn').addEventListener('click', function() { navigator.clipboard.writeText(pubUrl).then(function() { toast('Link copied!'); }); });
            var cb = el('cashoutBtn');
            if (cb) cb.addEventListener('click', function() { if (confirm('Request cash out?')) { toast('Request sent!'); cb.disabled = true; } });
        }

        function renderAddForm() {
            return '<div class="auth-card" style="text-align:left;max-width:100%"><h2><i class="bx bx-plus-circle"></i> Add Document — Step <span id="stepLabel">1</span> of 4</h2>' +
                '<div id="step1"><p style="font-size:.72rem;color:var(--text-secondary);margin-bottom:12px">A clear title and description helps customers understand what they are buying.</p><div class="field"><label><i class="bx bx-edit"></i> Document Title</label><input type="text" id="dTitle" placeholder="e.g. Complete Physics Notes S4"></div><div class="field"><label><i class="bx bx-text"></i> Description</label><textarea id="dDesc" placeholder="Describe what customers will get…"></textarea></div><div class="step-nav"><span></span><button class="btn btn-next" id="nextStep2"><i class="bx bx-right-arrow-alt"></i> Next: Price</button></div></div>' +
                '<div id="step2" style="display:none"><p style="font-size:.72rem;color:var(--text-secondary);margin-bottom:12px">Set the price customers will pay. You keep 88% of each sale.</p><div class="field"><label><i class="bx bx-purchase-tag"></i> Price (RWF)</label><input type="number" id="dPrice" min="1000" max="500000" placeholder="min: 1,000 RWF"><span class="hint" style="font-size:.62rem;color:var(--text-tertiary)">Enter any amount between 1,000 and 500,000 RWF</span></div><div class="step-nav"><button class="btn btn-prev" id="backStep1"><i class="bx bx-left-arrow-alt"></i> Back</button><button class="btn btn-next" id="nextStep3"><i class="bx bx-right-arrow-alt"></i> Next: File</button></div></div>' +
                '<div id="step3" style="display:none"><p style="font-size:.72rem;color:var(--text-secondary);margin-bottom:12px">Upload the actual document (PDF, DOC, PPT, etc.). Make sure it is the final version.</p><div class="field"><label><i class="bx bx-upload"></i> Document File</label><div class="file-upload-area" id="fileArea"><i class="bx bx-file"></i><div class="up-text" id="fileText">Click to select file</div><div class="up-detail" style="font-size:.62rem;color:var(--text-tertiary)">PDF, DOC, PPT, XLS files supported</div><input type="file" id="dFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.csv"></div></div><div class="step-nav"><button class="btn btn-prev" id="backStep2"><i class="bx bx-left-arrow-alt"></i> Back</button><button class="btn btn-next" id="nextStep4"><i class="bx bx-right-arrow-alt"></i> Next: Screenshot</button></div></div>' +
                '<div id="step4" style="display:none"><p style="font-size:.72rem;color:var(--text-secondary);margin-bottom:12px">Add a preview image or screenshot so customers can see a sample before buying.</p><div class="field"><label><i class="bx bx-image"></i> Screenshot / Preview</label><div class="file-upload-area" id="imgArea"><i class="bx bx-image-add"></i><div class="up-text" id="imgText">Click to upload preview</div><input type="file" id="dImage" accept="image/*"></div><img id="imgPreview" style="width:100%;max-height:120px;object-fit:cover;border-radius:10px;margin-top:6px;display:none"></div><div class="step-nav"><button class="btn btn-prev" id="backStep3"><i class="bx bx-left-arrow-alt"></i> Back</button><button class="btn btn-next" id="saveDoc"><i class="bx bx-rocket"></i> Publish Document</button></div></div></div>';
        }

        function initAddForm() {
            addStep = 1; goStep(1);
            el('fileArea').addEventListener('click', function(e) { if (e.target !== el('dFile')) el('dFile').click(); });
            el('dFile').addEventListener('change', function(e) { var f = e.target.files[0]; if (f) { el('fileText').textContent = '✅ ' + f.name; el('fileArea').classList.add('has-file'); } });
            el('imgArea').addEventListener('click', function(e) { if (e.target !== el('dImage')) el('dImage').click(); });
            el('dImage').addEventListener('change', function(e) { var f = e.target.files[0]; if (!f) return; var r = new FileReader(); r.onload = function(ev) { el('imgPreview').src = ev.target.result; el('imgPreview').style.display = 'block'; el('imgText').textContent = '✅ ' + f.name; }; r.readAsDataURL(f); });
            el('nextStep2').addEventListener('click', function() { goStep(2); });
            el('backStep1').addEventListener('click', function() { goStep(1); });
            el('nextStep3').addEventListener('click', function() { goStep(3); });
            el('backStep2').addEventListener('click', function() { goStep(2); });
            el('nextStep4').addEventListener('click', function() { goStep(4); });
            el('backStep3').addEventListener('click', function() { goStep(3); });
            el('saveDoc').addEventListener('click', async function() {
                var btn = this;
                try {
                    var t = el('dTitle').value.trim(), d = el('dDesc').value.trim(), p = parseInt(el('dPrice').value), im = el('dImage').files[0], fl = el('dFile').files[0];
                    if (!t || !p || !fl) { toast('Title, price, and file are required'); return; }
                    if (p < 1000 || p > 500000) { toast('Price must be between 1,000 and 500,000 RWF'); return; }
                    btn.disabled = true; btn.innerHTML = '<i class="bx bx-loader bx-spin"></i> Uploading…';
                    var fd = new FormData(); fd.append('file', fl);
                    var up = await fetch(API + '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + idToken }, body: fd });
                    var ud = await up.json();
                    if (!ud.file_path) { toast('Upload failed'); btn.disabled = false; btn.innerHTML = '<i class="bx bx-rocket"></i> Publish Document'; return; }
                    var imgUrl = '';
                    if (im) { var ifd = new FormData(); ifd.append('image', im); var iu = await fetch('https://api.imgbb.com/1/upload?key=2077df548acf5a4f53658b930c7fe87a', { method: 'POST', body: ifd }); var id = await iu.json(); if (id.success) imgUrl = id.data.url; }
                    await apiCall(API + '/documents', { title: t, description: d, price: p, image_url: imgUrl, file_path: ud.file_path });
                    toast('Published!'); dashLoaded = false; showDash();
                } catch (e) { toast(e.message); btn.disabled = false; btn.innerHTML = '<i class="bx bx-rocket"></i> Publish Document'; }
            });
        }

        function goStep(s) {
            addStep = s;
            var label = el('stepLabel'); if (label) label.textContent = s;
            for (var i = 1; i <= 4; i++) { var step = el('step' + i); if (step) step.style.display = i === s ? 'block' : 'none'; }
            if (s === 4) { var btn = el('saveDoc'); if (btn) btn.innerHTML = '<i class="bx bx-rocket"></i> Publish Document'; }
        }

        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(function(b) {
                b.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(function(x) { x.classList.remove('active'); });
                    b.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(function(x) { x.classList.remove('active'); });
                    var t = el('tab-' + b.dataset.tab);
                    if (t) { t.classList.add('active'); if (b.dataset.tab === 'add') initAddForm(); }
                });
            });
        }

        function renderDocList(docs) {
            var l = el('docList'); if (!l) return;
            if (!docs.length) { l.innerHTML = '<div class="empty"><i class="bx bx-file" style="font-size:36px;display:block;margin-bottom:6px;color:#d1d5db"></i><p>No documents yet.</p><p style="font-size:.7rem">Go to <strong>Add New</strong> to upload your first document.</p></div>'; return; }
            l.innerHTML = '';
            docs.forEach(function(d) {
                var row = document.createElement('div');
                row.className = 'doc-row';
                row.innerHTML = 
                    (d.image_url ? '<img src="' + d.image_url + '" alt="">' : '<div class="doc-thumb"><i class="bx bx-file"></i></div>') +
                    '<div class="doc-info"><h4>' + d.title + ' <span class="badge ' + (d.active ? 'badge-active' : 'badge-hidden') + '">' + (d.active ? 'Active' : 'Hidden') + '</span></h4><span>' + fmtPrice(d.price, d.currency) + ' · ' + (d.clicks || 0) + ' views</span></div>' +
                    '<div class="doc-actions">' +
                        '<button class="btn btn-outline btn-xs share-btn" data-id="' + d.id + '"><i class="bx bx-share-alt"></i></button>' +
                        '<button class="btn btn-outline btn-xs toggle-btn" data-id="' + d.id + '"><i class="bx bx-hide"></i></button>' +
                        '<button class="btn btn-danger btn-xs delete-btn" data-id="' + d.id + '" data-title="' + d.title + '"><i class="bx bx-trash"></i></button>' +
                    '</div>';
                l.appendChild(row);
            });

            // Attach event listeners
            l.querySelectorAll('.share-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = this.dataset.id;
                    var link = window.location.origin + '/pub-view.html?doc=' + id;
                    navigator.clipboard.writeText(link).then(function() { toast('Link copied!'); });
                });
            });
            l.querySelectorAll('.toggle-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = this.dataset.id;
                    apiCall(API + '/documents/' + id + '/toggle', {}, 'PUT').then(function() { dashLoaded = false; showDash(); }).catch(function(e) { toast(e.message); });
                });
            });
            l.querySelectorAll('.delete-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = this.dataset.id, title = this.dataset.title;
                    if (!confirm('Delete "' + title + '" permanently?')) return;
                    apiCall(API + '/documents/' + id, {}, 'DELETE').then(function() { toast('Deleted!'); dashLoaded = false; showDash(); }).catch(function(e) { toast(e.message); });
                });
            });
        }

        function renderTxns(txns) {
            var l = el('txnBody'); if (!l) return;
            var real = (txns || []).filter(function(t) { return t.payment_method !== 'bonus'; });
            if (!real.length) { l.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-tertiary)">No sales yet. Share your page link to start earning!</td></tr>'; return; }
            l.innerHTML = real.map(function(t) { return '<tr><td>' + (t.customer_name || 'Customer') + '</td><td>' + (t.customer_phone || '') + '</td><td>' + fmtPrice(t.amount) + '</td><td class="earn-positive">+' + fmtPrice(t.publisher_earnings || 0) + '</td></tr>'; }).join('');
        }

        el('logoutBtn').addEventListener('click', async function() { await signOut(auth); });

        onAuthStateChanged(auth, function(fbUser) {
            if (fbUser) {
                fbUser.getIdToken().then(function(t) {
                    idToken = t;
                    userEmail = fbUser.email || '';
                    firebaseUID = fbUser.uid;
                    var welcomed = localStorage.getItem('pub_welcomed');
                    if (!welcomed) { showWelcomePopup(); }
                    showDash();
                });
            } else {
                idToken = null; userEmail = ''; firebaseUID = '';
                showLogin();
            }
        });
    </script>
</body>
</html>
