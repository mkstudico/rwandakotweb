<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title> KotWeb Publishers</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,'Helvetica Neue',Arial,sans-serif;--bg-main:#f4f2ee;--bg-surface:#ffffff;--bg-hover:#f9fafb;--bg-input:#eef3f8;--border:#e5e7eb;--text-primary:#191919;--text-secondary:#595856;--text-tertiary:#868482;--primary:#6c47ff;--primary-hover:#5835e8;--primary-light:#f0ebff;--success:#057642;--success-bg:#e9f7ef;--danger:#d11124;--danger-bg:#fdecea;--warning:#b85c00;--warning-bg:#fff8f0;--gold:#e8a838;--gold-bg:#fffdf5;--radius-xl:1.2rem;--radius-full:9999px;--transition-fast:150ms cubic-bezier(0.4,0,0.2,1)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{font-size:16px;scroll-behavior:smooth}body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);min-height:100vh}
        button{cursor:pointer;font-family:inherit;border:none;background:transparent}input,textarea{font-family:inherit;font-size:inherit}
        @keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}@keyframes confetti{0%{transform:translateY(0) rotate(0)}100%{transform:translateY(-120px) rotate(720deg);opacity:0}}
        .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
        .topbar{background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
        .topbar-inner{max-width:1000px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
        .logo{font-size:.92rem;font-weight:800;display:flex;align-items:center;gap:7px;color:var(--text-primary);text-decoration:none}
        .logo span{width:30px;height:30px;clip-path:polygon(0 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%);background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.68rem}
        .user-badge{font-size:.72rem;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
        .user-badge span{color:var(--primary)}
        .container{max-width:1000px;margin:0 auto;padding:1.25rem .85rem 4rem}
        .auth-card{max-width:420px;margin:3rem auto;background:var(--bg-surface);border-radius:var(--radius-xl);padding:2rem 1.5rem;border:1px solid var(--border);text-align:center}
        .auth-card .icon-circle{width:52px;height:52px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
        .auth-card .icon-circle i{font-size:24px;color:var(--primary)}
        .auth-card h2{font-size:1.15rem;font-weight:700;margin-bottom:4px}
        .auth-card .sub{font-size:.74rem;color:var(--text-secondary);margin-bottom:1.25rem}
        .field{margin-bottom:11px;text-align:left}
        .field label{display:block;font-size:.7rem;font-weight:600;color:var(--text-secondary);margin-bottom:3px}
        .field input,.field textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-full);font-size:.82rem;outline:none;background:var(--bg-input);transition:all var(--transition-fast)}
        .field textarea{border-radius:14px;resize:vertical;min-height:60px}.field input:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,71,255,.1);background:var(--bg-surface)}
        .field .err{font-size:.64rem;color:var(--danger);margin-top:2px;display:none}.field .err.show{display:block}
        .field .hint{font-size:.62rem;color:var(--text-tertiary);margin-top:2px}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:var(--radius-full);font-weight:600;font-size:.82rem;transition:all var(--transition-fast);width:100%}
        .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}.btn-primary:disabled{opacity:.5;pointer-events:none}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-primary);width:auto}.btn-outline:hover{background:var(--bg-hover)}
        .btn-sm{padding:6px 12px;font-size:.7rem;width:auto}.btn-danger{background:var(--danger);color:#fff;width:auto}.btn-danger:hover{background:#b91c1c}
        .btn-xs{padding:4px 8px;font-size:.65rem;width:auto;border-radius:20px}
        .btn-gold{background:var(--gold);color:#fff;width:auto}.btn-gold:hover{background:#d4952a}
        .btn-convert{background:#fff;border:2px solid var(--primary);color:var(--primary);font-weight:700;font-size:.75rem;padding:8px 16px;width:auto;border-radius:var(--radius-full);transition:all var(--transition-fast)}.btn-convert:hover{background:var(--primary-light)}
        .link-text{font-size:.7rem;color:var(--text-secondary);margin-top:10px}.link-text a{color:var(--primary);font-weight:600;cursor:pointer;text-decoration:none}
        .revenue-card{background:linear-gradient(135deg,#6c47ff,#8b6cff);border-radius:var(--radius-xl);padding:1.5rem;color:#fff;margin-bottom:1rem;text-align:center}
        .revenue-card .rev-label{font-size:.72rem;opacity:.85;margin-bottom:4px}
        .revenue-card .rev-amount{font-size:2.2rem;font-weight:800;letter-spacing:-1px}
        .revenue-card .rev-sub{font-size:.68rem;opacity:.7;margin-top:4px}
        .bonus-badge{display:inline-block;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;font-size:.65rem;margin-top:6px}
        .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1rem}
        .stat-card{background:var(--bg-surface);border-radius:var(--radius-xl);padding:.9rem;border:1px solid var(--border)}
        .stat-val{font-size:1.1rem;font-weight:700}.stat-label{font-size:.64rem;color:var(--text-secondary)}
        .pub-link-box{background:var(--bg-surface);border:1px solid var(--primary);border-radius:var(--radius-xl);padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .pub-link-box .pub-link{font-size:.72rem;color:var(--primary);word-break:break-all;flex:1;min-width:120px}
        .section-title{font-size:.88rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .tab-nav{display:flex;gap:3px;background:#e5e7eb;border-radius:30px;padding:3px;margin-bottom:1rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .tab-nav::-webkit-scrollbar{display:none}
        .tab-btn{padding:7px 14px;border-radius:28px;font-size:.72rem;font-weight:500;color:var(--text-secondary);white-space:nowrap;transition:all var(--transition-fast);display:flex;align-items:center;gap:4px;flex-shrink:0}.tab-btn i{font-size:14px}.tab-btn.active{background:#fff;color:var(--text-primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .tab-content{display:none}.tab-content.active{display:block;animation:fadeIn .25s ease}
        .doc-list{display:grid;gap:8px}
        .doc-row{background:var(--bg-surface);border-radius:var(--radius-xl);padding:12px 14px;border:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .doc-row img{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0}
        .doc-thumb{width:40px;height:40px;border-radius:6px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#d1d5db;font-size:1.1rem}
        .doc-info{flex:1;min-width:120px}.doc-info h4{font-size:.78rem;font-weight:600}.doc-info span{font-size:.66rem;color:var(--text-secondary)}
        .doc-actions{display:flex;gap:4px;flex-wrap:wrap}
        .badge{font-size:.6rem;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}.badge i{font-size:10px}.badge-active{background:var(--success-bg);color:var(--success)}.badge-hidden{background:var(--danger-bg);color:var(--danger)}
        .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg-surface);border-radius:var(--radius-xl);border:1px solid var(--border)}
        .table-wrap table{width:100%;border-collapse:collapse;font-size:.72rem;min-width:600px}
        .table-wrap th{text-align:left;padding:10px 12px;font-weight:600;font-size:.65rem;color:var(--text-secondary);text-transform:uppercase;background:var(--bg-hover);border-bottom:1px solid var(--border);white-space:nowrap}
        .table-wrap td{padding:9px 12px;border-bottom:1px solid #f5f5f5;white-space:nowrap}.table-wrap tbody tr:hover{background:var(--bg-hover)}
        .earn-positive{color:var(--success);font-weight:600}.fee-text{color:var(--text-tertiary);font-size:.65rem}
        .empty{text-align:center;padding:2rem;color:var(--text-tertiary);font-size:.78rem}
        .file-upload-area{width:100%;padding:16px;border:2px dashed var(--border);border-radius:14px;text-align:center;cursor:pointer;background:var(--bg-input);transition:all var(--transition-fast);margin-bottom:8px;position:relative}
        .file-upload-area:hover{border-color:var(--primary)}.file-upload-area i{font-size:26px;color:#d1d5db;display:block;margin-bottom:4px}.file-upload-area .up-text{font-size:.7rem;color:var(--text-tertiary)}.file-upload-area .up-detail{font-size:.62rem;color:var(--text-tertiary);margin-top:2px}
        .file-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer}.file-upload-area.has-file{border-color:var(--success);background:var(--success-bg)}
        .cashout-box{background:var(--gold-bg);border:1px solid var(--gold);border-radius:var(--radius-xl);padding:1rem 1.2rem;margin-bottom:1rem}
        .cashout-box h4{font-size:.82rem;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .cashout-box p{font-size:.7rem;color:var(--text-secondary);margin-bottom:8px}
        .cashout-box .min-badge{display:inline-block;background:var(--gold);color:#fff;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:600;margin-bottom:8px}
        .step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
        .step-dot{width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--text-tertiary);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;transition:all var(--transition-fast)}.step-dot.active{background:var(--primary);color:#fff}.step-dot.done{background:var(--success);color:#fff}
        .step-line{flex:1;height:2px;background:var(--border);min-width:20px}.step-line.done{background:var(--success)}
        .nav-btns{display:flex;gap:8px;margin-top:10px}
        .welcome-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;visibility:hidden;transition:all .3s}
        .welcome-overlay.active{opacity:1;visibility:visible}
        .welcome-card{background:var(--bg-surface);border-radius:var(--radius-xl);padding:2rem 1.5rem;text-align:center;max-width:380px;width:100%;animation:popIn .4s ease;position:relative;overflow:hidden}
        .welcome-card .confetti{position:absolute;width:8px;height:8px;border-radius:50%;animation:confetti 1.5s ease-out forwards}
        .welcome-card .w-icon{font-size:48px;margin-bottom:8px}
        .welcome-card h2{font-size:1.2rem;font-weight:800;margin-bottom:4px}
        .welcome-card .w-amount{font-size:1.8rem;font-weight:800;color:var(--primary);margin:8px 0}
        .welcome-card .w-link{font-size:.7rem;color:var(--primary);word-break:break-all;margin:8px 0}
        .welcome-card p{font-size:.76rem;color:var(--text-secondary);margin-bottom:8px}
        .guide-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:1rem 1.2rem;margin-bottom:1rem}
        .guide-card h4{font-size:.8rem;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
        .guide-card ul{list-style:none;padding:0}
        .guide-card li{font-size:.7rem;color:var(--text-secondary);padding:4px 0;display:flex;align-items:flex-start;gap:6px}
        .guide-card li i{color:var(--primary);font-size:14px;margin-top:1px;flex-shrink:0}
        .toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:10px 20px;border-radius:30px;font-size:.74rem;z-index:400;animation:slideUp .3s ease;display:none;white-space:nowrap}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:all .25s}
        .modal-overlay.active{opacity:1;visibility:visible}
        .modal{background:var(--bg-surface);border-radius:1.2rem 1.2rem 0 0;width:100%;max-width:460px;max-height:85vh;overflow-y:auto;padding:1.5rem 1.25rem 2rem;animation:slideUp .3s ease}@media(min-width:500px){.modal-overlay{align-items:center}.modal{border-radius:var(--radius-xl);animation:popIn .25s ease}}
        @media(max-width:500px){.stats-row{grid-template-columns:1fr 1fr}.doc-row{flex-direction:column;align-items:flex-start}.doc-actions{width:100%;justify-content:flex-end}.revenue-card .rev-amount{font-size:1.7rem}.tab-btn{font-size:.68rem;padding:6px 10px}}
    </style>
</head>
<body>
    <header class="topbar"><div class="topbar-inner"><a href="index.html" class="logo"><span>K</span> Creator Studio</a><div class="user-badge" id="userBadge" style="display:none"><i class="bx bx-user-circle"></i> <span id="pubUsername"></span></div><button class="btn btn-outline btn-sm" id="logoutBtn" style="display:none">Logout</button></div></header>
    <div class="container" id="content"><div style="text-align:center;padding:3rem;color:var(--text-tertiary)"><div class="spinner"></div><p style="font-size:.8rem">Loading Creator Studio...</p></div></div>
    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="editModal"><div class="modal" id="editModalContent"></div></div>
    <div class="welcome-overlay" id="welcomeOverlay"><div class="welcome-card" id="welcomeCard"></div></div>
    <script>
(function(){'use strict';
var API='/api/pub';var token=null;var publisher=null;var addStep=1;
function $(id){return document.getElementById(id)}
function toast(m){var t=$('toast');t.textContent=m;t.style.display='block';setTimeout(function(){t.style.display='none'},2500)}
async function apiCall(path,body,method){var opts={method:method||(body?'POST':'GET'),headers:{'Content-Type':'application/json'}};if(token)opts.headers['Authorization']='Bearer '+token;if(body)opts.body=JSON.stringify(body);var r=await fetch(path,opts);var txt=await r.text();try{var d=JSON.parse(txt)}catch(e){throw new Error('Invalid server response')}if(!r.ok)throw new Error(d.error||'Request failed');return d}
function saveAuth(t,p){token=t;publisher=p;localStorage.setItem('pub_auth',JSON.stringify({token:t,publisher:p}))}
function loadAuth(){try{var d=JSON.parse(localStorage.getItem('pub_auth'));if(d){token=d.token;publisher=d.publisher;return true}}catch(e){}return false}
function clearAuth(){token=null;publisher=null;localStorage.removeItem('pub_auth');$('logoutBtn').style.display='none';$('userBadge').style.display='none'}
function fmtPrice(n,c){return parseInt(n).toLocaleString()+' '+(c||'RWF')}
function showLoader(msg){$('content').innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-tertiary)"><div class="spinner"></div><p style="font-size:.8rem">'+msg+'</p></div>'}

function showWelcome(pub){
    var link=window.location.origin+'/pub-page.html?p='+pub.slug;
    $('welcomeCard').innerHTML='<div class="confetti" style="background:#6c47ff;left:20%;top:10%;animation-delay:0s"></div><div class="confetti" style="background:#e8a838;left:60%;top:15%;animation-delay:.2s"></div><div class="confetti" style="background:#057642;left:80%;top:8%;animation-delay:.4s"></div><div class="confetti" style="background:#d11124;left:10%;top:5%;animation-delay:.6s"></div><div class="confetti" style="background:#6c47ff;left:50%;top:20%;animation-delay:.8s"></div><div class="confetti" style="background:#e8a838;left:35%;top:25%;animation-delay:1s"></div><div class="w-icon">🎉</div><h2>Welcome to Creator Studio!</h2><div class="w-amount">+1,000 RWF Bonus</div><p>Your startup bonus has been added to your account! Start uploading documents and earning money.</p><p style="font-size:.65rem;color:var(--text-secondary)">Share your page link with customers:</p><div class="w-link">'+link+'</div><button class="btn btn-primary" style="margin-top:10px" onclick="$(\'welcomeOverlay\').classList.remove(\'active\')">Get Started!</button>';
    $('welcomeOverlay').classList.add('active');
}

function showLogin(){
    var c=$('content');c.innerHTML='<div class="auth-card"><div class="icon-circle"><i class="bx bx-log-in"></i></div><h2>Sign In to Creator Studio</h2><p class="sub">Login to manage your content and earnings</p><form autocomplete="off" onsubmit="return false"><div class="field"><label>Username or Email</label><input type="text" id="loginUser" placeholder="username or email" autocomplete="off"></div><div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="password" autocomplete="off"></div></form><button class="btn btn-primary" id="loginBtn">Sign In</button><p class="link-text">New creator? <a id="showRegister">Create an account</a></p></div>';
    $('loginBtn').addEventListener('click',async function(){var btn=this;btn.disabled=true;btn.innerHTML='<i class="bx bx-loader bx-spin"></i> Signing in...';try{var u=$('loginUser').value.trim(),p=$('loginPass').value;if(!u||!p){toast('Fill all fields');btn.disabled=false;btn.innerHTML='Sign In';return}var r=await apiCall(API+'/login',{login:u,password:p});saveAuth(r.token,r.publisher);showDash()}catch(e){toast(e.message);btn.disabled=false;btn.innerHTML='Sign In'}});
    $('showRegister').addEventListener('click',function(e){e.preventDefault();showRegister()});
    $('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')$('loginBtn').click()});
}

function showRegister(){
    var c=$('content');c.innerHTML='<div class="auth-card"><div class="icon-circle"><i class="bx bx-user-plus"></i></div><h2>Join Creator Studio</h2><p class="sub">Start earning by selling your documents. Get <strong>1,000 RWF bonus</strong> on signup!</p><form autocomplete="off" onsubmit="return false"><div class="field"><label>Choose a Username</label><input type="text" id="regUser" placeholder="your username" autocomplete="off"><span class="err" id="regUserErr">Username already taken</span></div><div class="field"><label>Email Address</label><input type="email" id="regEmail" placeholder="your@email.com" autocomplete="off"><span class="err" id="regEmailErr">Email already registered</span></div><div class="field"><label>Password</label><input type="password" id="regPass" placeholder="min 6 characters" autocomplete="off"></div></form><button class="btn btn-primary" id="regBtn">Create Account & Claim 1,000 RWF</button><p class="link-text">Already have an account? <a id="showLoginLink">Sign In</a></p></div>';
    $('regBtn').addEventListener('click',async function(){var btn=this;btn.disabled=true;btn.innerHTML='<i class="bx bx-loader bx-spin"></i> Creating...';try{var u=$('regUser').value.trim(),e=$('regEmail').value.trim(),p=$('regPass').value;$('regUserErr').classList.remove('show');$('regEmailErr').classList.remove('show');if(!u||!e||!p){toast('Fill all fields');btn.disabled=false;btn.innerHTML='Create Account & Claim 1,000 RWF';return}if(u.length<3){toast('Username: min 3 characters');btn.disabled=false;btn.innerHTML='Create Account & Claim 1,000 RWF';return}if(p.length<6){toast('Password: min 6 characters');btn.disabled=false;btn.innerHTML='Create Account & Claim 1,000 RWF';return}var r=await apiCall(API+'/register',{username:u,email:e,name:u,password:p});saveAuth(r.token,r.publisher);showWelcome(r.publisher);setTimeout(function(){showDash()},500)}catch(err){var msg=err.message||'';if(msg.toLowerCase().includes('username'))$('regUserErr').classList.add('show');if(msg.toLowerCase().includes('email'))$('regEmailErr').classList.add('show');toast(msg);btn.disabled=false;btn.innerHTML='Create Account & Claim 1,000 RWF'}});
    $('showLoginLink').addEventListener('click',function(e){e.preventDefault();showLogin()});
}

async function showDash(){if(!publisher)return;showLoader('Loading Creator Studio...');var c=$('content');$('logoutBtn').style.display='inline-flex';$('userBadge').style.display='flex';$('pubUsername').textContent='@'+publisher.username;
    var earnings,docs;
    try{earnings=await apiCall(API+'/earnings');docs=await apiCall(API+'/documents')}catch(e){toast('Session expired. Please login again.');clearAuth();showLogin();return}
    var pubUrl=window.location.origin+'/pub-page.html?p='+publisher.slug;
    var totalRev=earnings.your_earnings||0;
    c.innerHTML=
    '<div class="revenue-card"><div class="rev-label">Total Revenue</div><div class="rev-amount">'+fmtPrice(totalRev,'RWF')+'</div><div class="rev-sub">'+earnings.total_transactions+' sales</div>'+(earnings.bonus_claimed?'<div class="bonus-badge">🎉 +1,000 RWF Startup Bonus Included</div>':'')+'</div>'+
    '<div class="pub-link-box"><div class="pub-link"><i class="bx bx-link"></i> '+pubUrl+'</div><button class="btn btn-primary btn-sm" onclick="copyLink(\''+pubUrl+'\')"><i class="bx bx-copy"></i> Copy Link</button><button class="btn btn-outline btn-sm" onclick="shareLink(\''+pubUrl+'\')"><i class="bx bx-share-alt"></i> Share</button></div>'+
    '<div class="stats-row"><div class="stat-card"><div class="stat-val">'+earnings.total_documents+'</div><div class="stat-label">Documents</div></div><div class="stat-card"><div class="stat-val">'+earnings.total_transactions+'</div><div class="stat-label">Sales</div></div></div>'+
    '<div class="tab-nav"><button class="tab-btn active" data-tab="guide"><i class="bx bx-book"></i> Guide</button><button class="tab-btn" data-tab="docs"><i class="bx bx-file"></i> Documents</button><button class="tab-btn" data-tab="add"><i class="bx bx-plus-circle"></i> Upload</button><button class="tab-btn" data-tab="txns"><i class="bx bx-receipt"></i> Sales</button><button class="tab-btn" data-tab="cashout"><i class="bx bx-wallet"></i> Cash Out</button></div>'+
    '<div class="tab-content active" id="tab-guide">'+renderGuide()+'</div>'+
    '<div class="tab-content" id="tab-docs"><div class="section-title"><i class="bx bx-library"></i> My Documents ('+(docs||[]).length+')</div><div class="doc-list" id="docList"></div></div>'+
    '<div class="tab-content" id="tab-add">'+renderAddForm()+'</div>'+
    '<div class="tab-content" id="tab-txns"><div class="section-title"><i class="bx bx-history"></i> Transaction History</div><div class="table-wrap"><table><thead><tr><th>Customer</th><th>Document</th><th>Phone</th><th>Paid</th><th>You Earn (88%)</th><th>Fee (12%)</th></tr></thead><tbody id="txnBody"></tbody></table></div></div>'+
    '<div class="tab-content" id="tab-cashout"><div class="section-title"><i class="bx bx-wallet"></i> Cash Out</div><div class="cashout-box"><h4><i class="bx bx-money-withdraw"></i> Request Cash Out</h4><p>Your current balance: <strong>'+fmtPrice(totalRev,'RWF')+'</strong></p><div class="min-badge">Minimum: 15,000 RWF</div>'+(totalRev>=15000?'<button class="btn btn-gold" id="cashoutBtn"><i class="bx bx-send"></i> Request Cash Out ('+fmtPrice(totalRev,'RWF')+')</button>':'<p style="font-size:.7rem;color:var(--danger)">You need at least 15,000 RWF to request a cash out.</p>')+'</div></div>';

    renderDocList(docs||[]);renderTxns(earnings.recent||[]);
    initAddForm();initTabs();

    var cb=$('cashoutBtn');if(cb)cb.addEventListener('click',function(){if(confirm('Request cash out of '+fmtPrice(totalRev,'RWF')+'? This will be sent to admin for approval.')){toast('Cash out request sent! Admin will review.');$('cashoutBtn').disabled=true;$('cashoutBtn').innerHTML='<i class="bx bx-check"></i> Request Sent'}});
}

function renderGuide(){return'<div class="guide-card"><h4><i class="bx bx-rocket"></i> Welcome to Creator Studio!</h4><p style="font-size:.72rem;color:var(--text-secondary);margin-bottom:8px">Here\'s how to start earning money by selling your documents:</p><ul><li><i class="bx bx-user-plus"></i> <strong>Step 1:</strong> Your account is ready! Share your page link with customers.</li><li><i class="bx bx-upload"></i> <strong>Step 2:</strong> Go to <strong>Upload</strong> tab to add documents. Each document needs a title, description, price, file (PDF/DOC recommended), and a screenshot.</li><li><i class="bx bx-file"></i> <strong>Step 3:</strong> If you have images, convert them to PDF using <a href="https://bigpdf.11zon.com/en/images-to-pdf/" target="_blank" style="color:var(--primary);font-weight:600;">this free converter</a> first.</li><li><i class="bx bx-share-alt"></i> <strong>Step 4:</strong> Copy your page link and share it on WhatsApp, Instagram, or anywhere. When customers pay, you earn <strong>88%</strong> of each sale!</li><li><i class="bx bx-wallet"></i> <strong>Step 5:</strong> Track your earnings in <strong>Sales</strong> tab. Request cash out when you reach 15,000 RWF.</li><li><i class="bx bx-credit-card"></i> <strong>Payments:</strong> Customers pay via MTN/Airtel Mobile Money. You receive your earnings directly.</li></ul></div><div class="guide-card"><h4><i class="bx bx-info-circle"></i> Important Notes</h4><ul><li><i class="bx bx-check-circle"></i> Minimum document price: 1,000 RWF</li><li><i class="bx bx-check-circle"></i> Maximum document price: 500,000 RWF</li><li><i class="bx bx-check-circle"></i> You earn 88% per sale, platform takes 12%</li><li><i class="bx bx-check-circle"></i> Cash out minimum: 15,000 RWF</li><li><i class="bx bx-check-circle"></i> Upload PDF or DOC files for best results</li></ul></div>'}

function renderAddForm(){
    return'<div class="auth-card" style="text-align:left;max-width:100%"><div class="step-indicator"><div class="step-dot active" id="sd1">1</div><div class="step-line" id="sl1"></div><div class="step-dot" id="sd2">2</div><div class="step-line" id="sl2"></div><div class="step-dot" id="sd3">3</div><div class="step-line" id="sl3"></div><div class="step-dot" id="sd4">4</div></div><div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--text-tertiary);margin-bottom:1rem"><span>Details</span><span>Price</span><span>File</span><span>Image</span></div>'+
    '<div id="step1"><h3 style="font-size:.95rem;font-weight:700;margin-bottom:4px">📝 Document Details</h3><p style="font-size:.7rem;color:var(--text-secondary);margin-bottom:12px">Give your document a clear title and a short description so customers know exactly what they\'re buying. Think about what will make someone want to purchase this.</p><div class="field"><label>Document Title *</label><input type="text" id="dTitle" placeholder="e.g. Complete Physics Notes S4"></div><div class="field"><label>Short Description</label><textarea id="dDesc" placeholder="e.g. Covers all topics from term 1 to term 3 with practice questions and answers..."></textarea></div><div class="nav-btns"><button class="btn btn-primary" onclick="goStep(2)">Next: Set Price →</button></div></div>'+
    '<div id="step2" style="display:none"><h3 style="font-size:.95rem;font-weight:700;margin-bottom:4px">💰 Set Your Price</h3><p style="font-size:.7rem;color:var(--text-secondary);margin-bottom:12px">Choose how much customers will pay. Remember: you keep 88% of each sale. Set a fair price that reflects the value of your document.</p><div class="field"><label>Price in RWF *</label><input type="number" id="dPrice" min="1000" max="500000" value="1000"><span class="hint">Min: 1,000 RWF · Max: 500,000 RWF · You earn: <strong id="earnCalc">880 RWF</strong> per sale</span></div><div class="nav-btns"><button class="btn btn-outline" onclick="goStep(1)">← Back</button><button class="btn btn-primary" onclick="goStep(3)">Next: Upload File →</button></div></div>'+
    '<div id="step3" style="display:none"><h3 style="font-size:.95rem;font-weight:700;margin-bottom:4px">📁 Upload Your Document</h3><p style="font-size:.7rem;color:var(--text-secondary);margin-bottom:12px">Upload the actual document file. <strong>PDF and DOC files work best.</strong> If you have multiple images, please convert them to a single PDF first — it\'s free and easy!</p><a href="https://bigpdf.11zon.com/en/images-to-pdf/" target="_blank" class="btn-convert" style="display:inline-flex;margin-bottom:12px"><i class="bx bx-link-external"></i> Convert Images to PDF (Free Tool)</a><div class="file-upload-area" id="fileArea"><i class="bx bx-upload"></i><div class="up-text" id="fileText">Click here to select your file</div><div class="up-detail">Accepted: PDF, DOC, DOCX, PPT, XLS (not images)</div><input type="file" id="dFile" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.txt,.csv"></div><div class="nav-btns"><button class="btn btn-outline" onclick="goStep(2)">← Back</button><button class="btn btn-primary" onclick="goStep(4)">Next: Add Screenshot →</button></div></div>'+
    '<div id="step4" style="display:none"><h3 style="font-size:.95rem;font-weight:700;margin-bottom:4px">📸 Add a Screenshot</h3><p style="font-size:.7rem;color:var(--text-secondary);margin-bottom:12px">Add a preview image or screenshot of your document (e.g. the first page or cover). This helps customers see what they\'re buying before they pay.</p><div class="file-upload-area" id="imgArea"><i class="bx bx-image-add"></i><div class="up-text" id="imgText">Click here to upload a screenshot</div><div class="up-detail">PNG, JPG, or WebP image</div><input type="file" id="dImage" accept="image/*"></div><img id="imgPreview" style="width:100%;max-height:120px;object-fit:cover;border-radius:10px;margin-top:6px;display:none"><div class="nav-btns"><button class="btn btn-outline" onclick="goStep(3)">← Back</button><button class="btn btn-primary" id="saveDoc"><i class="bx bx-save"></i> Publish Document</button></div></div></div>'
}

function initAddForm(){
    addStep=1;goStep(1);
    $('dPrice').addEventListener('input',function(){var p=parseInt(this.value)||0;var e=Math.floor(p*0.88);var el=$('earnCalc');if(el)el.textContent=fmtPrice(e,'RWF')+' (88%)'});
    $('fileArea').addEventListener('click',function(e){if(e.target!==$('dFile'))$('dFile').click()});
    $('dFile').addEventListener('change',function(e){var f=e.target.files[0];if(f){$('fileText').textContent='✅ '+f.name;$('fileArea').classList.add('has-file')}});
    $('imgArea').addEventListener('click',function(e){if(e.target!==$('dImage'))$('dImage').click()});
    $('dImage').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){$('imgPreview').src=ev.target.result;$('imgPreview').style.display='block';$('imgText').textContent='✅ '+f.name;$('imgArea').classList.add('has-file')};r.readAsDataURL(f)});
    $('saveDoc').addEventListener('click',async function(){var btn=this;try{var t=$('dTitle').value.trim(),d=$('dDesc').value.trim(),p=parseInt($('dPrice').value),im=$('dImage').files[0],fl=$('dFile').files[0];if(!t||!p||!fl){toast('Title, price, and file are required');return}if(p<1000){toast('Minimum price: 1,000 RWF');return}if(p>500000){toast('Maximum price: 500,000 RWF');return}btn.disabled=true;btn.innerHTML='<i class="bx bx-loader bx-spin"></i> Uploading...';var fd=new FormData();fd.append('file',fl);var up=await fetch(API+'/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});var ud=await up.json();if(!ud.file_path){toast('File upload failed');btn.disabled=false;btn.innerHTML='<i class="bx bx-save"></i> Publish Document';return}var imgUrl='';if(im){var ifd=new FormData();ifd.append('image',im);var iu=await fetch('https://api.imgbb.com/1/upload?key=2077df548acf5a4f53658b930c7fe87a',{method:'POST',body:ifd});var id=await iu.json();if(id.success)imgUrl=id.data.url}await apiCall(API+'/documents',{title:t,description:d,price:p,image_url:imgUrl,file_path:ud.file_path});toast('Document published! 🎉');showDash()}catch(e){toast(e.message);btn.disabled=false;btn.innerHTML='<i class="bx bx-save"></i> Publish Document'}})
}

window.goStep=function(s){addStep=s;for(var i=1;i<=4;i++){var el=$('step'+i);if(el)el.style.display=i===s?'block':'none';var sd=$('sd'+i);if(sd){sd.classList.remove('active','done');if(i<s)sd.classList.add('done');if(i===s)sd.classList.add('active')}var sl=$('sl'+(i-1));if(sl){sl.classList.remove('done');if(i-1<s)sl.classList.add('done')}}
    if(s===4){var p=parseInt(($('dPrice').value)||0);var btn=$('saveDoc');if(btn){var e=Math.floor(p*0.88);btn.innerHTML='<i class="bx bx-rocket"></i> Publish for '+fmtPrice(p,'RWF')+' (You earn '+fmtPrice(e,'RWF')+')'}}}

function initTabs(){document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});var t=$('tab-'+b.dataset.tab);if(t){t.classList.add('active');if(b.dataset.tab==='add')initAddForm()}})})}

function renderDocList(docs){var l=$('docList');if(!l)return;if(!docs.length){l.innerHTML='<div class="empty"><i class="bx bx-file" style="font-size:32px;display:block;margin-bottom:6px;color:#d1d5db"></i>No documents yet. Go to <strong>Upload</strong> tab to add your first document!</div>';return}
    l.innerHTML=docs.map(function(d){var link=window.location.origin+'/pub-view.html?doc='+d.id;return'<div class="doc-row">'+(d.image_url?'<img src="'+d.image_url+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">':'')+'<div class="doc-thumb" style="'+(d.image_url?'display:none':'')+'"><i class="bx bx-file"></i></div><div class="doc-info"><h4>'+d.title+' <span class="badge '+(d.active?'badge-active':'badge-hidden')+'"><i class="bx '+(d.active?'bx-check':'bx-hide')+'"></i> '+(d.active?'Active':'Hidden')+'</span></h4><span>'+fmtPrice(d.price,d.currency)+' · '+(d.clicks||0)+' views</span></div><div class="doc-actions"><button class="btn btn-outline btn-xs" onclick="shareLink(\''+link+'\')"><i class="bx bx-share-alt"></i></button><button class="btn btn-outline btn-xs" onclick="editDoc(\''+d.id+'\',\''+d.title.replace(/'/g,"\\'")+'\',\''+(d.description||'').replace(/'/g,"\\'")+'\','+d.price+',\''+(d.image_url||'')+'\')"><i class="bx bx-edit"></i></button><button class="btn btn-outline btn-xs" onclick="toggleDoc(\''+d.id+'\')"><i class="bx '+(d.active?'bx-hide':'bx-show')+'"></i></button><button class="btn btn-danger btn-xs" onclick="deleteDoc(\''+d.id+'\',\''+d.title.replace(/'/g,"\\'")+'\')"><i class="bx bx-trash"></i></button></div></div>'}).join('')}

function renderTxns(txns){var l=$('txnBody');if(!l)return;if(!txns.length){l.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text-tertiary);padding:2rem">No sales yet. Share your page link to start earning!</td></tr>';return}
    l.innerHTML=txns.filter(function(t){return t.payment_method!=='bonus'}).map(function(t){var earn=Math.floor((t.amount||0)*0.88);var fee=(t.amount||0)-earn;return'<tr><td>'+(t.customer_name||'Customer')+'</td><td>Document</td><td>'+(t.customer_phone||'')+'</td><td>'+fmtPrice(t.amount,t.currency)+'</td><td class="earn-positive">+'+fmtPrice(earn,t.currency)+'</td><td class="fee-text">-'+fmtPrice(fee,t.currency)+'</td></tr>'}).join('')}

window.copyLink=function(url){navigator.clipboard.writeText(url).then(function(){toast('Link copied!')}).catch(function(){toast('Copy failed')})};
window.shareLink=function(url){if(navigator.share){navigator.share({url:url}).catch(function(){})}else{navigator.clipboard.writeText(url).then(function(){toast('Link copied! Share it anywhere!')})}};
window.toggleDoc=async function(id){try{await apiCall(API+'/documents/'+id+'/toggle',{},'PUT');showDash()}catch(e){toast(e.message)}};
window.deleteDoc=async function(id,title){if(!confirm('Delete "'+title+'" permanently? This cannot be undone.'))return;try{await apiCall(API+'/documents/'+id,{},'DELETE');toast('Deleted!');showDash()}catch(e){toast(e.message)}};
window.editDoc=function(id,title,desc,price,img){$('editModalContent').innerHTML='<h3>Edit Document</h3><div class="field"><label>Title</label><input type="text" id="eTitle" value="'+title+'"></div><div class="field"><label>Description</label><textarea id="eDesc">'+desc+'</textarea></div><div class="field"><label>Price (RWF)</label><input type="number" id="ePrice" value="'+price+'" min="1000" max="500000"></div><button class="btn btn-primary" id="saveEdit">Save Changes</button><button class="btn btn-outline" style="margin-top:6px" onclick="$(\'editModal\').classList.remove(\'active\')">Cancel</button>';
    $('editModal').classList.add('active');
    $('saveEdit').addEventListener('click',async function(){try{var nt=$('eTitle').value.trim(),nd=$('eDesc').value.trim(),np=parseInt($('ePrice').value);if(!nt||!np){toast('Title and price required');return}if(np<1000||np>500000){toast('Price must be 1,000-500,000 RWF');return}await apiCall(API+'/documents/'+id,{title:nt,description:nd,price:np,file_path:'keep',image_url:img},'POST');$('editModal').classList.remove('active');toast('Updated!');showDash()}catch(e){toast(e.message)}})};
$('editModal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('active')});

$('logoutBtn').addEventListener('click',async function(){try{await apiCall(API+'/logout',{},'POST');}catch(e){}clearAuth();showLogin()});
if(loadAuth()){showDash()}else{showLogin()}
})();
</script>
</body>
</html>
