<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Publisher — KotWeb</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Roboto,'Helvetica Neue',Arial,sans-serif;--bg-main:#f4f2ee;--bg-surface:#ffffff;--bg-hover:#f9fafb;--bg-input:#eef3f8;--border:#e5e7eb;--text-primary:#191919;--text-secondary:#595856;--text-tertiary:#868482;--primary:#6c47ff;--primary-hover:#5835e8;--radius-xl:1rem;--radius-full:9999px;--transition-fast:150ms cubic-bezier(0.4,0,0.2,1)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{font-size:16px}body{font-family:var(--font-family);background:var(--bg-main);color:var(--text-primary);min-height:100vh}a{color:inherit;text-decoration:none}
        .topbar{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1rem;height:50px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
        .topbar-inner{max-width:900px;margin:0 auto;width:100%;display:flex;align-items:center;gap:10px}
        .logo{font-size:.9rem;font-weight:800;display:flex;align-items:center;gap:6px}
        .logo span{width:28px;height:28px;clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%);background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.65rem}
        .container{max-width:900px;margin:0 auto;padding:1.25rem .85rem 4rem}
        .pub-header{text-align:center;padding:1.5rem 1rem}
        .pub-header h1{font-size:1.4rem;font-weight:800}.pub-header p{color:var(--text-secondary);font-size:.8rem;margin-top:4px}
        .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem}
        .card{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%);padding:1rem;cursor:pointer;transition:all var(--transition-fast);display:flex;flex-direction:column;gap:.4rem}.card:hover{border-color:var(--primary);transform:translateY(-2px)}
        .card-img{width:100%;height:130px;background:var(--bg-input);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}.card-img img{width:100%;height:100%;object-fit:cover}.card-img i{font-size:3rem;color:#d1d5db}
        .card h4{font-size:.82rem;font-weight:600}.card .price{font-size:.85rem;font-weight:700;color:var(--primary)}.card .meta{font-size:.65rem;color:var(--text-tertiary)}
        .empty{text-align:center;padding:3rem;color:var(--text-tertiary)}
        @media(max-width:500px){.card-grid{grid-template-columns:1fr 1fr;gap:.5rem}}
    </style>
</head>
<body>
    <header class="topbar"><div class="topbar-inner"><a href="index.html" class="logo"><span>K</span> KotWeb</a></div></header>
    <div class="container" id="content"><div style="text-align:center;padding:3rem">Loading...</div></div>
    <script>
(function(){var pr=new URLSearchParams(window.location.search);var slug=pr.get('p');if(!slug){document.getElementById('content').innerHTML='<div class="empty"><i class="bx bx-error-circle" style="font-size:48px;display:block;margin-bottom:10px;color:#d1d5db"></i><p>No publisher specified.</p></div>';return}
fetch('/api/pub/page/'+slug).then(function(r){return r.json()}).then(function(d){if(d.error){document.getElementById('content').innerHTML='<div class="empty"><p>Publisher not found.</p></div>';return}
    document.title=d.publisher.name+' — KotWeb';
    var h='<div class="pub-header"><h1>'+d.publisher.name+'</h1><p>@'+d.publisher.username+' · '+d.documents.length+' documents</p></div><div class="card-grid">';
    if(!d.documents.length)h+='<div class="empty"><p>No documents yet.</p></div>';
    else d.documents.forEach(function(doc){h+='<a href="pub-view.html?doc='+doc.id+'" class="card"><div class="card-img">'+(doc.image_url?'<img src="'+doc.image_url+'" alt="">':'<i class="bx bx-file"></i>')+'</div><h4>'+doc.title+'</h4><div class="price">'+parseInt(doc.price).toLocaleString()+' RWF</div><div class="meta"><i class="bx bx-show"></i> '+(doc.clicks||0)+' views</div></a>'});
    h+='</div>';document.getElementById('content').innerHTML=h}).catch(function(){document.getElementById('content').innerHTML='<div class="empty"><p>Failed to load.</p></div>'})})();
</script>
</body>
</html>
