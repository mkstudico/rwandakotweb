            async function api(path,body){var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort()},20000);try{var opts={method:body?'POST':'GET',headers:{'Content-Type':'application/json'},signal:ctrl.signal};if(body)opts.body=JSON.stringify(body);var r=await fetch(path,opts);clearTimeout(t);var txt=await r.text();if(!r.ok){var msg='Request failed';try{msg=JSON.parse(txt).error||msg}catch(e){}throw new Error(msg)}try{return JSON.parse(txt)}catch(e){throw new Error('Invalid')}}catch(err){clearTimeout(t);if(err.name==='AbortError')throw new Error('Timed out');throw err}}
            async function fp(){try{var f=await FingerprintJS.load();return(await f.get()).visitorId}catch(e){var c=[navigator.userAgent,screen.width+'x'+screen.height,navigator.language,new Date().getTimezoneOffset(),navigator.hardwareConcurrency||''];return'fb_'+btoa(c.join('|')).replace(/[=+/]/g,'').slice(0,48)}}

            el('paymentStepsModal').addEventListener('click',function(e){if(e.target===this)closeModal()})
            async function execPay(){var name=(el('modalNameInput').value||'').trim(),phone=(el('modalPhoneInput').value||'').replace(/\s/g,'');if(!name||name.length<2){toast('Please enter your full name',true);return}if(!vphone(phone)){toast('Enter valid phone (078...)',true);return}if(!doc||!fingerprint){toast('Loading...',true);return}closeModal();var btn=el('payBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="bx bx-loader bx-spin"></i> Processing...'}payToken=genToken();var atp=isDoubled&&doubledPrice?doubledPrice:doc.price;try{var r=await api('/api/rwandapay-init',{document_id:docId,device_fingerprint:fingerprint,phone:phone,client_token:payToken,customer_name:name});if(r.already_paid){isPaid=true;withinWindow=true;isDoubled=false;completedToken=payToken;render();toast('Already paid!');return}if(r.error){toast(r.error,true);if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-lock"></i> Pay to Download'}return}if(r.payment_url){rpReference=r.reference||payToken;el('processingOverlay').classList.add('active');poll(rpReference);window.location.href=r.payment_url}}catch(err){toast(err.message,true);if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-lock"></i> Pay to Download'}}}
            function poll(ref){clearInterval(pollTimer);var at=0;rpReference=ref;payToken=ref;pollTimer=setInterval(async function(){at++;try{var r=await api('/api/rwandapay-verify',{reference:ref,client_token:ref,document_id:docId,device_fingerprint:fingerprint});if(r.verified&&r.status==='completed'){clearInterval(pollTimer);el('processingOverlay').classList.remove('active');isPaid=true;withinWindow=true;isDoubled=false;completedToken=ref;render();toast('Payment confirmed!');return}if(r.status==='failed'){clearInterval(pollTimer);el('processingOverlay').classList.remove('active');toast('Payment failed. Try again.',true);var btn=el('payBtn');if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-lock"></i> Pay to Download'}return}}catch(e){}if(at>=90){clearInterval(pollTimer);el('processingOverlay').classList.remove('active');toast('Verification timeout. Refresh page.',true)}},3000)}
            function dl(){var btn=el('downloadBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="bx bx-loader bx-spin"></i> Downloading...'}api('/api/download',{client_token:'download',device_fingerprint:fingerprint,document_id:docId}).then(function(r){if(r.url){if(btn)btn.innerHTML='<i class="bx bx-cloud-download"></i> Fetching...';fetch(r.url).then(function(res){if(!res.ok)throw new Error('Failed');return res.blob()}).then(function(b){var fn=r.filename||'document',u=window.URL.createObjectURL(b),a=document.createElement('a');a.style.display='none';a.href=u;a.download=fn;document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);window.URL.revokeObjectURL(u)},200);if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-download"></i> Download Again'}toast('Download started!')}).catch(function(){window.open(r.url,'_blank');if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-download"></i> Download'}})}else{toast(r.error||'Download failed',true);if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-download"></i> Download'}}}).catch(function(err){toast(err.message||'Download failed',true);if(btn){btn.disabled=false;btn.innerHTML='<i class="bx bx-download"></i> Download'}})}
            function checkRet(){var sp=pr.get('status');if(sp==='successful'||sp==='success'){isPaid=true;withinWindow=true;isDoubled=false;el('processingOverlay').classList.remove('active');render();toast('Payment successful!');if(rpReference){payToken=rpReference;api('/api/rwandapay-verify',{reference:rpReference,client_token:rpReference,document_id:docId,device_fingerprint:fingerprint}).catch(function(){})}}if(sp==='failed'){toast('Payment was not successful. Please try again.',true)}}
            (async function(){try{var fpP=fp();await loadDoc();fingerprint=await fpP;updateMeta();await checkPaid();fetch('/api/documents/'+docId+'/click',{method:'POST'}).catch(function(){});render();checkRet()}catch(e){}})()
        })();
    </script>
