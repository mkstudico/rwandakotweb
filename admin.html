<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #fafbfc;
            --surface: #fff;
            --text: #1a1a2e;
            --sub: #6b7280;
            --border: #eef0f2;
            --accent: #1a1a2e;
            --red: #dc2626;
            --green: #059669;
            --green-bg: #ecfdf5;
            --red-bg: #fef2f2;
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .login-screen {
            max-width: 380px;
            margin: 80px auto;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 36px 24px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .login-card .material-icons { font-size: 40px; color: var(--accent); margin-bottom: 8px; }
        .login-card h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 18px; }
        .input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 12px;
            transition: border var(--transition);
            outline: none;
            -webkit-appearance: none;
        }
        .input:focus { border-color: var(--accent); }
        .btn {
            padding: 11px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            font-family: 'Poppins', sans-serif;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn .material-icons { font-size: 18px; }
        .btn-dark { background: var(--accent); color: #fff; }
        .btn-dark:active { background: #2d2d44; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-red:active { background: #b91c1c; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-outline {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:active { background: #f9fafb; }
        .btn-sm { padding: 7px 12px; font-size: 0.78rem; }
        .btn-block { width: 100%; justify-content: center; }

        .dashboard { display: none; max-width: 880px; margin: 0 auto; padding: 28px 16px 60px; }
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .dash-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 22px 18px;
            border: 1px solid var(--border);
            margin-bottom: 22px;
        }
        .form-card h2 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        .form-group.full { grid-column: 1/-1; }
        .form-group label {
            font-size: 0.76rem;
            font-weight: 500;
            color: var(--sub);
        }
        .form-group .input, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: 'Poppins', sans-serif;
            outline: none;
            resize: vertical;
        }
        .form-group textarea { min-height: 65px; }
        .preview-img {
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 6px;
            border: 1px solid var(--border);
        }
        .file-status { font-size: 0.72rem; color: var(--sub); margin-top: 4px; }

        .docs-list { display: grid; gap: 10px; }
        .doc-row {
            background: var(--surface);
            border-radius: var(--radius-sm);
            padding: 14px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .doc-row img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .doc-row .icon-placeholder {
            width: 50px;
            height: 50px;
            background: #f3f4f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .doc-row .info { flex: 1; min-width: 140px; }
        .doc-row .info h4 { font-size: 0.9rem; font-weight: 600; }
        .doc-row .info span { font-size: 0.72rem; color: var(--sub); display: block; margin-top: 1px; }
        .doc-row .actions { display: flex; gap: 6px; flex-shrink: 0; }
        .badge {
            font-size: 0.66rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }
        .badge-active { background: var(--green-bg); color: #065f46; }
        .badge-inactive { background: var(--red-bg); color: #991b1b; }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 22px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Poppins', sans-serif;
            z-index: 200;
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.err { background: #dc2626; }

        @media (max-width: 540px) {
            .form-row { grid-template-columns: 1fr; }
            .doc-row .actions { width: 100%; justify-content: flex-end; margin-top: 6px; }
            .dash-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <span class="material-icons">shield</span>
            <h1>Admin Login</h1>
            <input type="password" class="input" id="adminKey" placeholder="Enter admin key" autocomplete="off">
            <button class="btn btn-dark btn-block" onclick="login()"><span class="material-icons">login</span> Sign In</button>
            <p style="color:#dc2626;font-size:0.78rem;margin-top:10px;display:none;" id="loginErr"></p>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="dash-header">
            <h1><span class="material-icons">dashboard</span> Document Manager</h1>
            <button class="btn btn-outline" onclick="logout()"><span class="material-icons">logout</span> Logout</button>
        </div>

        <div class="form-card">
            <h2 id="formTitle"><span class="material-icons">add_circle</span> Add Document</h2>
            <div class="form-row">
                <div class="form-group full"><label>Title *</label><input type="text" class="input" id="dTitle" placeholder="Document title"></div>
                <div class="form-group full"><label>Description</label><textarea id="dDesc" placeholder="Brief description…"></textarea></div>
                <div class="form-group"><label>Price (RWF) *</label><input type="number" class="input" id="dPrice" placeholder="500" min="1"></div>
                <div class="form-group"><label>Currency</label><input type="text" class="input" id="dCurrency" value="RWF"></div>
                <div class="form-group full">
                    <label>Preview Image</label>
                    <input type="file" id="dImage" accept="image/*" style="font-size:0.8rem;">
                    <img class="preview-img" id="imgPreview" style="display:none;">
                    <input type="hidden" id="imgUrl">
                </div>
                <div class="form-group full">
                    <label>Document File *</label>
                    <input type="file" id="dFile" style="font-size:0.8rem;">
                    <span class="file-status" id="fileStatus"></span>
                    <input type="hidden" id="filePath">
                </div>
            </div>
            <input type="hidden" id="editId">
            <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
                <button class="btn btn-dark" onclick="saveDoc()" id="saveBtn"><span class="material-icons">save</span> Save</button>
                <button class="btn btn-outline" onclick="resetForm()" id="cancelBtn" style="display:none;">Cancel</button>
            </div>
        </div>

        <h2 style="font-size:1.05rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;"><span class="material-icons">library_books</span> All Documents</h2>
        <div class="docs-list" id="docsList"><p style="color:#9ca3af;">Loading…</p></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            const IMGBB_KEY = '2077df548acf5a4f53658b930c7fe87a';
            let adminToken = null;

            function $(id) { return document.getElementById(id); }

            function toast(msg, err = false) {
                const t = $('toast');
                t.textContent = msg;
                t.className = 'toast show' + (err ? ' err' : '');
                clearTimeout(t._timeout);
                t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
            }

            async function api(path, body = null, method = null) {
                const opts = {
                    method: method || (body ? 'POST' : 'GET'),
                    headers: { 'Content-Type': 'application/json' }
                };
                if (adminToken) opts.headers['Authorization'] = 'Bearer ' + adminToken;
                if (body) opts.body = JSON.stringify(body);
                const r = await fetch(path, opts);
                if (r.status === 401) { logout(); throw new Error('Unauthorized'); }
                return r.json();
            }

            async function login() {
                const key = $('adminKey').value;
                if (!key) return;
                adminToken = key;
                const res = await api('/api/admin/verify', {});
                if (res.authenticated) {
                    localStorage.setItem('adm_tok', key);
                    $('loginScreen').style.display = 'none';
                    $('dashboard').style.display = 'block';
                    loadDocs();
                } else {
                    adminToken = null;
                    $('loginErr').style.display = 'block';
                    $('loginErr').textContent = 'Invalid key';
                }
            }

            function logout() {
                adminToken = null;
                localStorage.removeItem('adm_tok');
                $('loginScreen').style.display = 'block';
                $('dashboard').style.display = 'none';
                $('adminKey').value = '';
            }

            // Auto login
            const saved = localStorage.getItem('adm_tok');
            if (saved) {
                adminToken = saved;
                api('/api/admin/verify', {}).then(r => {
                    if (r.authenticated) {
                        $('loginScreen').style.display = 'none';
                        $('dashboard').style.display = 'block';
                        loadDocs();
                    } else { logout(); }
                });
            }

            $('dImage').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => { $('imgPreview').src = ev.target.result; $('imgPreview').style.display = 'block'; };
                reader.readAsDataURL(file);
                const fd = new FormData();
                fd.append('image', file);
                try {
                    const r = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                    const d = await r.json();
                    if (d.success) { $('imgUrl').value = d.data.url; toast('Image uploaded'); }
                    else { toast('Image upload failed', true); }
                } catch { toast('Upload error', true); }
            });

            $('dFile').addEventListener('change', async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                $('fileStatus').textContent = 'Uploading…';
                const fd = new FormData();
                fd.append('file', file);
                try {
                    const r = await fetch('/api/admin/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + adminToken },
                        body: fd
                    });
                    const d = await r.json();
                    if (d.file_path) {
                        $('filePath').value = d.file_path;
                        $('fileStatus').textContent = '✅ ' + d.filename;
                        toast('File uploaded');
                    } else {
                        $('fileStatus').textContent = '❌ ' + (d.error || 'Failed');
                        toast('Upload failed', true);
                    }
                } catch { $('fileStatus').textContent = '❌ Error'; toast('Upload error', true); }
            });

            async function saveDoc() {
                const title = $('dTitle').value.trim();
                const desc = $('dDesc').value.trim();
                const price = $('dPrice').value;
                const currency = $('dCurrency').value.trim() || 'RWF';
                const img = $('imgUrl').value.trim();
                const fp = $('filePath').value.trim();
                const editId = $('editId').value;

                if (!title) return toast('Title required', true);
                if (!price || parseInt(price) <= 0) return toast('Valid price required', true);
                if (!fp && !editId) return toast('Upload document file', true);

                const body = { title, description: desc, price: parseInt(price), currency: currency.toUpperCase(), image_url: img, file_path: fp };
                const res = await api('/api/admin/documents', body);
                if (res.error) { toast(res.error, true); }
                else { toast('Saved!'); resetForm(); loadDocs(); }
            }

            function resetForm() {
                $('dTitle').value = '';
                $('dDesc').value = '';
                $('dPrice').value = '';
                $('dCurrency').value = 'RWF';
                $('imgUrl').value = '';
                $('filePath').value = '';
                $('editId').value = '';
                $('dImage').value = '';
                $('dFile').value = '';
                $('imgPreview').style.display = 'none';
                $('fileStatus').textContent = '';
                $('formTitle').innerHTML = '<span class="material-icons">add_circle</span> Add Document';
                $('cancelBtn').style.display = 'none';
            }

            function editDoc(doc) {
                $('dTitle').value = doc.title;
                $('dDesc').value = doc.description || '';
                $('dPrice').value = doc.price;
                $('dCurrency').value = doc.currency;
                $('imgUrl').value = doc.image_url || '';
                $('filePath').value = doc.file_path;
                $('editId').value = doc.id;
                $('formTitle').innerHTML = '<span class="material-icons">edit</span> Edit Document';
                $('cancelBtn').style.display = 'inline-flex';
                if (doc.image_url) { $('imgPreview').src = doc.image_url; $('imgPreview').style.display = 'block'; }
                $('formCard')?.scrollIntoView({ behavior: 'smooth' });
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            async function toggleDoc(id) {
                const r = await api(`/api/admin/documents/${id}/toggle`, {}, 'PUT');
                if (r.error) toast(r.error, true);
                else loadDocs();
            }

            async function deleteDoc(id, title) {
                if (!confirm(`Delete "${title}" permanently?`)) return;
                const r = await api(`/api/admin/documents/${id}`, {}, 'DELETE');
                if (r.error) toast(r.error, true);
                else { toast('Deleted'); loadDocs(); }
            }

            async function loadDocs() {
                const res = await api('/api/admin/documents');
                const list = $('docsList');
                if (res.error) { list.innerHTML = `<p style="color:#dc2626;">${res.error}</p>`; return; }
                if (!res.length) { list.innerHTML = '<p style="color:#9ca3af;">No documents. Add your first one above.</p>'; return; }
                list.innerHTML = res.map(d => `
                    <div class="doc-row">
                        ${d.image_url
                            ? `<img src="${d.image_url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
                            : ''}
                        <div class="icon-placeholder" style="${d.image_url ? 'display:none' : ''}"><span class="material-icons" style="color:#d1d5db;">description</span></div>
                        <div class="info">
                            <h4>${d.title} <span class="badge ${d.active ? 'badge-active' : 'badge-inactive'}">${d.active ? 'Active' : 'Hidden'}</span></h4>
                            <span>${d.price.toLocaleString()} ${d.currency} · ${d.file_path?.split('/').pop() || ''}</span>
                        </div>
                        <div class="actions">
                            <button class="btn btn-outline btn-sm" onclick='editDoc(${JSON.stringify(d)})'><span class="material-icons">edit</span></button>
                            <button class="btn btn-outline btn-sm" onclick="toggleDoc('${d.id}')"><span class="material-icons">${d.active ? 'visibility_off' : 'visibility'}</span></button>
                            <button class="btn btn-red btn-sm" onclick="deleteDoc('${d.id}','${d.title.replace(/'/g,"\\'")}')"><span class="material-icons">delete</span></button>
                        </div>
                    </div>
                `).join('');
            }

            $('adminKey').addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });

            window.login = login;
            window.logout = logout;
            window.saveDoc = saveDoc;
            window.resetForm = resetForm;
            window.editDoc = editDoc;
            window.toggleDoc = toggleDoc;
            window.deleteDoc = deleteDoc;
            window.loadDocs = loadDocs;
        })();
    </script>
</body>
</html>
